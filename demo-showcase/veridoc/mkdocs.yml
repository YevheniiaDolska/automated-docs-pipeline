site_name: VeriOps Demo
site_description: Pipeline-generated multi-protocol API documentation with interactive
  references and quality evidence.
site_url: https://yevheniiadolska.github.io/automated-docs-pipeline/demo-showcase/
theme:
  name: material
  language: en
  palette:
  - scheme: default
    primary: custom
    accent: custom
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - scheme: slate
    primary: custom
    accent: custom
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  features:
  - navigation.tabs
  - navigation.top
  - navigation.sections
  - content.code.copy
  - content.tabs.link
  - search.highlight
  - search.suggest
plugins:
- search
markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: '!!python/name:pymdownx.superfences.fence_mermaid_format'
- tables
- toc:
    permalink: true
- attr_list
- md_in_html
- pymdownx.highlight
- pymdownx.inlinehilite
extra:
  sandbox:
    mock_base: https://662b99a9-ac2a-4096-8a8e-480a73cef3e3.mock.pstmn.io
    rest_base_url: https://662b99a9-ac2a-4096-8a8e-480a73cef3e3.mock.pstmn.io/v1
    graphql_url: https://662b99a9-ac2a-4096-8a8e-480a73cef3e3.mock.pstmn.io/graphql
    grpc_gateway_url: https://662b99a9-ac2a-4096-8a8e-480a73cef3e3.mock.pstmn.io/grpc/invoke
    asyncapi_ws_url: wss://echo.websocket.events
    websocket_url: wss://echo.websocket.events
extra_css:
- stylesheets/extra.css
extra_javascript:
- assets/javascripts/sandbox-config.js
- assets/javascripts/veriops-sandbox.js
nav:
- Home: index.md
- API Reference:
  - REST API (Swagger): reference/rest-api.md
  - GraphQL playground: reference/graphql-playground.md
  - gRPC gateway invoke: reference/grpc-gateway.md
  - AsyncAPI event docs: reference/asyncapi-events.md
  - WebSocket event playground: reference/websocket-events.md
- Architecture:
  - 'Platform overview': guides/architecture-overview.md
- Guides:
  - 'Tutorial: first integration': guides/tutorial.md
  - 'How-to: release-day docs sync': guides/how-to.md
  - 'Concept: pipeline-first lifecycle': guides/concept.md
  - 'Troubleshooting: pipeline issues': guides/troubleshooting.md
- Quality:
  - Quality evidence: quality/evidence.md
