site_name: "Auto-Doc Pipeline: Demo Showcase"
site_description: "One document demonstrating every capability of the Auto-Doc Pipeline"
site_url: "https://yevheniiadolska.github.io/automated-docs-pipeline/demo-showcase/"

theme:
  name: material
  language: en
  features:
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - navigation.top
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - macros:
      include_yaml:
        - docs/_variables.yml

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - "Set up webhook processing pipeline": index.md

extra_css:
  - stylesheets/diagrams.css
