openapi: 3.0.3
info:
  title: Acme API
  description: API contract used by Acme demo sandbox and interactive Swagger.
  version: 1.0.0
  contact:
    name: Acme API Support
    email: support@acme.example
servers:
  - url: https://api.acme.example/v1
paths:
  /projects:
    get:
      summary: List projects
      description: Returns all projects available to the caller.
      operationId: listProjects
      tags:
        - Projects
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectsList'
components:
  schemas:
    Project:
      type: object
      required: [id, name, status]
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string }
    ProjectsList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Project'
  responses: {}
