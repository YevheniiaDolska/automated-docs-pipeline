[tool:pytest]
testpaths = tests

[coverage:run]
source = scripts
omit =
    scripts/test_*.py
    scripts/algolia_config.py
    scripts/auto_metadata.py
    scripts/upload_to_algolia.py
    scripts/run_generator.py
    scripts/gap_detection/cli.py
    scripts/init_pipeline.py
    scripts/new_doc.py
    scripts/gap_detection/code_analyzer.py
    scripts/check_code_examples_smoke.py
    scripts/pilot_analysis.py
    scripts/site_generator.py

[coverage:report]
exclude_lines =
    if __name__
    def main
    pragma: no cover
    raise NotImplementedError
    except ImportError
    except subprocess
    subprocess\.run
    print\(
