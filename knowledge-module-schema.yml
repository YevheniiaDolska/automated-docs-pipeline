$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
required:
  - id
  - title
  - summary
  - intents
  - audiences
  - channels
  - priority
  - status
  - owner
  - last_verified
  - content
properties:
  id:
    type: string
    pattern: "^[a-z0-9-]+$"
  title:
    type: string
    minLength: 10
    maxLength: 90
  summary:
    type: string
    minLength: 30
    maxLength: 240
  intents:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum:
        - install
        - configure
        - troubleshoot
        - optimize
        - secure
        - migrate
        - automate
        - compare
        - integrate
  audiences:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum:
        - beginner
        - practitioner
        - operator
        - developer
        - architect
        - sales
        - support
        - all
  channels:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum:
        - docs
        - in-product
        - assistant
        - automation
        - field
        - sales
  priority:
    type: integer
    minimum: 1
    maximum: 100
  status:
    type: string
    enum:
      - active
      - deprecated
  owner:
    type: string
    minLength: 3
    maxLength: 120
  last_verified:
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
  dependencies:
    type: array
    uniqueItems: true
    items:
      type: string
      pattern: "^[a-z0-9-]+$"
  tags:
    type: array
    maxItems: 8
    uniqueItems: true
    items:
      type: string
  content:
    type: object
    required:
      - docs_markdown
      - assistant_context
    properties:
      docs_markdown:
        type: string
        minLength: 80
      in_product_guidance:
        type: string
      assistant_context:
        type: string
        minLength: 60
      automation_workflow:
        type: string
      field_enablement:
        type: string
      sales_partner_enablement:
        type: string
additionalProperties: false
