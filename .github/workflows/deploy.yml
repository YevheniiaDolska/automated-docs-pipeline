name: Deploy Documentation

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Generate facets index for search
        run: python scripts/generate_facets_index.py

      - run: mkdocs build --strict

      - name: Build demo-showcase sub-site
        run: |
          cd demo-showcase
          mkdocs build --strict
          cp -r site/ ../site/demo-showcase/

      - name: Build VeriOps demo sub-site
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          cd demo-showcase/acme
          mkdocs build --strict
          # Inject Postman API key into sandbox config files
          if [ -n "$POSTMAN_API_KEY" ]; then
            sed -i "s|__POSTMAN_API_KEY__|${POSTMAN_API_KEY}|g" site/assets/javascripts/sandbox-config.js
            sed -i "s|__POSTMAN_API_KEY__|${POSTMAN_API_KEY}|g" site/reference/swagger-test.html
          fi
          # Copy into demo-showcase/ root (not acme/ subfolder)
          cp -rT site/ ../../site/demo-showcase/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
