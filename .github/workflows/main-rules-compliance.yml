name: Main Rules Compliance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  main-rules-compliance:
    name: main_rules_compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run main rules compliance checker
        run: python3 scripts/check_main_rules_compliance.py
