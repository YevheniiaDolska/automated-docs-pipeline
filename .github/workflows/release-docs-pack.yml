name: Release Docs Pack

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Release version/tag
        required: false
        type: string

permissions:
  contents: write
  issues: write

jobs:
  generate-release-pack:
    name: Generate release docs pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine docs branch
        id: docs_branch
        run: |
          if [ -n "${{ steps.version.outputs.value }}" ]; then
            SAFE_VERSION="$(echo "${{ steps.version.outputs.value }}" | tr '/ ' '--')"
            echo "value=docs/release-${SAFE_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "value=docs/release-adhoc-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release docs pack
        run: |
          python3 scripts/generate_release_docs_pack.py \
            --version "${{ steps.version.outputs.value }}" \
            --output reports/release-docs-pack.md

      - name: Commit release docs pack to release docs branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -B "${{ steps.docs_branch.outputs.value }}"
          git add reports/release-docs-pack.md
          if git diff --staged --quiet; then
            echo "No changes in release pack."
          else
            VERSION="${{ steps.version.outputs.value }}"
            if [ -z "$VERSION" ]; then
              VERSION="adhoc"
            fi
            git commit -m "docs: release pack for ${VERSION} [skip ci]"
            git push --set-upstream origin "${{ steps.docs_branch.outputs.value }}"
          fi

      - name: Upload release docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-docs-pack
          path: reports/release-docs-pack.md

      - name: Create issue for release documentation
        if: steps.version.outputs.value != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const version = '${{ steps.version.outputs.value }}';
            const packPath = 'reports/release-docs-pack.md';
            const pack = fs.existsSync(packPath)
              ? fs.readFileSync(packPath, 'utf8').substring(0, 3000)
              : 'Release docs pack was generated but could not be read.';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release ${version}: update documentation`,
              body: `## Release ${version} documentation\n\nA release docs pack has been generated in branch \`${{ steps.docs_branch.outputs.value }}\`.\n\n### Next steps\n1. Checkout branch \`${{ steps.docs_branch.outputs.value }}\`\n2. Open Claude Code and say: "Update docs for release ${version} based on reports/release-docs-pack.md"\n3. Open PR into \`main\` after review\n\n### Pack preview\n\n${pack}`,
              labels: ['documentation', 'auto-created', 'release']
            });
