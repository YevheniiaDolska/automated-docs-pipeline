name: Release Docs Pack

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Release version/tag
        required: false
        type: string

permissions:
  contents: write
  issues: write

jobs:
  generate-release-pack:
    name: Generate release docs pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release docs pack
        run: |
          python3 scripts/generate_release_docs_pack.py \
            --version "${{ steps.version.outputs.value }}" \
            --output reports/release-docs-pack.md

      - name: Commit release docs pack
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/release-docs-pack.md
          git diff --staged --quiet || git commit -m "docs: release pack for ${{ steps.version.outputs.value }} [skip ci]"
          git push

      - name: Upload release docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-docs-pack
          path: reports/release-docs-pack.md

      - name: Create issue for release documentation
        if: steps.version.outputs.value != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const version = '${{ steps.version.outputs.value }}';
            const packPath = 'reports/release-docs-pack.md';
            const pack = fs.existsSync(packPath)
              ? fs.readFileSync(packPath, 'utf8').substring(0, 3000)
              : 'Release docs pack was generated but could not be read.';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release ${version}: update documentation`,
              body: `## Release ${version} documentation\n\nA release docs pack has been generated.\n\n### Next steps\n1. \`git pull\` to get \`reports/release-docs-pack.md\`\n2. Open Claude Code and say: "Update docs for release ${version} based on reports/release-docs-pack.md"\n\n### Pack preview\n\n${pack}`,
              labels: ['documentation', 'auto-created', 'release']
            });
