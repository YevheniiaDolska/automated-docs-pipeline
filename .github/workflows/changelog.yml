name: Update Changelog

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper changelog

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install signing dependency
        run: python3 -m pip install --upgrade pip cryptography

      - name: Sign changelog
        env:
          VERIOPS_CHANGELOG_SIGNING_KEY_B64: ${{ secrets.VERIOPS_CHANGELOG_SIGNING_KEY_B64 }}
        run: |
          if [ -n "${VERIOPS_CHANGELOG_SIGNING_KEY_B64}" ]; then
            mkdir -p docsops/keys
            printf "%s\n" "${VERIOPS_CHANGELOG_SIGNING_KEY_B64}" > docsops/keys/veriops-licensing.key
          fi
          python3 scripts/sign_release_changelog.py \
            --changelog CHANGELOG.md \
            --private-key docsops/keys/veriops-licensing.key \
            --public-key docsops/keys/veriops-licensing.pub \
            --signature CHANGELOG.md.sig \
            --metadata reports/changelog_signature.json

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-changelog
          path: |
            CHANGELOG.md
            CHANGELOG.md.sig
            reports/changelog_signature.json
