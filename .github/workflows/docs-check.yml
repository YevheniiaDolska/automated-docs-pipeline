name: Documentation Quality Checks

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'knowledge_modules/**'
      - 'knowledge-module-schema.yml'
      - '.vale/**'
      - 'docs-schema.yml'
      - 'scripts/validate_knowledge_modules.py'
      - 'api/**'
      - '**/*.yaml'
      - '**/*.json'

jobs:
  vale:
    name: Style check (Vale)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: errata-ai/vale-action@reviewdog
        with:
          files: docs/
          reporter: github-pr-review
          # Strict mode - no --no-exit flag, all warnings and errors fail the check

  markdownlint:
    name: Markdown formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nosborn/github-action-markdown-cli@v3
        with:
          files: docs/
          config_file: .markdownlint.yml

  cspell:
    name: Spelling check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: streetsidesoftware/cspell-action@v5
        with:
          files: 'docs/**/*.md'

  frontmatter:
    name: Frontmatter validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - run: python scripts/validate_frontmatter.py

  seo-geo-check:
    name: SEO/GEO optimization check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - run: python scripts/seo_geo_optimizer.py docs/

  code-examples-smoke:
    name: Code examples smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: pip install pyyaml
      - run: npm install -g typescript
      - run: python3 scripts/check_code_examples_smoke.py --paths docs templates

  spectral:
    name: API contract lint stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml

      - name: Find OpenAPI specs
        id: find-specs
        run: |
          SPECS=$(find . -type f \( -name "openapi*.yaml" -o -name "openapi*.yml" -o -name "openapi*.json" -o -name "swagger*.yaml" -o -name "swagger*.yml" -o -name "swagger*.json" -o -name "api-spec*.yaml" -o -name "api-spec*.yml" \) 2>/dev/null | head -20)
          if [ -n "$SPECS" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "specs<<EOF" >> $GITHUB_OUTPUT
            echo "$SPECS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Spectral, Redocly, Swagger CLI, and contract checks
        if: steps.find-specs.outputs.found == 'true'
        run: |
          echo "${{ steps.find-specs.outputs.specs }}" | while IFS= read -r spec; do
            [ -n "$spec" ] || continue
            echo "Linting $spec"
            npx -y @stoplight/spectral-cli lint "$spec" --ruleset .spectral.yml
            npx -y @redocly/cli lint "$spec"
            npx -y @apidevtools/swagger-cli validate "$spec"
            python3 scripts/validate_openapi_contract.py "$spec"
          done

      - name: Skip - no API specs found
        if: steps.find-specs.outputs.found == 'false'
        run: echo "No OpenAPI/Swagger specs found - skipping API contract lint stack"

  knowledge:
    name: Knowledge modules validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - run: python3 scripts/validate_knowledge_modules.py

  build-docs:
    name: Build docs (strict)
    runs-on: ubuntu-latest
    needs:
      - vale
      - markdownlint
      - cspell
      - frontmatter
      - seo-geo-check
      - code-examples-smoke
      - spectral
      - knowledge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install -r requirements.txt
      - name: Detect site generator
        id: detect
        run: echo "generator=$(python3 scripts/run_generator.py detect)" >> $GITHUB_OUTPUT
      - name: Build with MkDocs
        if: steps.detect.outputs.generator == 'mkdocs'
        run: mkdocs build --strict
      - name: Build with Docusaurus
        if: steps.detect.outputs.generator == 'docusaurus'
        run: npm install && npx docusaurus build
