name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: veridoc_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: veridoc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
    env:
      VERIDOC_DATABASE_URL: postgresql://veridoc_test:test_password@localhost:5432/veridoc_test
      VERIDOC_SECRET_KEY: test-secret-key-for-ci-only
      VERIDOC_REDIS_URL: redis://localhost:6379/0
      VERIOPS_LICENSE_PLAN: enterprise
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests
        run: |
          python -m pytest tests/ -x -q --tb=short \
            --ignore=tests/test_coverage_boost_round2.py \
            -k "not test_tokenizes_text"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install ruff

      - name: Ruff check
        run: ruff check packages/ scripts/ tests/ --select E,F,W

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --target api -t veridoc-api:${{ github.sha }} .

      - name: Build worker image
        run: docker build --target worker -t veridoc-worker:${{ github.sha }} .

      - name: Verify health check
        run: |
          docker run -d --name veridoc-test \
            -e VERIDOC_SECRET_KEY=test-key \
            -p 8000:8000 \
            veridoc-api:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop veridoc-test
