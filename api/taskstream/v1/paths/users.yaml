/users/me:
  get:
    operationId: get_users_me
    tags:
    - Users
    summary: current user profile.
    description: current user profile.. Generated from planning notes.
    security:
    - BearerAuth: []
    parameters:
    - $ref: ../components/parameters/common.yaml#/RequestId
    - $ref: ../components/parameters/common.yaml#/Limit
    - $ref: ../components/parameters/common.yaml#/Cursor
    responses:
      '200':
        description: Current user
        content:
          application/json:
            schema:
              $ref: ../components/schemas/common.yaml#/User
            example:
              id: 1edd3e73-e605-4559-a6f9-dcd27f2f6488
              email: alex@taskstream.example.com
              full_name: Alex Rivera
              role: admin
              status: active
              created_at: '2026-01-15T09:00:00Z'
      '401':
        $ref: ../components/responses/common.yaml#/Error401
      '500':
        $ref: ../components/responses/common.yaml#/Error500
