/users:
  get:
    operationId: get_users
    tags:
    - Users
    summary: list workspace users.
    description: list workspace users.. Generated from planning notes.
    security:
    - BearerAuth: []
    parameters:
    - $ref: ../components/parameters/common.yaml#/RequestId
    - $ref: ../components/parameters/common.yaml#/Limit
    - $ref: ../components/parameters/common.yaml#/Cursor
    responses:
      '200':
        description: Success
