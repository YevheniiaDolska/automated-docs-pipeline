version: "3.9"

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-veridoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-veridoc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veridoc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis (Celery broker + cache) ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- VeriDoc API Server ----
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - VERIDOC_DATABASE_URL=postgresql://${POSTGRES_USER:-veridoc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-veridoc}
      - VERIDOC_SECRET_KEY=${VERIDOC_SECRET_KEY:?Set VERIDOC_SECRET_KEY}
      - VERIDOC_REDIS_URL=redis://redis:6379/0
      - VERIDOC_ENVIRONMENT=production
      - VERIDOC_CORS_ORIGINS=${VERIDOC_CORS_ORIGINS:-https://veri-doc.app}
      # OAuth (Google/GitHub login)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-}
      - GITHUB_OAUTH_REDIRECT_URI=${GITHUB_OAUTH_REDIRECT_URI:-}
      - VERIDOC_OAUTH_CALLBACK_URL=${VERIDOC_OAUTH_CALLBACK_URL:-}
      # LLM API keys
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # LemonSqueezy
      - LEMONSQUEEZY_API_KEY=${LEMONSQUEEZY_API_KEY:-}
      - LEMONSQUEEZY_STORE_ID=${LEMONSQUEEZY_STORE_ID:-}
      - LEMONSQUEEZY_WEBHOOK_SECRET=${LEMONSQUEEZY_WEBHOOK_SECRET:-}
      # LemonSqueezy variant IDs (self-serve checkout)
      - LS_VARIANT_STARTER_MONTHLY=${LS_VARIANT_STARTER_MONTHLY:-}
      - LS_VARIANT_STARTER_ANNUAL=${LS_VARIANT_STARTER_ANNUAL:-}
      - LS_VARIANT_PRO_MONTHLY=${LS_VARIANT_PRO_MONTHLY:-}
      - LS_VARIANT_PRO_ANNUAL=${LS_VARIANT_PRO_ANNUAL:-}
      - LS_VARIANT_BUSINESS_MONTHLY=${LS_VARIANT_BUSINESS_MONTHLY:-}
      - LS_VARIANT_ENTERPRISE_MONTHLY=${LS_VARIANT_ENTERPRISE_MONTHLY:-}
      # SMTP for email notifications
      - VERIDOC_SMTP_HOST=${VERIDOC_SMTP_HOST:-smtp.mailgun.org}
      - VERIDOC_SMTP_PORT=${VERIDOC_SMTP_PORT:-587}
      - VERIDOC_SMTP_USER=${VERIDOC_SMTP_USER:-}
      - VERIDOC_SMTP_PASSWORD=${VERIDOC_SMTP_PASSWORD:-}
      - VERIDOC_SMTP_FROM=${VERIDOC_SMTP_FROM:-noreply@veri-doc.app}
      - VERIDOC_APP_BASE_URL=${VERIDOC_APP_BASE_URL:-https://veri-doc.app}
      - VERIDOC_ADMIN_EMAIL=${VERIDOC_ADMIN_EMAIL:-jane.dolska@gmail.com,eugenia@veri-doc.app}
      # Sentry error tracking
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ---- Celery Worker ----
  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - VERIDOC_DATABASE_URL=postgresql://${POSTGRES_USER:-veridoc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-veridoc}
      - VERIDOC_REDIS_URL=redis://redis:6379/0
      - VERIDOC_REDIS_BACKEND=redis://redis:6379/1
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Celery Beat (Scheduler) ----
  beat:
    build:
      context: .
      target: beat
    restart: unless-stopped
    environment:
      - VERIDOC_DATABASE_URL=postgresql://${POSTGRES_USER:-veridoc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-veridoc}
      - VERIDOC_REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Next.js Frontend ----
  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - API_PROXY_TARGET=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ---- Nginx (reverse proxy + SSL) ----
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
