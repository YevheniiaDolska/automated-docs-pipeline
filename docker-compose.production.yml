version: "3.9"

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-veridoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-veridoc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veridoc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis (Celery broker + cache) ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- VeriDoc API Server ----
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - VERIDOC_DATABASE_URL=postgresql://${POSTGRES_USER:-veridoc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-veridoc}
      - VERIDOC_SECRET_KEY=${VERIDOC_SECRET_KEY:?Set VERIDOC_SECRET_KEY}
      - VERIDOC_REDIS_URL=redis://redis:6379/0
      - VERIDOC_ENVIRONMENT=production
      - VERIDOC_CORS_ORIGINS=${VERIDOC_CORS_ORIGINS:-https://app.veridoc.dev}
      # LLM API keys
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # LemonSqueezy
      - LEMONSQUEEZY_API_KEY=${LEMONSQUEEZY_API_KEY:-}
      - LEMONSQUEEZY_STORE_ID=${LEMONSQUEEZY_STORE_ID:-}
      - LEMONSQUEEZY_WEBHOOK_SECRET=${LEMONSQUEEZY_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ---- Celery Worker ----
  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - VERIDOC_DATABASE_URL=postgresql://${POSTGRES_USER:-veridoc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-veridoc}
      - VERIDOC_REDIS_URL=redis://redis:6379/0
      - VERIDOC_REDIS_BACKEND=redis://redis:6379/1
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Celery Beat (Scheduler) ----
  beat:
    build:
      context: .
      target: beat
    restart: unless-stopped
    environment:
      - VERIDOC_DATABASE_URL=postgresql://${POSTGRES_USER:-veridoc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-veridoc}
      - VERIDOC_REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Nginx (reverse proxy + SSL) ----
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - frontend_build:/var/www/app:ro
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  frontend_build:
