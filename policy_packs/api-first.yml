docs_contract:
  interface_patterns:
    - "^api/"
    - "openapi.*\\.(ya?ml|json)$"
    - "swagger.*\\.(ya?ml|json)$"
    - "api-spec.*\\.(ya?ml|json)$"
    - "^sdk/"
    - "^clients/"
  doc_patterns:
    - "^docs/reference/"
    - "^docs/how-to/"
    - "^templates/api-reference\\.md$"
    - "^templates/sdk-reference\\.md$"

drift:
  openapi_patterns:
    - "openapi.*\\.(ya?ml|json)$"
    - "swagger.*\\.(ya?ml|json)$"
  sdk_patterns:
    - "^sdk/"
    - "^clients/"
  reference_doc_patterns:
    - "^docs/reference/"
    - "^templates/api-reference\\.md$"
    - "^templates/sdk-reference\\.md$"

doc_layers:
  required_layers:
    - concept
    - how-to
    - reference

diagram_validation:
  enabled: true
  strict: false
  min_description_sentences: 2
  min_tags_per_component: 3
  min_tag_overlap_pct: 50

kpi_sla:
  min_quality_score: 82
  max_stale_pct: 12.0
  max_high_priority_gaps: 6
  max_quality_score_drop: 4

terminology:
  glossary_sync_required: true
  max_new_terms_per_week: 30

retrieval_evals:
  min_precision: 0.5
  min_recall: 0.5
  max_hallucination_rate: 0.5

knowledge_graph:
  min_graph_nodes: 5
