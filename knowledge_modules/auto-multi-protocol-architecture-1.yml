content:
  docs_markdown: "<!-- VERIDOC_POWERED_BADGE:START -->\n[![Powered by VeriDoc](https://img.shields.io/badge/Powered%20by-VeriDoc-0ea5e9?style=flat-square)](https://veridoc.app)\n\
    <!-- VERIDOC_POWERED_BADGE:END -->\n\n# VeriDoc/VeriOps Multi-Protocol Architecture\n\
    \nPositioning statement:\n\n`VeriDoc/VeriOps: one docs-ops pipeline for REST,\
    \ GraphQL, gRPC, AsyncAPI, and WebSocket.`\n\n## Supported protocols (core-5)\n\
    \n1. REST (OpenAPI)\n1. GraphQL (SDL/introspection)\n1. gRPC (Proto/descriptor)\n\
    1. AsyncAPI (event-driven specs)\n1. WebSocket (channel/message contracts)\n\n\
    ## Unified stage flow\n\n`ingest -> contract validation -> server stub generation\
    \ -> lint -> regression -> docs generation -> quality gates -> test assets ->\
    \ upload -> publish`\n\nImplementation entrypoint:\n\n```bash\npython3 scripts/run_multi_protocol_contract_flow.py\
    \ \\\n  --runtime-config docsops/config/client_runtime.yml \\\n  --reports-dir\
    \ reports\n```\n\n## Engine and adapters\n\n- `scripts/multi_protocol_engine.py`\
    \ - stage adapter orchestration.\n- `scripts/run_multi_protocol_contract_flow.py`\
    \ - flow runner + report output.\n- `scripts/api_protocols.py` - protocol normalization,\
    \ aliases, defaults.\n- `scripts/generate_protocol_server_stubs.py` - protocol-specific\
    \ server stubs with business-logic placeholders."
