content:
  docs_markdown: "# VeriDoc/VeriOps Multi-Protocol Architecture\n\nPositioning statement:\n\
    \n`VeriDoc/VeriOps: one docs-ops pipeline for REST, GraphQL, gRPC, AsyncAPI, and\
    \ WebSocket.`\n\n## Supported protocols (core-5)\n\n1. REST (OpenAPI)\n1. GraphQL\
    \ (SDL/introspection)\n1. gRPC (Proto/descriptor)\n1. AsyncAPI (event-driven specs)\n\
    1. WebSocket (channel/message contracts)\n\n## Unified stage flow\n\n`ingest ->\
    \ lint -> regression -> docs generation -> quality gates -> test assets -> upload\
    \ -> publish`\n\nImplementation entrypoint:\n\n```bash\npython3 scripts/run_multi_protocol_contract_flow.py\
    \ \\\n  --runtime-config docsops/config/client_runtime.yml \\\n  --reports-dir\
    \ reports\n```\n\n## Engine and adapters\n\n- `scripts/multi_protocol_engine.py`\
    \ - stage adapter orchestration.\n- `scripts/run_multi_protocol_contract_flow.py`\
    \ - flow runner + report output.\n- `scripts/api_protocols.py` - protocol normalization,\
    \ aliases, defaults."
