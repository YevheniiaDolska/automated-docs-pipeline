content:
  docs_markdown: "## \u041A\u043E\u043C\u0430\u043D\u0434\u0430 \"\u043F\u043E\u0434\
    \ \u043A\u043B\u044E\u0447\" (\u0431\u0435\u0437 \u0432\u043E\u0437\u043D\u0438\
    \ \u043A\u043B\u0438\u0435\u043D\u0442\u0430)\n\n\u0415\u0441\u043B\u0438 \u0432\
    \u044B \u0445\u043E\u0442\u0438\u0442\u0435 \u0441\u0440\u0430\u0437\u0443 \u043D\
    \u0430\u0441\u0442\u0440\u043E\u0438\u0442\u044C \u0438 \u0437\u0430\u043F\u0443\
    \u0441\u043A\u0430\u0442\u044C \u0437\u0430 \u043A\u043B\u0438\u0435\u043D\u0442\
    \u0430, \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u0439\u0442\u0435 provisioning:\n\
    \n```bash\npython3 scripts/provision_client_repo.py \\\n  --client profiles/clients/blockstream-demo.client.yml\
    \ \\\n  --client-repo /path/to/client-repo \\\n  --docsops-dir docsops \\\n  --install-scheduler\
    \ linux\n```\n\n\u0414\u043B\u044F Windows:\n\n```bash\npython3 scripts/provision_client_repo.py\
    \ \\\n  --client profiles/clients/blockstream-demo.client.yml \\\n  --client-repo\
    \ C:/path/to/client-repo \\\n  --docsops-dir docsops \\\n  --install-scheduler\
    \ windows\n```\n\n\u0427\u0442\u043E \u0434\u0435\u043B\u0430\u0435\u0442 \u043A\
    \u043E\u043C\u0430\u043D\u0434\u0430:\n\n\\11. \u0421\u043E\u0431\u0438\u0440\u0430\
    \u0435\u0442 bundle \u0438\u0437 \u043A\u043B\u0438\u0435\u043D\u0442\u0441\u043A\
    \u043E\u0433\u043E \u043F\u0440\u043E\u0444\u0438\u043B\u044F.\n\\11. \u041A\u043E\
    \u043F\u0438\u0440\u0443\u0435\u0442 bundle \u0432 \u0440\u0435\u043F\u043E\u0437\
    \u0438\u0442\u043E\u0440\u0438\u0439 \u043A\u043B\u0438\u0435\u043D\u0442\u0430\
    \ (`docsops/`).\n\\11. \u0413\u0435\u043D\u0435\u0440\u0438\u0440\u0443\u0435\u0442\
    \ `docsops/ENV_CHECKLIST.md` \u0430\u0432\u0442\u043E\u043C\u0430\u0442\u0438\u0447\
    \u0435\u0441\u043A\u0438.\n\\11. \u0421\u0442\u0430\u0432\u0438\u0442 weekly scheduler\
    \ (cron \u0438\u043B\u0438 Task Scheduler).\n\\11. \u041A\u043B\u0438\u0435\u043D\
    \u0442\u0443 \u043D\u0435 \u043D\u0443\u0436\u043D\u043E \u0440\u0443\u043A\u0430\
    \u043C\u0438 \u043D\u0430\u0441\u0442\u0440\u0430\u0438\u0432\u0430\u0442\u044C\
    \ pipeline.\n\n### \u0420\u0443\u0447\u043D\u0430\u044F \u043F\u0440\u043E\u0432\
    \u0435\u0440\u043A\u0430 \u043E\u043F\u0435\u0440\u0430\u0442\u043E\u0440\u0430\
    \ (\u043F\u043E\u0441\u043B\u0435 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043A\
    \u0438)\n\n\\11. \u041F\u0440\u043E\u0432\u0435\u0440\u0438\u0442\u044C `<client-repo>/docsops/config/client_runtime.yml`.\n\
    \\11. \u041F\u0440\u043E\u0432\u0435\u0440\u0438\u0442\u044C `<client-repo>/docsops/policy_packs/selected.yml`.\n\
    \\11. \u041F\u0440\u043E\u0432\u0435\u0440\u0438\u0442\u044C `<client-repo>/docsops/ENV_CHECKLIST.md`\
    \ \u0438 \u043F\u0435\u0440\u0435\u0434\u0430\u0442\u044C \u0441\u043F\u0438\u0441\
    \u043E\u043A env/secrets \u043A\u043B\u0438\u0435\u043D\u0442\u0443.\n\\11. \u0423\
    \u0431\u0435\u0434\u0438\u0442\u044C\u0441\u044F, \u0447\u0442\u043E scheduler\
    \ \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D (cron entry \u0438\
    \u043B\u0438 Task Scheduler task).\n\\11. \u0417\u0430\u043F\u0443\u0441\u0442\
    \u0438\u0442\u044C \u043E\u0434\u0438\u043D \u0442\u0435\u0441\u0442\u043E\u0432\
    \u044B\u0439 weekly run \u0438 \u0443\u0431\u0435\u0434\u0438\u0442\u044C\u0441\
    \u044F, \u0447\u0442\u043E `reports/consolidated_report.json` \u043E\u0431\u043D\
    \u043E\u0432\u0438\u043B\u0441\u044F."
