content:
  docs_markdown: "## RAG/knowledge \u0431\u0435\u0437 \u0440\u0443\u0447\u043D\u044B\
    \u0445 \u0437\u0430\u043F\u0443\u0441\u043A\u043E\u0432\n\n\u042D\u0442\u043E\
    \ \u0443\u0436\u0435 \u0443\u043A\u043B\u0430\u0434\u044B\u0432\u0430\u0435\u0442\
    \u0441\u044F \u0432 \u0442\u0435\u043A\u0443\u0449\u0438\u0439 smooth flow:\n\n\
    \\11. \u041E\u0434\u0438\u043D \u0440\u0430\u0437 \u043D\u0430\u0441\u0442\u0440\
    \u043E\u0438\u0442\u044C \u043F\u0440\u043E\u0444\u0438\u043B\u044C \u043A\u043B\
    \u0438\u0435\u043D\u0442\u0430 (`*.client.yml`):\n\n- `runtime.modules.knowledge_validation:\
    \ true`\n- `runtime.modules.rag_optimization: true`\n- `runtime.modules.ontology_graph:\
    \ true`\n- `runtime.modules.retrieval_evals: true`\n- `runtime.custom_tasks.weekly`\
    \ \u0434\u043B\u044F RAG-\u0437\u0430\u0434\u0430\u0447, \u0432\u043A\u043B\u044E\
    \u0447\u0430\u044F `build_all_intent_experiences.py`\n- `bundle.include_paths:\
    \ [\"knowledge_modules\"]`\n\n\\11. \u041E\u0434\u0438\u043D \u0440\u0430\u0437\
    \ \u0441\u0434\u0435\u043B\u0430\u0442\u044C provisioning:\n\n- `provision_client_repo.py`\
    \ \u0441\u0442\u0430\u0432\u0438\u0442 `docsops/` \u0432 \u043A\u043B\u0438\u0435\
    \u043D\u0442\u0441\u043A\u0438\u0439 \u0440\u0435\u043F\u043E\u0437\u0438\u0442\
    \u043E\u0440\u0438\u0439\n- \u0441\u0440\u0430\u0437\u0443 \u0441\u0442\u0430\u0432\
    \u0438\u0442\u0441\u044F \u0440\u0430\u0441\u043F\u0438\u0441\u0430\u043D\u0438\
    \u0435 (`cron` \u0438\u043B\u0438 `Task Scheduler`)\n\n\\11. \u0414\u0430\u043B\
    \u0435\u0435 weekly job \u0438\u0434\u0435\u0442 \u0430\u0432\u0442\u043E\u043C\
    \u0430\u0442\u0438\u0447\u0435\u0441\u043A\u0438:\n\n- \u0437\u0430\u043F\u0443\
    \u0441\u043A\u0430\u0435\u0442\u0441\u044F `run_weekly_gap_batch.py`\n- \u0432\
    \u043D\u0443\u0442\u0440\u0438 \u0432\u044B\u043F\u043E\u043B\u043D\u044F\u044E\
    \u0442\u0441\u044F:\n  - `extract_knowledge_modules_from_docs.py`\n  - `validate_knowledge_modules.py`\n\
    \  - `generate_knowledge_retrieval_index.py`\n  - `generate_knowledge_graph_jsonld.py`\n\
    \  - `run_retrieval_evals.py`\n  - \u043B\u044E\u0431\u044B\u0435 `custom_tasks.weekly`\
    \ (\u043D\u0430\u043F\u0440\u0438\u043C\u0435\u0440 `build_all_intent_experiences.py`)\n\
    - \u043E\u0442\u0447\u0435\u0442\u044B \u0444\u043E\u0440\u043C\u0438\u0440\u0443\
    \u044E\u0442\u0441\u044F \u0430\u0432\u0442\u043E\u043C\u0430\u0442\u0438\u0447\
    \u0435\u0441\u043A\u0438\n\n\u0418\u0442\u043E\u0433:\n\n- \u043A\u043B\u0438\u0435\
    \u043D\u0442\u0441\u043A\u0430\u044F \u043A\u043E\u043C\u0430\u043D\u0434\u0430\
    \ \u043D\u0435 \u0437\u0430\u043F\u0443\u0441\u043A\u0430\u0435\u0442 \u043A\u043E\
    \u043C\u0430\u043D\u0434\u044B \u0432\u0440\u0443\u0447\u043D\u0443\u044E\n- \u0447\
    \u0435\u043B\u043E\u0432\u0435\u043A \u0442\u043E\u043B\u044C\u043A\u043E \u0441\
    \u043C\u043E\u0442\u0440\u0438\u0442 weekly report \u0438 \u0432\u044B\u0431\u043E\
    \u0440\u043E\u0447\u043D\u043E \u043F\u0440\u043E\u0432\u0435\u0440\u044F\u0435\
    \u0442 \u0444\u0438\u043D\u0430\u043B\u044C\u043D\u044B\u0435 docs\n\n\u041F\u043E\
    \u0432\u0435\u0434\u0435\u043D\u0438\u0435 \u043E\u0442\u0447\u0435\u0442\u043E\
    \u0432:\n\n- weekly \u0437\u0430\u043F\u0443\u0441\u043A \u043F\u0438\u0448\u0435\
    \u0442 \u0432 \u0442\u0435 \u0436\u0435 \u0438\u043C\u0435\u043D\u0430 \u0444\u0430\
    \u0439\u043B\u043E\u0432\n- \u043D\u043E\u0432\u044B\u0435 \u043E\u0442\u0447\u0435\
    \u0442\u044B \u0437\u0430\u043C\u0435\u043D\u044F\u044E\u0442 \u0441\u0442\u0430\
    \u0440\u044B\u0435\n- \u0440\u0443\u0447\u043D\u043E\u0435 \u0443\u0434\u0430\u043B\
    \u0435\u043D\u0438\u0435 \u0441\u0442\u0430\u0440\u044B\u0445 \u043E\u0442\u0447\
    \u0435\u0442\u043E\u0432 \u043D\u0435 \u0442\u0440\u0435\u0431\u0443\u0435\u0442\
    \u0441\u044F\n\n\u041A\u0430\u043A \u043A\u043B\u0438\u0435\u043D\u0442\u0443\
    \ \u0431\u044B\u0441\u0442\u0440\u043E \u043F\u043E\u043D\u044F\u0442\u044C, \u0447\
    \u0442\u043E \u043E\u0442\u0447\u0435\u0442 \u043D\u043E\u0432\u044B\u0439 (\u0441\
    \u0430\u043C\u044B\u0439 \u043F\u0440\u043E\u0441\u0442\u043E\u0439 \u0441\u043F\
    \u043E\u0441\u043E\u0431):"
