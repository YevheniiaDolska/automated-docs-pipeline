content:
  docs_markdown: "## Configure authentication\n\n!!! warning \"Secure your webhooks\"\
    \n    Always enable authentication on production webhook endpoints.\n    Unauthenticated\
    \ webhooks accept requests from any source.\n\nAdd authentication in the webhook\
    \ node settings:\n\n| Auth method | Use case | Configuration |\n|-------------|----------|---------------|\n\
    | Header Auth | API key validation | Set header name and expected value |\n| Basic\
    \ Auth | Username and password | Set credentials in node settings |\n| JWT | Token-based\
    \ auth | Configure secret and algorithm |"
