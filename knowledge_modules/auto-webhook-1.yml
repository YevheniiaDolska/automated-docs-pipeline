    ## Webhook node reference


    The Webhook node is a trigger node that starts a workflow when it receives an
    HTTP request at a unique URL. It supports GET, POST, PUT, PATCH, DELETE, and HEAD
    methods.


    ## Parameters


    | Parameter | Type | Default | Description |

    | --- | --- | --- | --- |

    | **HTTP Method** | enum | `GET` | HTTP method the webhook responds to. Options:
    `GET`, `POST`, `PUT`, `PATCH`, `DELETE`, `HEAD` |

    | **Path** | string | auto-generated UUID | URL path segment. The full URL is
    `{base_url}/webhook/{path}` |

    | **Authentication** | enum | `None` | Authentication method. Options: `None`,
    `Basic Auth`, `Header Auth` |

    | **Respond** | enum | `When Last Node Finishes` | When to send the HTTP response.
    Options: `Immediately`, `When Last Node Finishes`, `Using Respond to Webhook Node`
    |

    | **Response Code** | number | `200` | HTTP status code returned to the caller
    |

    | **Response Data** | enum | `First Entry JSON` | What data to return. Options:
    `All Entries`, `First Entry JSON`, `First Entry Binary`, `No Response Body` |'
