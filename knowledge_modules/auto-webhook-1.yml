content:
  docs_markdown: "## Webhook node reference\n\nThe Webhook node is a trigger node\
    \ that starts a workflow when it receives an HTTP request at a unique URL. It\
    \ supports GET, POST, PUT, PATCH, DELETE, and HEAD methods.\n\n## Parameters\n\
    \n| Parameter | Type | Default | Description |\n| --- | --- | --- | --- |\n| **HTTP\
    \ Method** | enum | `GET` | HTTP method the webhook responds to. Options: `GET`,\
    \ `POST`, `PUT`, `PATCH`, `DELETE`, `HEAD` |\n| **Path** | string | auto-generated\
    \ UUID | URL path segment. The full URL is `{base_url}/webhook/{path}` |\n| **Authentication**\
    \ | enum | `None` | Authentication method. Options: `None`, `Basic Auth`, `Header\
    \ Auth` |\n| **Respond** | enum | `When Last Node Finishes` | When to send the\
    \ HTTP response. Options: `Immediately`, `When Last Node Finishes`, `Using Respond\
    \ to Webhook Node` |\n| **Response Code** | number | `200` | HTTP status code\
    \ returned to the caller |\n| **Response Data** | enum | `First Entry JSON` |\
    \ What data to return. Options: `All Entries`, `First Entry JSON`, `First Entry\
    \ Binary`, `No Response Body` |\n\n## Authentication options\n\n| Method | Credential\
    \ type | Header checked |\n| --- | --- | --- |\n| None | \u2014 | \u2014 |\n|\
    \ Basic Auth | Basic Auth | `Authorization: Basic {base64}` |\n| Header Auth |\
    \ Header Auth | Custom header name/value pair |"
