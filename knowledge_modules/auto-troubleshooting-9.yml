content:
  docs_markdown: '## Performance baseline


    After resolving issues, your pipeline should show:


    | Metric | Good | Warning | Critical |

    | --- | --- | --- | --- |

    | Quality score | 80+ | 70-79 | Below 70 |

    | Failed protocols | 0 | 1 | 2 or more |

    | High-priority gaps | 0-2 | 3-5 | 6 or more |

    | Pipeline exit code | 0 | 1 (non-critical) | 2 (critical failure) |

    | Retrieval precision | 0.7+ | 0.5-0.69 | Below 0.5 |


    ## Next steps


    - [How-to: keep docs aligned with every release](how-to.md) for the operational
    workflow

    - [Quality evidence and gate results](../quality/evidence.md) for current gate
    status

    - [Concept: pipeline-first documentation lifecycle](concept.md) to understand
    the pipeline architecture'
