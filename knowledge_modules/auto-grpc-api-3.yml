content:
  docs_markdown: "<div id=\"grpc-playground\" style=\"border:1px solid #d1d5db; padding:12px;\
    \ border-radius:8px;\">\n  <p><strong>Gateway Endpoint:</strong> <code id=\"grpc-endpoint-view\"\
    ></code></p>\n  <label>Service</label><br/><input id=\"grpc-service\" style=\"\
    width:100%\" placeholder=\"GreeterService\"/><br/>\n  <label>Method</label><br/><input\
    \ id=\"grpc-method\" style=\"width:100%\" placeholder=\"SayHello\"/><br/>\n  <label>Payload\
    \ (JSON)</label><br/><textarea id=\"grpc-payload\" rows=\"8\" style=\"width:100%;\
    \ font-family:monospace;\">{\n  \"name\": \"world\"\n}</textarea><br/>\n  <button\
    \ id=\"grpc-run\">Invoke</button>\n  <pre id=\"grpc-output\" style=\"margin-top:12px;\
    \ max-height:320px; overflow:auto;\"></pre>\n</div>\n<script>\n(function(){ const\
    \ endpoint = \"\";\nconst view = document.getElementById('grpc-endpoint-view');\n\
    const run = document.getElementById('grpc-run');\nconst service = document.getElementById('grpc-service');\n\
    const method = document.getElementById('grpc-method');\nconst payload = document.getElementById('grpc-payload');\n\
    const out = document.getElementById('grpc-output');\nif (!view || !run || !service\
    \ || !method || !payload || !out) return;\nview.textContent = endpoint || 'not\
    \ configured';\nfunction fallback(body){\n  const m = String((body && body.method)\
    \ || '').toLowerCase();\n  const p = (body && body.payload && typeof body.payload\
    \ === 'object') ? body.payload : {};\n  if (m === 'getproject') return { id: p.project_id\
    \ || 'prj_abc123', name: 'Website Redesign', status: 'active' };\n  if (m ===\
    \ 'createproject') return { id: 'prj_demo001', name: p.name || 'New Project',\
    \ status: p.status || 'draft' };\n  if (m === 'listprojects') return [{ id: 'prj_abc123',\
    \ status: 'active' }, { id: 'prj_def456', status: 'draft' }];\n  return { error:\
    \ { code: 'UNIMPLEMENTED', message: 'Use GetProject, CreateProject, or ListProjects'\
    \ } };\n}\nrun.onclick = async function(){\n  try {\n    const body = { service:\
    \ service.value.trim(), method: method.value.trim(), payload: JSON.parse(payload.value\
    \ || '{}') };\n    if (!endpoint) {\n      out.textContent = JSON.stringify({\
    \ mode: 'semantic-fallback', simulated_response: fallback(body) }, null, 2);\n\
    \      return;\n    }\n    out.textContent = 'Loading...';\n    const response\
    \ = await fetch(endpoint, { method:'POST', headers:{'content-type':'application/json'},\
    \ body: JSON.stringify(body) });\n    const text = await response.text();\n  \
    \  out.textContent = JSON.stringify({ mode: 'live', raw: text, simulated_response:\
    \ fallback(body) }, null, 2);\n  } catch (error) {\n    let body = { method: method.value.trim(),\
    \ payload: {} };\n    try { body.payload = JSON.parse(payload.value || '{}');\
    \ } catch (_) {}\n    out.textContent = JSON.stringify({ mode: 'semantic-fallback',\
    \ error: String(error), simulated_response: fallback(body) }, null, 2);\n  }\n\
    };\n})();\n</script>"
