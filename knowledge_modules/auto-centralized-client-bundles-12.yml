content:
  docs_markdown: "## \u041E\u0444\u043B\u0430\u0439\u043D \u043F\u0440\u043E\u0434\
    \u043B\u0435\u043D\u0438\u0435 \u043B\u0438\u0446\u0435\u043D\u0437\u0438\u0438\
    \ \u0434\u043B\u044F strict-local\n\n\u0414\u043B\u044F `strict-local` \u043D\u0435\
    \ \u043D\u0443\u0436\u043D\u043E \u043F\u0435\u0440\u0435\u0443\u0441\u0442\u0430\
    \u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0442\u044C \u0432\u0435\u0441\u044C\
    \ `docsops/`. \u041E\u0431\u044B\u0447\u043D\u043E \u043E\u0431\u043D\u043E\u0432\
    \u043B\u044F\u044E\u0442\u0441\u044F \u0442\u043E\u043B\u044C\u043A\u043E:\n\n\
    - `docsops/license.jwt`\n- `docsops/.capability_pack.enc` (\u0435\u0441\u043B\u0438\
    \ \u0432\u044B \u043E\u0431\u043D\u043E\u0432\u043B\u044F\u0435\u0442\u0435 premium\
    \ pack)\n\n\u041E\u043F\u0435\u0440\u0430\u0442\u043E\u0440 \u0441\u043E\u0431\
    \u0438\u0440\u0430\u0435\u0442 renewal-\u0430\u0440\u0445\u0438\u0432 \u043D\u0430\
    \ \u0441\u0432\u043E\u0435\u0439 \u0441\u0442\u043E\u0440\u043E\u043D\u0435:\n\
    \n```bash\npython3 scripts/build_offline_renewal_bundle.py \\\n  --client-id acme\
    \ \\\n  --plan enterprise \\\n  --days 30 \\\n  --tenant-id acme \\\n  --company-domain\
    \ acme.example \\\n  --with-pack \\\n  --license-key \"<LICENSE_KEY>\"\n```\n\n\
    \u041F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E \u0441\u043E\
    \u0437\u0434\u0430\u0435\u0442\u0441\u044F:\n\n```text\ngenerated/offline_renewals/renewal-<client_id>-<YYYYMMDD>.zip\n\
    ```\n\n\u0415\u0441\u043B\u0438 \u043D\u0443\u0436\u0435\u043D `tar.gz`:\n\n```bash\n\
    python3 scripts/build_offline_renewal_bundle.py \\\n  --client-id acme \\\n  --plan\
    \ enterprise \\\n  --days 30 \\\n  --format tar.gz\n```\n\n\u0427\u0442\u043E\
    \ \u0432\u043D\u0443\u0442\u0440\u0438 renewal-\u0430\u0440\u0445\u0438\u0432\u0430\
    :\n\n- `docsops/license.jwt`\n- `docsops/.capability_pack.enc` (\u043E\u043F\u0446\
    \u0438\u043E\u043D\u0430\u043B\u044C\u043D\u043E)\n- `README_RENEWAL.md` (\u0438\
    \u043D\u0441\u0442\u0440\u0443\u043A\u0446\u0438\u044F \u0434\u043B\u044F \u043A\
    \u043B\u0438\u0435\u043D\u0442\u0430)\n- `renewal_manifest.json`\n\n\u041A\u0430\
    \u043A \u043A\u043B\u0438\u0435\u043D\u0442 \u043F\u0440\u0438\u043C\u0435\u043D\
    \u044F\u0435\u0442 \u043E\u0431\u043D\u043E\u0432\u043B\u0435\u043D\u0438\u0435\
    :\n\n\\11. \u0420\u0430\u0441\u043F\u0430\u043A\u043E\u0432\u0430\u0442\u044C\
    \ \u0430\u0440\u0445\u0438\u0432 \u0432 \u043A\u043E\u0440\u0435\u043D\u044C \u0440\
    \u0435\u043F\u043E\u0437\u0438\u0442\u043E\u0440\u0438\u044F (\u0433\u0434\u0435\
    \ \u043B\u0435\u0436\u0438\u0442 `docsops/`).\n\\11. \u0417\u0430\u043C\u0435\u043D\
    \u0438\u0442\u044C `docsops/license.jwt` (\u0438 `docsops/.capability_pack.enc`,\
    \ \u0435\u0441\u043B\u0438 \u043E\u043D \u0435\u0441\u0442\u044C \u0432 \u0430\
    \u0440\u0445\u0438\u0432\u0435).\n\\11. \u041F\u0440\u043E\u0432\u0435\u0440\u0438\
    \u0442\u044C \u043B\u0438\u0446\u0435\u043D\u0437\u0438\u044E:\n\n```bash\npython3\
    \ docsops/scripts/license_gate.py --json\n```"
  assistant_context: "Use this module when answering questions related to: \u0426\u0435\
    \u043D\u0442\u0440\u0430\u043B\u0438\u0437\u043E\u0432\u0430\u043D\u043D\u0430\
    \u044F \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0430 \u043A\u043B\u0438\
    \u0435\u043D\u0442\u043E\u0432 (Part 12). Source path: operations/CENTRALIZED_CLIENT_BUNDLES.md.\
    \ Summary: \u041F\u0440\u0430\u043A\u0442\u0438\u0447\u0435\u0441\u043A\u0438\u0439\
    \ \u043F\u0443\u0442\u044C \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438\
    \ \u043A\u043B\u0438\u0435\u043D\u0442\u0441\u043A\u0438\u0445 bundle \u0438 \u0430\
    \u0432\u0442\u043E\u0437\u0430\u043F\u0443\u0441\u043A\u0430 pipeline \u0438\u0437\
    \ \u043E\u0434\u043D\u043E\u0433\u043E \u043C\u0435\u0441\u0442\u0430.\n\n## \u041E\
    \u0444\u043B\u0430\u0439\u043D \u043F\u0440\u043E\u0434\u043B\u0435\u043D\u0438\
    \u0435 \u043B\u0438\u0446\u0435\u043D\u0437\u0438\u0438 \u0434\u043B\u044F strict-local\n\
    \n\u0414\u043B\u044F `strict-local` \u043D\u0435 \u043D\u0443\u0436\u043D\u043E\
    \ \u043F\u0435\u0440\u0435\u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\
    \u0432\u0430\u0442\u044C \u0432\u0435\u0441\u044C `docsops/`. \u041E\u0431\u044B\
    \u0447\u043D\u043E \u043E\u0431\u043D\u043E\u0432\u043B\u044F\u044E\u0442\u0441\
    \u044F \u0442\u043E\u043B\u044C\u043A\u043E:\n\n- `docsops/license.jwt`\n- `docsops/.capability_pack.enc`\
    \ (\u0435\u0441\u043B\u0438 \u0432\u044B \u043E\u0431\u043D\u043E\u0432\u043B\u044F\
    \u0435\u0442\u0435 premium pack)\n\n\u041E\u043F\u0435\u0440\u0430\u0442\u043E\
    \u0440 \u0441\u043E\u0431\u0438\u0440\u0430\u0435\u0442 renewal-\u0430\u0440\u0445\
    \u0438\u0432 \u043D\u0430 \u0441\u0432\u043E\u0435\u0439 \u0441\u0442\u043E\u0440\
    \u043E\u043D\u0435:\n\n```bash\npython3 scripts/build_offline_renewal_bundle.py\
    \ \\\n  --client-id acme \\\n  --plan enterprise \\\n  --days 30 \\\n  --tenant-id\
    \ acme \\\n  --company-domain acme.example \\\n  --with-pack \\\n  --license-key\
    \ \"<LICENSE_KEY>\"\n```\n\n\u041F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\
    \u0438\u044E \u0441\u043E\u0437\u0434\u0430\u0435\u0442\u0441\u044F:\n\n```text\n\
    generated/offline_renewals/renewal-<client_id>-<YYYYMMDD>.zip\n```\n\n\u0415\u0441\
    \u043B\u0438 \u043D\u0443\u0436\u0435\u043D `tar.gz`:\n\n```bash\npython3 scripts/build_offline_renewal_bundle.py\
    \ \\\n  --client-id acme \\\n  --plan enterprise \\\n  --days 30 \\\n  --format\
    \ tar.gz\n```\n\n\u0427\u0442\u043E \u0432\u043D\u0443\u0442\u0440\u0438 renewal-\u0430\
    \u0440\u0445\u0438\u0432\u0430:\n\n- `docsops/license.jwt`\n- `docsops/.capability_pack.enc`\
    \ (\u043E\u043F\u0446\u0438\u043E\u043D\u0430\u043B\u044C\u043D\u043E)\n- `README_RENEWAL.md`\
    \ (\u0438\u043D\u0441\u0442\u0440\u0443\u043A\u0446\u0438\u044F \u0434\u043B\u044F\
    \ \u043A\u043B\u0438\u0435\u043D\u0442\u0430)\n- `renewal_manifest.json`\n\n\u041A\
    \u0430\u043A \u043A\u043B\u0438\u0435\u043D\u0442 \u043F\u0440\u0438\u043C\u0435\
    \u043D\u044F\u0435\u0442 \u043E\u0431\u043D\u043E\u0432\u043B\u0435\u043D\u0438\
    \u0435:\n\n\\11. \u0420\u0430\u0441\u043F\u0430\u043A\u043E\u0432\u0430\u0442\u044C\
    \ \u0430\u0440\u0445\u0438\u0432 \u0432 \u043A\u043E\u0440\u0435\u043D\u044C \u0440\
    \u0435\u043F\u043E\u0437\u0438\u0442\u043E\u0440\u0438\u044F (\u0433\u0434\u0435\
    \ \u043B\u0435\u0436\u0438\u0442 `docsops/`).\n\\11. \u0417\u0430\u043C\u0435\u043D\
    \u0438\u0442\u044C `docsops/license.jwt` (\u0438 `docsops/.capability_pack.enc`,\
    \ \u0435\u0441\u043B\u0438 \u043E\u043D \u0435\u0441\u0442\u044C \u0432 \u0430\
    \u0440\u0445\u0438\u0432\u0435).\n\\11. \u041F\u0440\u043E\u0432\u0435\u0440\u0438\
    \u0442\u044C \u043B\u0438\u0446\u0435\u043D\u0437\u0438\u044E:\n\n```bash\npython3\
    \ docsops/scripts/license_gate.py --json\n```"
