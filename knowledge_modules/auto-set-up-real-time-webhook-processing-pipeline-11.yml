content:
  docs_markdown: "### Problem: Signature mismatch on incoming webhooks\n\n**Cause:**\
    \ The payload body was modified in transit. Common causes include middleware that\
    \ parses the JSON body before signature verification or character encoding differences\
    \ between sender and receiver.\n\n**Solution:**\n\n1. Capture the raw request\
    \ body before any JSON parsing.\n1. Verify that your framework does not modify\
    \ whitespace or field ordering.\n1. Compare the raw bytes, not a re-serialized\
    \ JSON string.\n\n```python\n# Flask: capture raw body before parsing\nfrom flask\
    \ import Flask, request\n\napp = Flask(__name__)\n\n@app.route(\"/webhooks\",\
    \ methods=[\"POST\"])\ndef webhook_handler():\n    raw_body = request.get_data(as_text=True)\
    \  # Raw bytes, not parsed JSON\n    signature = request.headers.get(\"X-Webhook-Signature\"\
    , \"\")\n    if not verify_webhook_signature(raw_body, signature, WEBHOOK_SECRET):\n\
    \        return \"Invalid signature\", 401\n    # Process the verified payload\n\
    \    event = request.get_json()\n    return \"OK\", 200\n```"
