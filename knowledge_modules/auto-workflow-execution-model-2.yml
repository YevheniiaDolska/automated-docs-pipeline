content:
  docs_markdown: "## Execution modes\n\nThe platform supports two execution modes\
    \ that affect error handling and performance.\n\n=== \"Regular mode (default)\"\
    \n\n Nodes execute one at a time. If a node fails, execution stops and the workflow\
    \ reports an error. This mode is predictable and easier to debug.\n\n Typical\
    \ setting: `EXECUTIONS_MODE=regular`\n\n=== \"Queue mode (production)\"\n\n Workflow\
    \ executions are distributed across worker processes. This mode handles high-volume\
    \ workloads (hundreds of concurrent executions) and requires a Redis instance\
    \ for coordination.\n\n Typical setting: `EXECUTIONS_MODE=queue`\n\n## Error handling\n\
    \nWhen a node fails, behavior depends on the node's error handling setting:\n\n\
    - **Stop execution** (default): The workflow stops. The error appears in the execution\
    \ log.\n- **Continue on fail**: The node outputs an error object, and the next\
    \ node receives it. Use this for non-critical steps like logging.\n- **Error Trigger\
    \ workflow**: A separate workflow handles the error path. This pattern is common\
    \ for alerting and retry logic.\n\n## Key implications for documentation writers\n\
    \nThe execution model means that every node reference page should document what\
    \ input format the node expects, what output format it produces (how many items,\
    \ what structure), and how the node behaves with multiple items (once for all\
    \ vs. once per item)."
