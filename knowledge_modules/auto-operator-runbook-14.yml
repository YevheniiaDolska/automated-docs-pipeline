  docs_markdown: "### Step 3.6: Run a smoke test\n\nRun one manual weekly cycle to\
    \ verify everything works:\n\n```bash\ncd /path/to/client-repo\npython3 docsops/scripts/run_weekly_gap_batch.py\
    \ \\\n  --docsops-root docsops \\\n  --reports-dir reports\n```\n\nVerify:\n\n\
    - [ ] Script completes without errors (warnings are OK).\n- [ ] `reports/consolidated_report.json`\
    \ was created with a fresh timestamp.\n- [ ] `reports/docsops_status.json` exists.\n\
    \nIf the smoke test passes, the scheduler takes over and runs this automatically\
    \ every Monday."
