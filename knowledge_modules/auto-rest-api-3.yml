content:
  docs_markdown: "### List all projects\n\n```\nGET /v1/projects\n```\n\nReturns a\
    \ paginated list of projects. Supports filtering by `status` and sorting by `created_at`.\n\
    \n**Query parameters:**\n\n| Parameter | Type | Default | Description |\n| ---\
    \ | --- | --- | --- |\n| `page` | integer | `1` | Page number (1-indexed) |\n\
    | `per_page` | integer | `25` | Results per page (max 100) |\n| `status` | string\
    \ | -- | Filter by status: `active`, `archived`, `draft` |\n| `sort` | string\
    \ | `created_at` | Sort field: `created_at`, `updated_at`, `name` |\n| `order`\
    \ | string | `desc` | Sort order: `asc`, `desc` |\n\n**Example request:**\n\n\
    ```bash\ncurl -X GET \"https://api.veriops.example/v1/projects?status=active&per_page=10\"\
    \ \\\n  -H \"Authorization: Bearer YOUR_API_KEY\"\n```\n\n<!-- requires: api-key\
    \ -->\n\n**Example response (HTTP 200):**\n\n```json\n{\n  \"data\": [\n    {\n\
    \      \"id\": \"prj_abc123\",\n      \"name\": \"Website Redesign\",\n      \"\
    status\": \"active\",\n      \"description\": \"Q2 website refresh with new design\
    \ system\",\n      \"created_at\": \"2026-01-15T09:30:00Z\",\n      \"updated_at\"\
    : \"2026-03-10T14:22:00Z\",\n      \"task_count\": 47,\n      \"owner_id\": \"\
    usr_456\"\n    }\n  ],\n  \"pagination\": {\n    \"page\": 1,\n    \"per_page\"\
    : 10,\n    \"total\": 142,\n    \"total_pages\": 15\n  }\n}\n```"
