content:
  docs_markdown: "## 3. How to apply a plan for a client\n\n\\11. Copy `profiles/clients/_template.client.yml`\
    \ to `profiles/clients/<client>.client.yml`.\n\\11. Copy one preset from this\
    \ page into the new profile.\n\\11. Adjust paths (`docs_root`, `api_root`, `sdk_root`)\
    \ and output targets.\n\\11. Build/install:\n\n```bash\npython3 scripts/provision_client_repo.py\
    \ \\\n  --client profiles/clients/<client>.client.yml \\\n  --client-repo /path/to/client-repo\
    \ \\\n  --docsops-dir docsops \\\n  --install-scheduler linux\n```\n\n## 4. Plan\
    \ upgrade path\n\n- `Basic -> Pro`: turn on `drift_detection`, `docs_contract`,\
    \ `kpi_sla`, `rag_optimization`, `knowledge_validation`, set `api_first.enabled=true`.\n\
    - `Pro -> Enterprise`: enable `verify_user_path`, `run_docs_lint`, stricter `policy_overrides.kpi_sla`,\
    \ add full weekly custom tasks.\n\n## Next steps\n\n- [Documentation index](../index.md)"
