content:
  docs_markdown: '### Error codes


    | Code | HTTP equivalent | Meaning | Resolution |

    | --- | --- | --- | --- |

    | `UNAUTHENTICATED` | 401 | Missing or invalid bearer token | Provide a valid
    `Authorization: Bearer` header |

    | `FORBIDDEN` | 403 | Token valid but lacks required scope | Request the `graphql:read`
    or `graphql:write` scope |

    | `NOT_FOUND` | 404 | Requested resource does not exist | Verify the resource
    ID |

    | `QUERY_TOO_COMPLEX` | 400 | Query exceeds 500 complexity points | Reduce nesting
    depth or remove unnecessary fields |

    | `QUERY_TOO_DEEP` | 400 | Query exceeds 10 levels of nesting | Flatten the query
    or use separate requests |

    | `RATE_LIMITED` | 429 | Exceeded 60 requests per minute | Implement request throttling
    on the client |

    | `INTERNAL_ERROR` | 500 | Server error | Retry with exponential backoff (max
    3 attempts) |


    ## Performance limits


    | Limit | Value | Notes |

    | --- | --- | --- |

    | Max query depth | 10 levels | Nested field resolution depth |

    | Max complexity | 500 points | Each field costs 1 point, lists cost 10 points
    |

    | Max query size | 10 KB | Request body size limit |

    | Timeout | 30 seconds | Per-query execution timeout |

    | Batch queries | Up to 5 | Multiple queries in one request |'
