content:
  docs_markdown: "## Live query editor\n\nEnter a GraphQL query and click **Run query**\
    \ to execute it against the Postman mock sandbox.\n\n!!! info \"Sandbox mode\"\
    \n    Queries route to the Postman mock server at\n    [`https://662b99a9-ac2a-4096-8a8e-480a73cef3e3.mock.pstmn.io/graphql`](https://662b99a9-ac2a-4096-8a8e-480a73cef3e3.mock.pstmn.io/graphql).\n\
    \    No API key is required for sandbox requests.\n\n<div style=\"border:1px solid\
    \ #dbe2ea;border-radius:10px;padding:16px;background:#f8f9fa\">\n<label><strong>GraphQL\
    \ query:</strong></label>\n<textarea id=\"gql-q\" rows=\"10\" style=\"width:100%;font-family:monospace;padding:12px;border:1px\
    \ solid #ccc;border-radius:8px;font-size:14px;margin:4px 0 8px;\">query Health\
    \ {\n  health {\n    status\n    version\n    uptime_seconds\n  }\n}</textarea>\n\
    <button id=\"gql-run\" style=\"margin:8px 0;padding:8px 24px;background:#1a73e8;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px\"\
    >Run query</button>\n<pre id=\"gql-out\" style=\"max-height:320px;overflow:auto;border:1px\
    \ solid #dbe2ea;padding:12px;border-radius:10px;background:#fff;margin-top:8px;\"\
    ></pre>\n</div>\n\n<script>\n/* Sandbox onclick is set by acme-sandbox.js with\
    \ local mock responses */\n</script>"
