content:
  docs_markdown: '### Issue: gRPC stage fails


    The `protoc` compiler is not installed.


    **Solution:**


    ```bash

    apt-get install -y protobuf-compiler

    protoc --version

    ```


    Then re-run the pipeline.


    ### Issue: quality score below 80


    Stale documents, missing frontmatter, or unresolved documentation gaps.


    **Solution:**


    1. Run `python3 -c "import json; r=json.load(open(''reports/acme-demo/doc_gaps_report.json''));
    print(len([g for g in r.get(''gaps'',[]) if g.get(''priority'')==''high'']), ''high-priority
    gaps'')"` to count gaps.

    1. Address each gap by creating or updating documents.

    1. Re-run the pipeline.


    ### Issue: MkDocs build fails with theme error


    **Solution:**


    ```bash

    pip install mkdocs-material mkdocs-macros-plugin

    ```


    ## Next steps


