content:
  docs_markdown: "### Request 2: Capability pack refresh\n\n**When:** During weekly\
    \ batch run, or when the current pack approaches expiration.\n\n**Endpoint:**\
    \ `POST /v1/pack/refresh`\n\n**Frequency:** Weekly (configurable per plan).\n\n\
    ```json\n{\n  \"authorization\": \"Bearer <license-jwt>\"\n}\n```\n\nThe JWT contains\
    \ only license metadata (client ID, plan tier, expiration). The JWT payload schema:\n\
    \n```json\n{\n  \"sub\": \"acme-corp\",\n  \"plan\": \"enterprise\",\n  \"iat\"\
    : 1750000000,\n  \"exp\": 1781536000\n}\n```\n\n**What is NOT sent:** No document\
    \ content, no file listings, no quality scores, no report data.\n\n### Request\
    \ 3: Update check\n\n**When:** During weekly batch run, or manual `python3 scripts/check_updates.py`.\n\
    \n**Endpoint:** `GET /v1/check`\n\n**Frequency:** Weekly (automatic), or on-demand.\n\
    \n```text\nGET /v1/check?version=1.2.0&platform=linux-x86_64\nUser-Agent: VeriOps-Pipeline-Updater/1.0\n\
    ```\n\n**Query parameters:**\n\n| Parameter | Type | Description | Contains client\
    \ data? |\n| --- | --- | --- | --- |\n| `version` | string | Current installed\
    \ pipeline version | No |\n| `platform` | string | OS and architecture identifier\
    \ | No |\n\n**What is NOT sent:** No license info, no document counts, no quality\
    \ metrics, no file paths."
