content:
  docs_markdown: "## \u0415\u0436\u0435\u043D\u0435\u0434\u0435\u043B\u044C\u043D\u044B\
    \u0439 \u0430\u0432\u0442\u043E\u043C\u0430\u0442\u0438\u0447\u0435\u0441\u043A\
    \u0438\u0439 \u043F\u043E\u0442\u043E\u043A\n\n\u0421\u043A\u0440\u0438\u043F\u0442\
    \ `docsops/scripts/run_weekly_gap_batch.py` \u043F\u043E \u0440\u0430\u0441\u043F\
    \u0438\u0441\u0430\u043D\u0438\u044E:\n\n\\11. \u0421\u043E\u0431\u0438\u0440\u0430\
    \u0435\u0442 gap report \u0437\u0430 \u043F\u043E\u0441\u043B\u0435\u0434\u043D\
    \u0438\u0435 7 \u0434\u043D\u0435\u0439.\n\\11. \u041F\u0440\u043E\u0432\u0435\
    \u0440\u044F\u0435\u0442 stale-\u0434\u043E\u043A\u0438 (\u043F\u043E \u0443\u043C\
    \u043E\u043B\u0447\u0430\u043D\u0438\u044E 180 \u0434\u043D\u0435\u0439 \u0431\
    \u0435\u0437 \u0438\u0437\u043C\u0435\u043D\u0435\u043D\u0438\u0439).\n\\11. \u0417\
    \u0430\u043F\u0443\u0441\u043A\u0430\u0435\u0442 KPI/SLA (\u0435\u0441\u043B\u0438\
    \ \u0432\u043A\u043B\u044E\u0447\u0435\u043D\u043E \u0432 bundle).\n\\11. \u041F\
    \u0440\u0438 `mode=api-first|hybrid` \u0437\u0430\u043F\u0443\u0441\u043A\u0430\
    \u0435\u0442 API-first flow (\u0435\u0441\u043B\u0438 \u0432\u043A\u043B\u044E\
    \u0447\u0435\u043D\u043E \u0432 `runtime.api_first.enabled`).\n\\11. \u0414\u043B\
    \u044F API sandbox \u043F\u043E\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\
    \u0435\u0442 3 \u0440\u0435\u0436\u0438\u043C\u0430: `docker`, `prism` (\u0431\
    \u0435\u0437 Docker), `external` (\u043F\u0443\u0431\u043B\u0438\u0447\u043D\u044B\
    \u0439 URL).\n\\11. \u0415\u0441\u043B\u0438 `runtime.api_first.sync_playground_endpoint=true`,\
    \ URL \u043F\u0435\u0441\u043E\u0447\u043D\u0438\u0446\u044B \u0430\u0432\u0442\
    \u043E\u043C\u0430\u0442\u0438\u0447\u0435\u0441\u043A\u0438 \u043F\u0438\u0448\
    \u0435\u0442\u0441\u044F \u0432 `mkdocs.yml`.\n\\11. \u041F\u0440\u0438\u043C\u0435\
    \u043D\u044F\u0435\u0442 manual overrides \u043A OpenAPI \u0430\u0440\u0442\u0435\
    \u0444\u0430\u043A\u0442\u0430\u043C (\u0435\u0441\u043B\u0438 \u0437\u0430\u0434\
    \u0430\u043D `manual_overrides_path`).\n\\11. \u041F\u0440\u043E\u0432\u0435\u0440\
    \u044F\u0435\u0442 regression snapshot (\u0435\u0441\u043B\u0438 \u0437\u0430\u0434\
    \u0430\u043D `regression_snapshot_path`).\n\\11. \u0413\u0435\u043D\u0435\u0440\
    \u0438\u0440\u0443\u0435\u0442 API test assets \u0438\u0437 OpenAPI (`generate_api_test_assets.py`).\n\
    \\11. \u041E\u043F\u0446\u0438\u043E\u043D\u0430\u043B\u044C\u043D\u043E \u0437\
    \u0430\u0433\u0440\u0443\u0436\u0430\u0435\u0442 test assets \u0432 TestRail/Zephyr\
    \ (`upload_api_test_assets.py`).\n\\11. \u0413\u0435\u043D\u0435\u0440\u0438\u0440\
    \u0443\u0435\u0442 \u0438 \u0432\u0430\u043B\u0438\u0434\u0438\u0440\u0443\u0435\
    \u0442 \u043C\u0443\u043B\u044C\u0442\u0438\u044F\u0437\u044B\u0447\u043D\u044B\
    \u0435 \u0432\u043A\u043B\u0430\u0434\u043A\u0438 \u043A\u043E\u0434\u0430 (\u043D\
    \u043E\u0432\u044B\u0439 \u0441\u0442\u0430\u043D\u0434\u0430\u0440\u0442).\n\\\
    11. \u0412\u044B\u043F\u043E\u043B\u043D\u044F\u0435\u0442 smoke-\u043F\u0440\u043E\
    \u0432\u0435\u0440\u043A\u0438 \u043A\u043E\u0434\u0430 \u0438 \u0441\u0432\u0435\
    \u0440\u044F\u0435\u0442 `expected-output` (\u0435\u0441\u043B\u0438 \u0443\u043A\
    \u0430\u0437\u0430\u043D).\n\\11. \u0417\u0430\u043F\u0443\u0441\u043A\u0430\u0435\
    \u0442 `runtime.custom_tasks.weekly` (\u0435\u0441\u043B\u0438 \u0432\u043A\u043B\
    \u044E\u0447\u0435\u043D\u044B).\n\\11. \u0421\u043E\u0437\u0434\u0430\u0435\u0442\
    \ `reports/consolidated_report.json`.\n\n\u0412\u0430\u0436\u043D\u043E: API-first\
    \ \u0437\u0434\u0435\u0441\u044C \u0442\u043E\u043B\u044C\u043A\u043E \u043E\u0434\
