    \u0441\u043E\u0432. \u0413\u043B\u0430\u0432\u043D\u044B\u0439 \u043A\u043E\u043D\
    \u0442\u0443\u0440 \u043E\u0445\u0432\u0430\u0442\u044B\u0432\u0430\u0435\u0442\
    \ \u0432\u0441\u0435 \u0442\u0438\u043F\u044B \u0434\u043E\u043A\u0443\u043C\u0435\
    \u043D\u0442\u0430\u0446\u0438\u0438 \u0438 quality automation \u0446\u0435\u043B\
    \u0438\u043A\u043E\u043C.\n\n\u041F\u0440\u043E\u0441\u0442\u043E\u0439 \u0440\
    \u0435\u043A\u043E\u043C\u0435\u043D\u0434\u0443\u0435\u043C\u044B\u0439 \u0431\
    \u043B\u043E\u043A \u0434\u043B\u044F \u043F\u0443\u0431\u043B\u0438\u0447\u043D\
    \u043E\u0439 API \u043F\u0435\u0441\u043E\u0447\u043D\u0438\u0446\u044B:"
