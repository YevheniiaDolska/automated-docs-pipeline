content:
  docs_markdown: "## 8. Universal tasks (core UTP, not optional extras)\n\nUse `runtime.custom_tasks.weekly`\
    \ to wire any command from the capabilities catalog.\n\n```yaml\nruntime:\n  custom_tasks:\n\
    \    weekly:\n      - id: \"geo-lint\"\n        enabled: true\n        command:\
    \ \"python3 docsops/scripts/seo_geo_optimizer.py docs/\"\n        continue_on_error:\
    \ true\n      - id: \"openapi-lint\"\n        enabled: true\n        command:\
    \ \"npm run lint:openapi\"\n        continue_on_error: true\n    on_demand: []\n\
    ```\n\nFull list of available capabilities:\n\n- `docs/operations/PIPELINE_CAPABILITIES_CATALOG.md`\n\
    - regenerate catalog: `python3 scripts/generate_pipeline_capabilities_catalog.py`\n\
    \nRecommended default for smooth intent assembly:\n\n- Keep `scripts/build_all_intent_experiences.py`\
    \ in `bundle.include_scripts`.\n- Keep `python3 docsops/scripts/build_all_intent_experiences.py`\
    \ enabled in `runtime.custom_tasks.weekly`.\n- Keep `knowledge_modules` in `bundle.include_paths`\
    \ (or store it directly in client repo)."
