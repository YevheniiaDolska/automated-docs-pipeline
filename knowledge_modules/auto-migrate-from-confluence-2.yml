content:
  docs_markdown: "### Step 1: Create an API token\n\n=== \"Cloud\"\n\n    1. Go to\
    \ [Atlassian API tokens](https://id.atlassian.com/manage-profile/security/api-tokens)\n\
    \    1. Select **Create API token**\n    1. Enter a label (for example, \"docs-migration\"\
    ) and select **Create**\n    1. Copy the token value\n\n=== \"Server/Data Center\"\
    \n\n    1. Go to your profile in Confluence Server\n    1. Select **Personal Access\
    \ Tokens** and then **Create token**\n    1. Enter a name and select **Create**\n\
    \    1. Copy the token value\n\n### Step 2: Identify space keys\n\nFind the space\
    \ keys you want to import. Space keys appear in Confluence URLs\nafter `/spaces/`\
    \ or `/display/`. For example, in a URL like\n`mycompany.atlassian.net/wiki/spaces/DEV/overview`,\
    \ the space key is `DEV`."
