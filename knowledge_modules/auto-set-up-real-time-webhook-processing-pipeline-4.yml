  docs_markdown: "# Test verification with a sample payload\ntest_payload = '{\"event\"\
    : \"order.completed\", \"order_id\": \"ord_1234\", \"amount\": 2999}'\ntest_secret\
    \ = \"whsec_test_secret_key_abc123_min32chars\"\ntest_timestamp = str(int(time.time()))\n\
    test_sig = hmac.new(\n    test_secret.encode(\"utf-8\"),\n    f\"{test_timestamp}.{test_payload}\"\
    .encode(\"utf-8\"),\n    hashlib.sha256,\n).hexdigest()\ntest_header = f\"t={test_timestamp},v1={test_sig}\"\
    \n\nresult = verify_webhook_signature(test_payload, test_header, test_secret)\n\
    print(\"Signature valid:\", result)\n```"
