content:
  docs_markdown: '## Pagination


    All list endpoints support cursor-based pagination:


    | Parameter | Type | Default | Description |

    | --- | --- | --- | --- |

    | `page` | integer | `1` | Page number (1-indexed) |

    | `per_page` | integer | `25` | Results per page (range: 1-100) |


    The response includes a `pagination` object with `total`, `total_pages`, `page`,
    and `per_page` fields.


    ## Next steps


    - [GraphQL playground](graphql-playground.md) for flexible queries across resources

    - [Tutorial: launch your first integration](../guides/tutorial.md) to create a
    project end-to-end

    - [AsyncAPI event docs](asyncapi-events.md) for real-time event notifications'
