  docs_markdown: "<div id=\"websocket-playground\" style=\"border:1px solid #d1d5db;\
    \ padding:12px; border-radius:8px;\">\n  <p><strong>Endpoint:</strong> <code id=\"\
    websocket-endpoint-view\"></code></p>\n  <textarea id=\"websocket-message\" rows=\"\
    8\" style=\"width:100%; font-family:monospace;\">{\n  \"action\": \"ping\"\n}</textarea><br/>\n\
    \  <button id=\"websocket-send\">Connect + Send</button>\n  <pre id=\"websocket-output\"\
    \ style=\"margin-top:12px; max-height:320px; overflow:auto;\"></pre>\n</div>\n\
    <script>\n(function(){ const endpoint = \"\";\nconst view = document.getElementById('websocket-endpoint-view');\n\
    const send = document.getElementById('websocket-send');\nconst msg = document.getElementById('websocket-message');\n\
    const out = document.getElementById('websocket-output');\nif (!view || !send ||\
    \ !msg || !out) return;\nview.textContent = endpoint || 'not configured';\nsend.onclick\
    \ = function(){\n  if (!endpoint) { out.textContent = 'Endpoint is not configured\
    \ in runtime.api_protocol_settings.websocket.websocket_endpoint'; return; }\n\
    \  try {\n    const socket = new WebSocket(endpoint);\n    socket.onopen = function(){\
    \ socket.send(msg.value); out.textContent = 'message sent'; };\n    socket.onmessage\
    \ = function(e){ out.textContent = String(e.data); socket.close(); };\n    socket.onerror\
    \ = function(e){ out.textContent = String(e); };\n  } catch (error) { out.textContent\
    \ = String(error); }\n};\n})();\n</script>"
