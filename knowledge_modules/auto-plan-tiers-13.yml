content:
  docs_markdown: 'Protocols per plan: Pilot and Professional allow REST only. Enterprise
    allows all 5 protocols.


    Offline grace period: Pilot 3 days, Professional 7 days, Enterprise 30 days.


    Check license status: `python3 docsops/scripts/license_gate.py`.


    Dev/test bypass: `export VERIOPS_LICENSE_PLAN=enterprise`.


    ## 5. Plan upgrade path


    - `Basic -> Pro`: turn on `drift_detection`, `docs_contract`, `kpi_sla`, `rag_optimization`,
    `knowledge_validation`, set `api_first.enabled=true`. Update `licensing.plan`
    to `professional`.

    - `Pro -> Enterprise`: enable `verify_user_path`, `run_docs_lint`, stricter `policy_overrides.kpi_sla`,
    add full weekly custom tasks. Update `licensing.plan` to `enterprise`.


    After any plan change, rebuild the bundle and re-provision.


    ## Next steps


    - [Operator Runbook](OPERATOR_RUNBOOK.md) -- step-by-step retainer procedures

    - [Documentation index](../index.md)'
