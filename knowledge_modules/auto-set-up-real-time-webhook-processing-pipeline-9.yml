content:
  docs_markdown: "## Webhook processing data flow\n\n```mermaid\nsequenceDiagram\n\
    \    participant C as Client\n    participant G as API Gateway\n    participant\
    \ V as HMAC Validator\n    participant Q as Event Queue\n    participant P as\
    \ Processor\n    participant D as Database\n    C->>G: POST /webhooks (signed\
    \ payload)\n    G->>V: Validate HMAC-SHA256\n    V-->>G: Signature valid\n   \
    \ G->>Q: Enqueue event\n    Q->>P: Process async\n    P->>D: Store result\n  \
    \  P-->>C: 200 OK (acknowledged)\n```\n\n!!! info \"Payload size limit\"\n   \
    \ {{ product_name }} accepts webhook payloads up to {{ max_payload_size_mb }}\
    \ MB. Payloads exceeding this limit receive a `413 Payload Too Large` response.\
    \ For larger data transfers, use a pre-signed URL pattern and send only the URL\
    \ in the webhook payload.\n!!! warning \"Signature verification required\"\n \
    \   Always verify webhook signatures before processing event data. Skipping verification\
    \ exposes your application to forged events, replay attacks, and data injection.\
    \ Use the HMAC-SHA256 functions provided above for both Python and JavaScript.\n\
    !!! tip \"Replay protection window\"\n    Include a timestamp in the signed payload\
    \ and reject events older than 5 minutes. If your servers have clock skew, synchronize\
    \ them with NTP and increase the tolerance window to 600 seconds."
