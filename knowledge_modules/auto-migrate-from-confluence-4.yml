content:
  docs_markdown: "## Method 2: Import from ZIP export\n\nZIP export mode processes\
    \ a Confluence HTML+XML export file offline. Use this\nmethod when you do not\
    \ have API access or need to migrate from an\nair-gapped environment.\n\n### Step\
    \ 1: Export from Confluence\n\n1. Open Confluence and go to the space you want\
    \ to export\n1. Select **Space settings** and then **Content Tools** and then\
    \ **Export**\n1. Choose **XML** export format\n1. Select **Full Export** (includes\
    \ all pages and attachments)\n1. Wait for the export to complete and download\
    \ the ZIP file\n\n### Step 2: Run the migration\n\n```bash\npython3 scripts/run_confluence_migration.py\
    \ \\\n  --export-zip /path/to/confluence-export.zip\n```\n\n## Customize the output\
    \ directory\n\nBy default, imported Markdown files go to\n`docs/imported/confluence/<timestamp>/`.\
    \ Override this with `--output-dir`:\n\n```bash\npython3 scripts/run_confluence_migration.py\
    \ \\\n  --export-zip /path/to/confluence-export.zip \\\n  --output-dir docs/imported/my-space\n\
    ```"
