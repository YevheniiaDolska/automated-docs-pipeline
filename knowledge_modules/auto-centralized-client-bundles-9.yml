content:
  docs_markdown: "### \u0414\u0432\u0430 \u0440\u0435\u0436\u0438\u043C\u0430 \u0443\
    \u0441\u0442\u0430\u043D\u043E\u0432\u043A\u0438\n\n1. \u041D\u0430 \u043E\u0434\
    \u043D\u043E\u0439 \u043C\u0430\u0448\u0438\u043D\u0435 (\u0443 \u0432\u0430\u0441\
    \ \u0435\u0441\u0442\u044C \u043F\u0443\u0442\u044C \u043A \u043A\u043B\u0438\u0435\
    \u043D\u0442\u0441\u043A\u043E\u043C\u0443 \u0440\u0435\u043F\u043E): \u0438\u0441\
    \u043F\u043E\u043B\u044C\u0437\u0443\u0435\u0442\u0435 `provision_client_repo.py`,\
    \ scheduler \u0441\u0442\u0430\u0432\u0438\u0442\u0441\u044F \u0441\u0440\u0430\
    \u0437\u0443.\n\n1. \u041D\u0430 \u0440\u0430\u0437\u043D\u044B\u0445 \u043D\u043E\
    \u0443\u0442\u0431\u0443\u043A\u0430\u0445: \u0432\u044B \u0441\u043E\u0431\u0438\
    \u0440\u0430\u0435\u0442\u0435 bundle \u043A\u043E\u043C\u0430\u043D\u0434\u043E\
    \u0439 \u0432\u044B\u0448\u0435, \u043A\u043B\u0438\u0435\u043D\u0442 \u043A\u043B\
    \u0430\u0434\u0435\u0442 bundle \u0432 `<client-repo>/docsops`, \u0437\u0430\u0442\
    \u0435\u043C \u043A\u043B\u0438\u0435\u043D\u0442 \u0441\u0442\u0430\u0432\u0438\
    \u0442 scheduler \u043B\u043E\u043A\u0430\u043B\u044C\u043D\u043E:\n\n```bash\n\
    bash docsops/ops/install_cron_weekly.sh\n```\n\nWindows:\n\n```bash\npowershell\
    \ -ExecutionPolicy Bypass -File docsops/ops/install_windows_task.ps1\n```\n\n\
    Scheduler \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u0435\u0442 \u043B\u043E\
    \u043A\u0430\u043B\u044C\u043D\u0443\u044E \u0442\u0430\u0439\u043C\u0437\u043E\
    \u043D\u0443 \u043C\u0430\u0448\u0438\u043D\u044B, \u0433\u0434\u0435 \u0443\u0441\
    \u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D. \u0415\u0441\u043B\u0438 \u0443\
    \u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 \u043A\u043B\
    \u0438\u0435\u043D\u0442\u0441\u043A\u043E\u043C \u043D\u043E\u0443\u0442\u0431\
    \u0443\u043A\u0435, Monday run \u0438\u0434\u0435\u0442 \u043F\u043E \u0432\u0440\
    \u0435\u043C\u0435\u043D\u0438 \u043A\u043B\u0438\u0435\u043D\u0442\u0430.\n\n\
    \u0411\u044B\u0441\u0442\u0440\u044B\u0439 \u0441\u0442\u0430\u0440\u0442 \u043F\
    \u043E \u043F\u0440\u0435\u0441\u0435\u0442\u0430\u043C:\n\n- `profiles/clients/presets/small.yml`\n\
    - `profiles/clients/presets/startup.yml`\n- `profiles/clients/presets/enterprise.yml`\n\
    - `profiles/clients/presets/pilot-evidence.yml`\n\n\u0421\u0430\u043C\u044B\u0439\
    \ \u0431\u044B\u0441\u0442\u0440\u044B\u0439 \u0437\u0430\u043F\u0443\u0441\u043A\
    :\n\n```bash\npython3 scripts/onboard_client.py\n```\n\n\u0421\u043A\u0440\u0438\
    \u043F\u0442 \u0437\u0430\u0434\u0430\u0435\u0442 \u0432\u043E\u043F\u0440\u043E\
    \u0441\u044B, \u0441\u043E\u0437\u0434\u0430\u0435\u0442 \u043A\u043B\u0438\u0435\
    \u043D\u0442\u0441\u043A\u0438\u0439 \u043F\u0440\u043E\u0444\u0438\u043B\u044C\
    , \u0441\u043E\u0431\u0438\u0440\u0430\u0435\u0442 bundle, \u0441\u0442\u0430\u0432\
    \u0438\u0442 \u0432 \u043A\u043B\u0438\u0435\u043D\u0442\u0441\u043A\u0438\u0439\
    \ \u0440\u0435\u043F\u043E\u0437\u0438\u0442\u043E\u0440\u0438\u0439 \u0438 \u0443\
    \u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442 scheduler.\n\
    `onboard_client.py` \u043E\u0441\u0442\u0430\u0435\u0442\u0441\u044F \u0432 \u0432\
    \u0430\u0448\u0435\u043C \u043C\u0430\u0441\u0442\u0435\u0440-\u0440\u0435\u043F\
    \u043E \u0438 \u043D\u0435 \u0432\u043A\u043B\u044E\u0447\u0430\u0435\u0442\u0441\
    \u044F \u0432 \u043A\u043B\u0438\u0435\u043D\u0442\u0441\u043A\u0438\u0439 bundle\
    \ \u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E.\n\n\u041F\
    \u0435\u0440\u0435\u0434 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043A\u043E\
    \u0439 \u0432\u044B \u0432\u0438\u0434\u0438\u0442\u0435 preview \u043F\u0440\u043E\
    \u0444\u0438\u043B\u044F \u0438 \u043F\u043E\u0434\u0442\u0432\u0435\u0440\u0436\
    \u0434\u0430\u0435\u0442\u0435 \u0437\u0430\u043F\u0443\u0441\u043A."
