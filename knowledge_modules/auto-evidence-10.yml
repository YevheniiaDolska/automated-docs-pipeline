  docs_markdown: '## Pipeline artifacts


    All artifacts generated by the pipeline for this demo:


    | Artifact | Status | Path | Description |

    | --- | --- | --- | --- |

    | Multi-protocol contract report | Generated | `reports/acme-demo/multi_protocol_contract_report.json`
    | Protocol validation results |

    | KPI wall | Generated | `reports/acme-demo/kpi-wall.json` | Quality metrics dashboard
    |

    | Gap analysis | Generated | `reports/acme-demo/doc_gaps_report.json` | Missing
    documentation topics |

    | Lifecycle report | Generated | `reports/acme-demo/lifecycle-report.json` | Document
    freshness and staleness |

    | Glossary sync report | Generated | `reports/acme-demo/glossary_sync_report.json`
    | Terminology consistency |

    | Retrieval eval report | Generated | `reports/acme-demo/retrieval_evals_report.json`
    | RAG precision and recall |

    | Knowledge graph report | Generated | `reports/acme-demo/knowledge_graph_report.json`
    | Node and edge counts |

    | Pipeline stage summary | Generated | `reports/acme-demo/pipeline_stage_summary.json`
    | Stage execution details |


