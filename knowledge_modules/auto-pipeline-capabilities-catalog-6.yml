content:
  docs_markdown: '## LLM-agent optimized web surface


    The pipeline now includes a dedicated LLM-facing output layer in the same build
    path as standard docs publishing.


    1. Generates `llms.txt` with URL and title pairs for discoverable LLM crawling.

    1. Generates `llms-full.txt` with URL, title, and summary for richer retrieval
    context.

    1. Publishes markdown mirrors into the static site output so crawlers can consume
    `.md` without brittle HTML parsing.

    1. Injects explicit HTML metadata hints in the docs template header so agents
    prefer markdown URL variants.


    Operational value:


    1. Improves RAG ingestion quality because crawlers ingest source markdown instead
    of noisy rendered DOM.

    1. Reduces post-processing complexity for external agent ecosystems (fewer custom
    parsers and extractors).

    1. Provides a concrete pre-sales differentiator: docs are optimized for both human
    readers and machine agents by default, not via manual retrofit.'
