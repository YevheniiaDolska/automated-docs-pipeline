  docs_markdown: "### 2) \u041A\u0430\u043A\u0438\u0435 \u0433\u0435\u043D\u0435\u0440\
    \u0430\u0442\u043E\u0440\u044B \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\
    \u0430\u0446\u0438\u0438 \u043D\u0443\u0436\u043D\u044B\n\n```yaml\nruntime:\n\
    \  output_targets: [\"sphinx\", \"readme\", \"github\"]\n```\n\n\u041F\u0440\u0438\
    \u043C\u0435\u0440\u044B:\n\n- \u0442\u043E\u043B\u044C\u043A\u043E Sphinx: `[\"\
    sphinx\"]`\n- \u0442\u043E\u043B\u044C\u043A\u043E ReadMe: `[\"readme\"]`\n- \u0441\
    \u043C\u0435\u0448\u0430\u043D\u043D\u044B\u0439 \u0432\u0430\u0440\u0438\u0430\
    \u043D\u0442: `[\"sphinx\", \"readme\"]`\n\n### 2.1) \u041A\u0430\u043A \u0432\
    \u044B\u0431\u0440\u0430\u0442\u044C flow: code-first / api-first / hybrid\n\n\
    ```yaml\nruntime:\n  docs_flow:\n    mode: \"hybrid\"\n```\n\n- `code-first`:\
    \ \u0441\u0442\u0430\u043D\u0434\u0430\u0440\u0442\u043D\u044B\u0439 docs-ops\
    \ \u043F\u043E\u0442\u043E\u043A\n- `api-first`: API-first \u043F\u043E\u0442\u043E\
    \u043A\n- `hybrid`: \u043E\u0431\u0430 \u043F\u043E\u0442\u043E\u043A\u0430 \u043E\
    \u0434\u043D\u043E\u0432\u0440\u0435\u043C\u0435\u043D\u043D\u043E"
