    # Operator Runbook (Retainer Operations)


    ## Current product definition (2026-03-25)


    This content follows the active implementation baseline:


    1. The platform is docs-first and also supports `code-first`, `api-first`, and
    `hybrid` modes.

    1. The smooth autopipeline covers all five API protocols (REST, GraphQL, gRPC,
    AsyncAPI, and WebSocket) in one operational model.

    1. Non-REST flow includes generated server stubs with business-logic placeholders.

    1. External mock sandbox resolution is integrated, with Postman-supported auto-prepare
    in external mode.

    1. Contract test assets are generated automatically and merged with smart-merge
    so manual/customized cases are preserved and flagged for review when needed.

    1. Knowledge/RAG maintenance, terminology sync, and quality/compliance gates run
    through the same automation surface when enabled.

    1. Plan tiers gate advanced capabilities; higher plans include broader non-REST
    and governance scope.


    This runbook covers every retainer task an operator performs. Each procedure has
    exact steps, expected time, and what to look for. No programming knowledge is
    required for routine tasks.'
