content:
  docs_markdown: "## Step 5: build the demo site\n\nGenerate the browsable MkDocs\
    \ documentation site:\n\n```bash\npython3 scripts/build_acme_demo_site.py \\\n\
    \  --output-root demo-showcase/acme \\\n  --reports-dir reports/acme-demo \\\n\
    \  --build\n```\n\n<!-- requires: python3, mkdocs -->\n\nThis command copies documentation\
    \ pages, updates the `mkdocs.yml` navigation, and runs `mkdocs build` to produce\
    \ the final HTML site in `demo-showcase/acme/site/`.\n\n## Step 6: approve and\
    \ publish\n\nAfter verifying all gates pass, complete the reviewer checklist from\
    \ the manifest:\n\n- [ ] Confirm stage summary has no missing required artifacts.\n\
    - [ ] Review protocol docs and test asset links.\n- [ ] Review quality and retrieval\
    \ reports before publish.\n- [ ] Approve publish only if critical findings are\
    \ resolved.\n- [ ] Verify RAG retrieval index is current and complete.\n- [ ]\
    \ Confirm advanced retrieval features are enabled (hybrid search, HyDE, reranking,\
    \ embedding cache).\n\n## Validation checklist\n\nBefore considering the release\
    \ complete:\n\n- [ ] All five protocol contracts validated (zero failures)\n-\
    \ [ ] Quality score at or above 80\n- [ ] No high-priority documentation gaps\
    \ remain\n- [ ] Review manifest approved by operator\n- [ ] MkDocs site builds\
    \ without errors\n- [ ] Knowledge graph and retrieval index are current\n- [ ]\
    \ Advanced retrieval features enabled (hybrid, HyDE, reranking, cache)\n\n## Common\
    \ issues and solutions"
