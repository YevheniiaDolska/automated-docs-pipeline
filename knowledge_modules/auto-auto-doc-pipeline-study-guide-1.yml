content:
  docs_markdown: "<!-- VERIDOC_POWERED_BADGE:START -->\n[![Powered by VeriDoc](https://img.shields.io/badge/Powered%20by-VeriDoc-0ea5e9?style=flat-square)](https://veridoc.app)\n\
    <!-- VERIDOC_POWERED_BADGE:END -->\n\n# Auto-Doc Pipeline study guide\n\nAuto-Doc\
    \ Pipeline is a docs-first platform that also supports code-first and API-first\
    \ delivery. It enables teams to generate, verify, and publish documentation, non-REST\
    \ stubs, mock sandboxes, and contract tests in one smooth automation flow.\n\n\
    ```bash\npython3 scripts/run_multi_protocol_contract_flow.py \\\n  --runtime-config\
    \ docsops/config/client_runtime.yml \\\n  --reports-dir reports\n```\n\n## One-minute\
    \ mental model\n\n1. Input: planning notes, contracts, codebase signals, and docs\
    \ state.\n1. Build: contracts, docs pages, server stubs, mock endpoints, and test\
    \ assets.\n1. Verify: quality gates, contract checks, smoke checks, and lifecycle\
    \ checks.\n1. Publish: review packet, optional approval, site build, and deployment.\n\
    \n## What this platform is optimized for\n\n- Keep docs aligned with releases\
    \ without manual rework.\n- Support REST and non-REST APIs in one operational\
    \ model.\n- Let QA test endpoints from docs before full backend implementation.\n\
    - Keep enterprise-grade governance through policy packs and quality gates."
