content:
  docs_markdown: '# Intelligent knowledge system architecture


    The intelligent knowledge system is a structured layer that stores reusable modules,
    metadata, and intent mappings so humans and AI can retrieve the same trusted product
    knowledge.


    ```bash

    python3 scripts/validate_knowledge_modules.py

    ```


    The pipeline keeps authored modules in `knowledge_modules/*.yml`, validates them,
    and assembles clean output documents and channel bundles. This preserves normal
    documentation readability while enabling AI-native retrieval and reuse.


    ## Core components


    1. `Knowledge modules`: atomic YAML units with intent, audience, channel, dependency,
    and owner metadata.

    1. `Intent assembler`: creates audience-specific docs pages and channel bundles
    from active modules.

    1. `Retrieval index`: exports module-level records to `docs/assets/knowledge-retrieval-index.json`.

    1. `JSON-LD graph`: exports module relationships to `docs/assets/knowledge-graph.jsonld`.

    1. `Retrieval evals`: calculates Precision/Recall/Hallucination-rate in `reports/retrieval_evals_report.json`.

    1. `Quality gates`: checks schema, dependency integrity, cycle safety, and content
    completeness.'
