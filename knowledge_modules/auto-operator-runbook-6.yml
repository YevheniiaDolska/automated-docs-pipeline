content:
  docs_markdown: '### Step 1.5: Process action items with LLM (optional)


    If the client wants documentation fixes generated automatically, use the local
    LLM:


    1. Open terminal in the client repository.

    1. Ask the local LLM (Claude Code or Codex) to process the report:


    ```text

    Process reports/consolidated_report.json

    ```


    The LLM reads the consolidated report and generates/updates documentation based
    on the prioritized action items. It follows the rules in `CLAUDE.md` or `AGENTS.md`
    that were installed in the client repo.


    1. Review the generated changes: `git diff`.

    1. If changes look good, commit and push (or create a PR for client review).


    ---


    ## Task 2: Answer client question (10-15 minutes, 2-3 times per month)


    **When:** Client asks about their documentation health, a specific report number,
    or how to adjust pipeline behavior.'
