content:
  docs_markdown: "## Termination\n\nEither party may terminate the agreement:\n\n\
    1. **You** may close your account at any time from account settings. Active\n\
    \   subscriptions are canceled at the end of the billing period.\n1. **We** may\
    \ suspend or terminate accounts that violate these Terms, with\n   written notice\
    \ to your registered email. For severe violations (security\n   threats, illegal\
    \ activity), we may act immediately.\n\nUpon termination, we retain your data\
    \ for 30 days to allow export. After\n30 days, all data is permanently deleted.\n\
    \n## Changes to these terms\n\nWe may update these Terms with 30 days advance\
    \ notice via email. Continued\nuse after the effective date constitutes acceptance.\
    \ If you disagree, close\nyour account before the changes take effect.\n\n## Governing\
    \ law\n\nThese Terms are governed by the laws of Israel. Disputes are resolved\
    \ in\nthe courts of Tel Aviv, Israel.\n\n## Contact information\n\nFor questions\
    \ about these Terms:\n\n- Email: <support@veri-doc.app>\n- Web: [veri-doc.app/contact](https://veri-doc.app/contact)\n\
    \n**Last updated:** March 28, 2026\n\n## Next steps\n\n- Review the [privacy policy](privacy-policy.md)\n\
    - Review the [data processing agreement](data-processing-agreement.md)\n- Review\
    \ the [security policy](security-policy.md)"
