content:
  docs_markdown: "## Enable LLM-powered quality enhancement\n\nAdd `--use-llm` to\
    \ enable AI-powered improvements during the quality\nenhancement step:\n\n```bash\n\
    python3 scripts/run_confluence_migration.py \\\n  --confluence-url https://mycompany.atlassian.net\
    \ \\\n  --confluence-token YOUR_API_TOKEN \\\n  --confluence-username your-email@company.com\
    \ \\\n  --space-keys DEV \\\n  --use-llm\n```\n\nLLM enhancement performs three\
    \ additional operations:\n\n- **Replace placeholder code** -- detects generic\
    \ placeholders (`foo`, `bar`,\n  `example.com`, `YOUR_API_KEY`) in code blocks\
    \ and replaces them with\n  realistic, runnable examples\n- **Add missing sections**\
    \ -- adds essential sections based on content type\n  (error handling for how-to\
    \ guides, rate limits for API references,\n  security considerations for concept\
    \ pages)\n- **Verify code output** -- executes Python code blocks and corrects\n\
    \  documented output comments that do not match actual execution results\n\nLLM\
    \ enhancement requires an LLM provider configured in your environment.\nWithout\
    \ a provider, the pipeline skips LLM steps and logs a warning."
