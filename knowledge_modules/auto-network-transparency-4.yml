content:
  docs_markdown: "### Request 4: Update download\n\n**When:** After an update check\
    \ finds a new version and the user approves.\n\n**Endpoint:** `GET /v1/download/{version}/{platform}`\n\
    \n**Frequency:** When updates are available (monthly for Professional, weekly\
    \ opt-in for Enterprise).\n\n```text\nGET /v1/download/1.3.0/linux-x86_64\n```\n\
    \n**What is NOT sent:** No request body. No authentication headers. No client\
    \ data of any kind.\n\n### Request 5: License deactivation\n\n**When:** When a\
    \ client explicitly deactivates their license (seat release).\n\n**Endpoint:**\
    \ `POST /v1/deactivate`\n\n**Frequency:** Once per deactivation.\n\n```json\n\
    {\n  \"authorization\": \"Bearer <license-jwt>\"\n}\n```\n\n**What is NOT sent:**\
    \ No reason codes, no usage data, no document counts."
