content:
  docs_markdown: 'This catalog has two layers:


    1. npm script entry points (from `package.json`)

    1. direct CLI entry points in `scripts/*.py` that are used by provisioning/operator
    flows and are not exposed as npm commands


    Non-script concepts (policy semantics, sales packaging, pilot/full scope) are
    documented in ops guides.


    Use this catalog with `runtime.custom_tasks.weekly` in client profiles to enable
    any capability.'
