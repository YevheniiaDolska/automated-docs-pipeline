content:
  docs_markdown: "### Usage data\n\nWhen you use the Service, we automatically collect:\n\
    \n| Data field | Purpose | Retention |\n|------------|---------|-----------|\n\
    | Pipeline run metadata | Usage tracking, quota enforcement | 90 days |\n| API\
    \ request logs | Rate limiting, debugging, abuse prevention | 30 days |\n| Error\
    \ reports (Sentry) | Bug fixing, reliability improvement | 90 days |\n| Authentication\
    \ tokens | Session management | Token expiry (24 hours) |\n\n### Documentation\
    \ content\n\nWhen you process documentation through the pipeline:\n\n1. Your content\
    \ is processed in memory during pipeline execution.\n1. Generated outputs (processed\
    \ Markdown, reports, knowledge modules) are\n   stored in encrypted PostgreSQL\
    \ databases.\n1. We do not read, analyze, or use your documentation content for\
    \ any\n   purpose other than providing the Service.\n1. We do not use your content\
    \ to train machine learning models."
