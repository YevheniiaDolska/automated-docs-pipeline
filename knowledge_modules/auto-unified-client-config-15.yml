content:
  docs_markdown: "### 6.2 Planning-notes generation for non-REST protocols\n\nYou\
    \ can generate non-REST contracts directly from planning notes in the same autopipeline\
    \ run.\n\n```yaml\nruntime:\n  api_protocols: [\"graphql\", \"grpc\", \"asyncapi\"\
    , \"websocket\"]\n  api_protocol_settings:\n    graphql:\n      schema_path: \"\
    api/schema.graphql\"\n      notes_path: \"notes/graphql-api-planning.md\"\n  \
    \    generate_from_notes: true\n      generate_server_stubs: true\n      stubs_output:\
    \ \"generated/api-stubs/graphql/handlers.py\"\n    grpc:\n      proto_paths: [\"\
    api/proto\"]\n      notes_path: \"notes/grpc-api-planning.md\"\n      generate_from_notes:\
    \ true\n      generate_server_stubs: true\n      stubs_output: \"generated/api-stubs/grpc/handlers.py\"\
    \n    asyncapi:\n      spec_path: \"api/asyncapi.yaml\"\n      notes_path: \"\
    notes/asyncapi-planning.md\"\n      generate_from_notes: true\n      generate_server_stubs:\
    \ true\n      stubs_output: \"generated/api-stubs/asyncapi/handlers.py\"\n   \
    \ websocket:\n      contract_path: \"api/websocket.yaml\"\n      notes_path: \"\
    notes/websocket-api-planning.md\"\n      generate_from_notes: true\n      generate_server_stubs:\
    \ true\n      stubs_output: \"generated/api-stubs/websocket/handlers.py\"\n```\n\
    \nWhen source contract is missing, pipeline auto-generates it from notes and continues\
    \ with:\ncontract validation -> server stub generation -> lint -> regression ->\
    \ docs generation -> semantic quality -> test assets -> publish."
