content:
  docs_markdown: "## Protocol-specific validators\n\n- REST: `scripts/validate_openapi_contract.py`\n\
    - GraphQL: `scripts/validate_graphql_contract.py` (root/schema checks, duplicate\
    \ types/fields, root-type references)\n- gRPC: `scripts/validate_proto_contract.py`\
    \ (syntax checks, duplicate declarations/rpcs, proto3 `required` guard)\n- AsyncAPI:\
    \ `scripts/validate_asyncapi_contract.py` (channel operations + message payload\
    \ semantics)\n- WebSocket: `scripts/validate_websocket_contract.py` (channel/event\
    \ presence + payload/schema semantics)\n- Deep protocol lint stack (7+ checks):\
    \ `scripts/run_protocol_lint_stack.py`\n\n## Regression\n\n- Generic snapshot\
    \ gate: `scripts/check_protocol_regression.py`\n- Per-protocol snapshot path is\
    \ runtime-configurable.\n\n## Docs + publish\n\n- Generate protocol docs: `scripts/generate_protocol_docs.py`\n\
    - Publish protocol assets: `scripts/publish_protocol_assets.py`\n- Generated protocol\
    \ docs include interactive testers:\n  - GraphQL query execution (mock/real endpoint)\n\
    \  - gRPC via HTTP gateway adapter\n  - AsyncAPI ws/http publish checks\n  - WebSocket\
    \ live connect/send checks"
