content:
  docs_markdown: "### 5.1 PR auto-doc workflow\n\n```yaml\nruntime:\n  pr_autofix:\n\
    \    enabled: false\n    require_label: false\n    label_name: \"auto-doc-fix\"\
    \n    enable_auto_merge: false\n    commit_message: \"docs: auto-sync PR docs\"\
    \n    workflow_filename: \"docsops-pr-autofix.yml\"\n```\n\nBehavior when enabled:\n\
    \n- Trigger: PR opened/updated (`pull_request` events).\n- Scope: only changed\
    \ files in the current PR (`base...head` diff).\n- If docs drift is detected,\
    \ bot can generate docs patch and commit to the same PR branch.\n- No commits\
    \ to `main`.\n- Checks rerun automatically after bot commit.\n\nDefault policy:\n\
    \n- `pr_autofix` is optional and disabled by default.\n- `docs_contract` is report-only\
    \ by default in weekly flow and consolidated report.\n- Weekly consolidated report\
    \ adds only new/changed docs-contract mismatches, ignores closed ones, and deduplicates\
    \ with other gap sources.\n\nOne-time repo setup (done during provisioning):\n\
    \n1. Workflow file is generated in `.github/workflows/docsops-pr-autofix.yml`.\n\
    1. Set GitHub Actions permissions to `Read and write`.\n1. Optional: set `DOCSOPS_BOT_TOKEN`\
    \ for orgs that restrict default token pushes."
