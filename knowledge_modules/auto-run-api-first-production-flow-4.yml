content:
  docs_markdown: '### How merge works


    Each test case carries metadata fields:


    | Field | Values | Purpose |

    | --- | --- | --- |

    | `origin` | `auto`, `manual` | Distinguishes generated cases from QA-written
    cases |

    | `customized` | `true`, `false` | Marks auto cases that QA refined |

    | `needs_review` | `true`, `false` | Flags customized cases affected by API changes
    |

    | `review_reason` | text or `null` | Explains why the case requires review |

    | `spec_hash` | 12-char hex | Fingerprint of the operation signature for change
    detection |


    On every re-run the merge engine applies these rules:


    1. **Manual cases** (`origin: manual`) survive every re-generation untouched.

    1. **Customized auto cases** (`customized: true`) keep QA edits. If the API spec
    changed (different `spec_hash`), the case gets `needs_review: true` with a reason
    message.

    1. **Pure auto cases** (`origin: auto`, `customized: false`) get overwritten with
    the latest generated version.

    1. **Stale auto cases** for removed operations get dropped automatically.'
