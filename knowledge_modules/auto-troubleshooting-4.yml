content:
  docs_markdown: "### Fix quality score in 5 minutes\n\n1. Check the gap report for\
    \ high-priority items:\n\n    ```bash\n    python3 -c \"\n    import json\n  \
    \  r = json.load(open('reports/acme-demo/doc_gaps_report.json'))\n    high = [g\
    \ for g in r.get('gaps', []) if g.get('priority') == 'high']\n    print(f'{len(high)}\
    \ high-priority gaps:')\n    for g in high:\n        print(f'  [{g[\\\"priority\\\
    \"]}] {g[\\\"title\\\"]}')\"\n    ```\n\n1. Address each high-priority gap by\
    \ creating or updating the relevant document. Common gaps include:\n\n    | Gap\
    \ category | Typical fix |\n    | --- | --- |\n    | `authentication` | Add authentication\
    \ guide with token management |\n    | `webhook` | Document webhook setup and\
    \ payload schemas |\n    | `database_schema` | Add data model reference with field\
    \ descriptions |\n    | `error_handling` | Create error code reference with resolution\
    \ steps |\n\n1. Re-run the pipeline and verify the score:\n\n    ```bash\n   \
    \ python3 -c \"\n    import json\n    print(json.load(open('reports/acme-demo/kpi-wall.json'))['quality_score'])\"\
    \n    ```\n\n## MkDocs build fails with theme error\n\n**You see:** `mkdocs build`\
    \ exits with `Theme 'material' not found` or `Module 'mkdocs_macros' not found`.\n\
    \n**Root cause:** The required Python packages are not installed in the current\
    \ environment."
