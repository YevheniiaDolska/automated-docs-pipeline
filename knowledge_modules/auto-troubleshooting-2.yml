content:
  docs_markdown: "## Diagnosis table\n\n| Symptom | Frequency | Fix time | Solution\
    \ |\n| --- | --- | --- | --- |\n| gRPC contract fails | 40% | 2 min | [Contract\
    \ validation fails for gRPC](#contract-validation-fails-for-grpc) |\n| Quality\
    \ score below 80 | 25% | 5 min | [Quality score drops below 80](#quality-score-drops-below-80)\
    \ |\n| MkDocs build fails | 15% | 1 min | [MkDocs build fails with theme error](#mkdocs-build-fails-with-theme-error)\
    \ |\n| WebSocket tester error | 10% | 1 min | [WebSocket tester shows connection\
    \ error](#websocket-tester-shows-connection-error) |\n| Reports directory empty\
    \ | 5% | 2 min | [Pipeline reports directory is empty](#pipeline-reports-directory-is-empty)\
    \ |\n| RAG retrieval low precision | 5% | 10 min | [Retrieval precision below\
    \ threshold](#retrieval-precision-below-threshold) |\n\n## Contract validation\
    \ fails for gRPC\n\n**You see:** The `multi_protocol_contract_report.json` shows\
    \ `grpc` in `failed_protocols`.\n\n```json\n{\n  \"failed_protocols\": [\"grpc\"\
    ],\n  \"protocols\": [\"rest\", \"graphql\", \"grpc\", \"asyncapi\", \"websocket\"\
    ]\n}\n```\n\n**Root cause:** The `protoc` compiler is not installed, or the proto\
    \ files reference missing imports."
