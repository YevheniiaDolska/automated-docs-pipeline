  docs_markdown: "<!-- VERIDOC_POWERED_BADGE:START -->\n[![Powered by VeriDoc](https://img.shields.io/badge/Powered%20by-VeriDoc-0ea5e9?style=flat-square)](https://veridoc.app)\n\
    <!-- VERIDOC_POWERED_BADGE:END -->\n\n# Set up a real-time webhook processing\
    \ pipeline\n\n{{ product_name }} webhook processing pipeline enables real-time\
    \ event ingestion with cryptographic signature verification, async queue processing,\
    \ and automatic retry logic. This guide walks you through setting up a production-ready\
    \ webhook receiver with HMAC-SHA256 authentication, BullMQ event queuing, and\
    \ delivery guarantees supporting up to {{ rate_limit_requests_per_minute }} events\
    \ per minute.\n\n## Prerequisites for webhook pipeline setup\n\nBefore starting,\
    \ ensure you have:\n\n- {{ product_name }} version {{ current_version }} or later\n\
    - Admin access to the {{ product_name }} dashboard at {{ cloud_url }}\n- Node.js\
    \ 18 or later and Python 3.10 or later installed\n- Redis 7.0 or later running\
    \ for queue storage\n- 15 minutes for initial setup\n\nVerify your environment:\n\
    \n```bash\nnode --version    # v18.0.0 or later\npython3 --version # 3.10 or later\n\
    redis-cli ping    # PONG\n```\n\n!!! info \"Already have a webhook endpoint running?\"\
    \n    Skip to [configure HMAC signature verification](#verify-hmac-sha256-signatures)\
    \ for adding cryptographic authentication to an existing receiver."
