content:
  docs_markdown: '### API gateway layer (5 protocols)


    | Protocol | Transport | Endpoints | Interactive reference |

    | --- | --- | --- | --- |

    | REST | HTTP/1.1 + JSON | 19 endpoints across 5 resources | [Swagger UI](../reference/rest-api.md)
    |

    | GraphQL | HTTP POST | 3 operation types (Query, Mutation, Subscription) | [Live
    playground](../reference/graphql-playground.md) |

    | gRPC | HTTP/2 + Protobuf | 3 RPC methods on ProjectService | [Gateway tester](../reference/grpc-gateway.md)
    |

    | AsyncAPI | AMQP 0.9.1 | 3 event channels | [Event tester](../reference/asyncapi-events.md)
    |

    | WebSocket | WSS (RFC 6455) | 4 real-time channels | [WS playground](../reference/websocket-events.md)
    |


    ### Services layer (4 microservices)


    | Service | Responsibility | Key capability |

    | --- | --- | --- |

    | Auth Service | JWT validation, OAuth2 flows, RBAC | 50&nbsp;ms average token
    validation |

    | Project Service | Project CRUD, status transitions, event emission | Emits project.created
    and project.updated events |

    | Task Service | Task lifecycle, priority queue, assignment | Cascading delete
    with parent project |

    | Notification Service | Fan-out to WebSocket, webhooks, and email | Bridges AMQP
    events to client transports |'
