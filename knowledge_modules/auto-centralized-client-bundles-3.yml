content:
  docs_markdown: "### 3) \u041A\u0430\u043A\u0438\u0435 \u0444\u0443\u043D\u043A\u0446\
    \u0438\u0438 \u0432\u043A\u043B\u044E\u0447\u0435\u043D\u044B\n\n\u0415\u0441\u0442\
    \u044C 2 \u0443\u0440\u043E\u0432\u043D\u044F \u043F\u0435\u0440\u0435\u043A\u043B\
    \u044E\u0447\u0435\u043D\u0438\u044F:\n\n\\11. \u041B\u043E\u0433\u0438\u0447\u0435\
    \u0441\u043A\u0438\u0435 \u0444\u043B\u0430\u0433\u0438 \u0434\u043B\u044F LLM:\n\
    \n```yaml\nruntime:\n  modules:\n    gap_detection: true\n    drift_detection:\
    \ true\n    docs_contract: true\n    kpi_sla: true\n    rag_optimization: true\n\
    \    ontology_graph: true\n    retrieval_evals: true\n    terminology_management:\
    \ true\n    lifecycle_management: true\n```\n\n\\11. \u041F\u0440\u0430\u043A\u0442\
    \u0438\u0447\u0435\u0441\u043A\u0438\u0439 \u043D\u0430\u0431\u043E\u0440 \u0441\
    \u043A\u0440\u0438\u043F\u0442\u043E\u0432 \u0432 bundle:\n\n```yaml\nbundle:\n\
    \  include_scripts:\n    - \"scripts/check_docs_contract.py\"\n    - \"scripts/check_api_sdk_drift.py\"\
    \n```\n\n\u0415\u0441\u043B\u0438 \u0444\u0443\u043D\u043A\u0446\u0438\u044F \u043D\
    \u0435 \u043D\u0443\u0436\u043D\u0430, \u0443\u0431\u0438\u0440\u0430\u0435\u0442\
    \u0435 \u0444\u043B\u0430\u0433 \u0438 \u0441\u043E\u043E\u0442\u0432\u0435\u0442\
    \u0441\u0442\u0432\u0443\u044E\u0449\u0438\u0439 \u0441\u043A\u0440\u0438\u043F\
    \u0442.\n\n\u041F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E\
    \ baseline \u0432\u043A\u043B\u044E\u0447\u0435\u043D:\n\n- self-checks\n- multi-language\
    \ tabs generation/validation for code examples\n- fact/style checks\n- lifecycle\
    \ checks/reports\n- SEO/GEO\n- RAG/knowledge index\n- JSON-LD knowledge graph\
    \ (`generate_knowledge_graph_jsonld.py`)\n- retrieval evals (`run_retrieval_evals.py`)\n\
    - terminology sync to glossary (`sync_project_glossary.py`)\n- drift/contract/KPI-SLA\n\
    \n\u041A\u043B\u044E\u0447\u0435\u0432\u044B\u0435 \u0432\u043E\u0437\u043C\u043E\
    \u0436\u043D\u043E\u0441\u0442\u0438 (\u0432\u0430\u0448\u0435 \u043E\u0441\u043D\
    \u043E\u0432\u043D\u043E\u0435 \u0423\u0422\u041F) \u0432\u043A\u043B\u044E\u0447\
    \u0430\u044E\u0442\u0441\u044F \u0447\u0435\u0440\u0435\u0437:\n\n```yaml\nruntime:\n\
    \  custom_tasks:\n    weekly:\n      - id: \"openapi-lint\"\n        enabled:\
    \ true\n        command: \"npm run lint:openapi\"\n        continue_on_error:\
    \ true\n```\n\n\u042D\u0442\u043E \u043D\u0435 `\u0440\u0435\u0434\u043A\u0438\
    \u0435 \u0441\u043F\u0435\u0446\u0437\u0430\u0434\u0430\u0447\u0438`, \u0430 \u0431\
    \u0430\u0437\u043E\u0432\u044B\u0439 \u043A\u043E\u043D\u0442\u0443\u0440 docs-ops\
    \ \u043F\u043B\u0430\u0442\u0444\u043E\u0440\u043C\u044B. \u0412 \u0442\u043E\u043C\
    \ \u0447\u0438\u0441\u043B\u0435:"
