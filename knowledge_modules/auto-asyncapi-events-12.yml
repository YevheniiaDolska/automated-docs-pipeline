content:
  docs_markdown: "function tryNext(lastError) {\n      if (idx >= candidates.length)\
    \ {\n        out.textContent = JSON.stringify(\n          {\n            mode:\
    \ 'offline-semantic-fallback',\n            tried: candidates,\n            last_error:\
    \ lastError || '',\n            simulated_response: semanticAsync(safeParse(payload))\n\
    \          },\n          null,\n          2\n        );\n        return;\n   \
    \   }\n      var endpoint = candidates[idx++];\n      out.textContent = 'Connecting\
    \ to ' + endpoint + '...';\n      try {\n        var settled = false;\n      \
    \  var ws = new WebSocket(endpoint);\n        var timeout = setTimeout(function\
    \ () {\n          if (settled) return;\n          settled = true;\n          try\
    \ { ws.close(); } catch (e) {}\n          tryNext('timeout');\n        }, 6000);\n\
    \        ws.onopen = function () {\n          if (settled) return;\n         \
    \ ws.send(payload);\n          out.textContent = 'Connected to ' + endpoint +\
    \ '. Event sent. Waiting for acknowledgement...';\n        };\n        ws.onmessage\
    \ = function (e) {\n          if (settled) return;\n          settled = true;\n\
    \          clearTimeout(timeout);\n          out.textContent = JSON.stringify(\n\
    \            {\n              endpoint: endpoint,\n              mode: 'live-echo-plus-semantic',\n\
    \              raw: String(e.data || ''),\n              simulated_response: semanticAsync(safeParse(e.data))\n\
    \            },\n            null,\n            2\n          );\n          ws.close();\n\
    \        };\n        ws.onerror = function () {\n          if (settled) return;\n\
    \          settled = true;\n          clearTimeout(timeout);\n          tryNext('handshake\
    \ failed');\n        };\n        ws.onclose = function () {\n          if (settled)\
    \ return;\n          settled = true;\n          clearTimeout(timeout);\n     \
    \     tryNext('closed before response');\n        };\n      } catch (e) {\n  \
    \      tryNext(String(e));\n      }\n    }"
