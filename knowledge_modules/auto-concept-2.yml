content:
  docs_markdown: '## The problem it solves


    Without pipeline-first documentation, engineering teams face three critical challenges:


    1. **Documentation drift**: API code changes ship to production while docs remain
    stuck on the previous version. The average drift window is 2-4 weeks, during which
    users encounter incorrect information.


    1. **Inconsistent quality**: Documentation quality depends on individual writers.
    One team produces excellent guides while another produces minimal stubs. No enforced
    quality bar exists across the organization.


    1. **Multi-protocol coverage gaps**: Teams that support REST, GraphQL, gRPC, AsyncAPI,
    and WebSocket must maintain five separate documentation sets. Without automation,
    at least two protocols fall behind on every release.


    Traditional approaches like wiki-based documentation or manual Markdown editing
    fail because they rely on human memory to trigger updates. When the OpenAPI spec
    changes, nobody remembers to update the corresponding tutorial.


    ## How the pipeline works


    The VeriDoc pipeline follows an eight-stage execution order. Each stage reads
    the output of the previous stage and produces artifacts for the next.'
