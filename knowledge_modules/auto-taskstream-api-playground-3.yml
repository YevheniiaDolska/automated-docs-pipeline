content:
  docs_markdown: "## Multi-language request examples\n\n=== \"cURL\"\n\n    ```bash\n\
    \    curl -sS \"{{ config.extra.plg.api_playground.endpoints.sandbox_base_url\
    \ }}/healthz\"\n    ```\n\n=== \"JavaScript\"\n\n    ```javascript\n    const\
    \ res = await fetch(\"{{ config.extra.plg.api_playground.endpoints.sandbox_base_url\
    \ }}/healthz\");\n    console.log(await res.json());\n    ```\n\n=== \"Python\"\
    \n\n    ```python\n    import requests\n\n    res = requests.get(\"{{ config.extra.plg.api_playground.endpoints.sandbox_base_url\
    \ }}/healthz\", timeout=10)\n    print(res.json())\n    ```\n\n## What this validates\n\
    \n1. Request and response schema compatibility.\n1. Pagination, filtering, and\
    \ sorting behavior.\n1. Error envelope and request-id propagation.\n1. Endpoint\
    \ availability before backend merge.\n\n## Related pages\n\n- [Run API-first production\
    \ flow](../how-to/run-api-first-production-flow.md)\n- [TaskStream API planning\
    \ notes](taskstream-planning-notes.md)\n\n## Next steps\n\n- [Documentation index](index.md)"
