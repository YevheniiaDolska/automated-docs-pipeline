content:
  docs_markdown: '| Script | Purpose |

    | --- | --- |

    | `scripts/build_client_bundle.py` | Build client-specific bundle in `generated/client_bundles/<client_id>/`.
    |

    | `scripts/provision_client_repo.py` | One-shot install into client repo (bundle
    copy, config/policy, env checklist, scheduler install). |

    | `scripts/init_pipeline.py` | Bootstrap pipeline directly from source into another
    repo (self-install path). |

    | `scripts/run_weekly_gap_batch.py` | Main weekly local runner (gaps/stale/kpi/api-first/modules/custom
    tasks/consolidation). |

    | `scripts/auto_fix_pr_docs.py` | PR branch docs autofix helper for optional GitHub
    workflow. |

    | `scripts/ensure_external_mock_server.py` | Resolve/create external mock endpoint
    (Postman-supported flow). |

    | `scripts/extract_knowledge_modules_from_docs.py` | Auto-extract knowledge modules
    from docs markdown. |

    | `scripts/gap_detector.py` | Legacy/direct gap detector entry used in some compatibility
    paths. |

    | `scripts/generate_docusaurus_config.py` | Generate/update Docusaurus config
    in adapter flows. |

    | `scripts/generate_facets_index.py` | Build faceted search index artifacts. |

    | `scripts/generate_fastapi_stubs_from_openapi.py` | Generate FastAPI stubs from
    OpenAPI. |

    | `scripts/generate_openapi_from_planning_notes.py` | Generate OpenAPI root/tree
    from planning notes. |

    | `scripts/generate_protocol_server_stubs.py` | Generate protocol server stubs
    with business-logic placeholders for REST, GraphQL, gRPC, AsyncAPI, and WebSocket.
    |

    | `scripts/generate_pipeline_capabilities_catalog.py` | Regenerate this capabilities
    catalog file. |

    | `scripts/lifecycle_manager.py` | Lifecycle scan/report/redirect guidance generation.
    |

    | `scripts/manage_demo_nav.py` | Demo nav injection/removal helper. |

    | `scripts/pilot_analysis.py` | Pilot analysis/report helper. |

    | `scripts/preprocess_variables.py` | Variables pre-processing helper for docs
    generation flows. |

    | `scripts/upload_to_algolia.py` | Upload generated search records to Algolia.
    |

    | `scripts/validate_pr_dod.py` | DoD validation helper for PR workflows. |

    | `scripts/run_multi_protocol_contract_flow.py` | Unified orchestrator for all
    5 protocol documentation flows (REST, GraphQL, gRPC, AsyncAPI, WebSocket). Runs
    9 stages: ingest, contract validation, server stub generation, lint, regression,
    docs generation, quality gates, test assets, publish. |

    | `scripts/run_retrieval_evals_gate.py` | Smart retrieval gate with runtime mode
    selection (`token`, `hybrid`, `hybrid+rerank`) and adaptive threshold profile
    for dataset mismatch cases. |

    | `scripts/rag_reindex_lifecycle.py` | Versioned RAG reindex lifecycle: extract,
    validate, index build, optional embeddings, promote, rollback, and retention pruning.
    |

    | `scripts/enforce_rag_optimization_layer.py` | Unified RAG optimization layer
    enforcement for cloud, hybrid, and strict-local profiles with alert-enabled thresholds.
    |

    | `scripts/generate_protocol_contract_from_planning_notes.py` | Generate protocol
    contracts (GraphQL SDL, Proto3, AsyncAPI YAML, WebSocket YAML) from planning notes
    markdown. |

    | `scripts/generate_protocol_docs.py` | Auto-generate reference documentation
    from protocol contracts using protocol-specific templates. |

    | `scripts/generate_protocol_test_assets.py` | Generate protocol-aware test cases
    with signature-based smart merge. Outputs JSON, TestRail CSV, Zephyr JSON, test
    matrix, and fuzz scenarios. |

    | `scripts/run_protocol_self_verify.py` | Runtime validation against live/mock
    endpoints: GraphQL introspection, gRPC invocation, AsyncAPI event publish, WebSocket
    connection and message routing. |

    | `scripts/validate_graphql_contract.py` | GraphQL SDL contract validation (syntax,
    semantics, operation types). |

    | `scripts/validate_proto_contract.py` | Proto3 contract validation (syntax, service
    definitions, RPC methods). |

    | `scripts/validate_asyncapi_contract.py` | AsyncAPI contract validation (channels,
    schemas, delivery guarantees). |

    | `scripts/validate_websocket_contract.py` | WebSocket channel contract validation
    (message schemas, connection lifecycle). |

    | `scripts/generate_public_docs_audit.py` | Public documentation site auditor:
    crawls live sites, evaluates broken links, SEO/GEO, API coverage, code examples,
    freshness. Supports interactive wizard and LLM-powered expert analysis. |

    | `scripts/generate_audit_scorecard.py` | Comprehensive audit scorecard generator
    combining docs quality, API coverage, code examples, glossary health, and policy
    compliance into a single score. |

    | `scripts/generate_executive_audit_pdf.py` | Consulting-grade executive PDF report
    from audit scorecard and public docs audit results. Includes score gauges, risk
    matrices, financial impact tables, and methodology appendix. |

    | `scripts/generate_embeddings.py` | Generate FAISS vector index from knowledge
    modules using `text-embedding-3-small` (1536 dimensions). Builds `retrieval.faiss`
    and `retrieval-metadata.json`. |

    | `scripts/docsops_generate.py` | Operator and policy-triggered generation entry
    point for local CLI workflows (`operator` and `veridoc` modes). |

    | `scripts/production_smoke.py` | Production smoke validation for runtime readiness
    and deployment health signals. |'
