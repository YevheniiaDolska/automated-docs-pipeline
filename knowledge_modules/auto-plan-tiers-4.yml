content:
  docs_markdown: '## Non-API documentation flows (docs-first scope)


    The platform is not limited to API-first automation. In active production usage,
    it also runs full docs-first and code-first documentation operations for non-API
    content:


    1. Detects content gaps, stale pages, and drift across product docs, runbooks,
    admin guides, troubleshooting, and release notes.

    1. Generates and updates documentation types beyond API references (tutorial,
    how-to, concept, reference, troubleshooting, release-note, security, SDK, user/admin,
    and operations docs).

    1. Applies normalization, style, metadata/frontmatter, SEO/GEO, terminology governance,
    and snippet validation to all documentation categories.

    1. Executes lifecycle controls (active/deprecated/removed states, replacement
    links, and freshness cadence).

    1. Runs knowledge extraction and retrieval preparation for all docs, not only
    API pages.

    1. Produces consolidated review artifacts so human input is focused on approval
    and business accuracy, not repetitive formatting and synchronization work.'
