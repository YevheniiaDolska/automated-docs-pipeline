content:
  docs_markdown: "1. Verify advanced retrieval features are enabled in `config/ask-ai.yml`:\n\
    \n```yaml\n    hybrid_search:\n      enabled: true\n    hyde:\n      enabled:\
    \ true\n    reranking:\n      enabled: true\n    embedding_cache:\n      enabled:\
    \ true\n    ```\n\n1. Re-run retrieval evaluations:\n\n```bash\n    python3 scripts/run_autopipeline.py\
    \ \\\n      --docsops-root . \\\n      --reports-dir reports/acme-demo \\\n  \
    \    --runtime-config reports/acme-demo/client_runtime.yml \\\n      --mode veridoc\n\
    \    ```\n\n## Prevention checklist\n\nPrevent 90% of pipeline issues with these\
    \ practices:\n\n- [ ] **Install all dependencies**: `protoc`, `mkdocs-material`,\
    \ `pymdown-extensions`\n- [ ] **Run the pipeline before every release**: Do not\
    \ wait for the weekly schedule\n- [ ] **Address high-priority gaps immediately**:\
    \ They compound and lower the quality score\n- [ ] **Keep contract files current**:\
    \ Update OpenAPI, GraphQL schema, and proto files with every API change\n- [ ]\
    \ **Monitor the KPI dashboard**: Check `kpi-wall.json` quality score after every\
    \ run"
