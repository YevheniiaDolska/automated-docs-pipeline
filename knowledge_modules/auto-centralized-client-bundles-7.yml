content:
  docs_markdown: "### 3.1) \u0426\u0435\u043D\u0442\u0440\u0430\u043B\u0438\u0437\u043E\
    \u0432\u0430\u043D\u043D\u044B\u0435 \u0438\u043D\u0442\u0435\u0433\u0440\u0430\
    \u0446\u0438\u0438 (Algolia + Ask AI)\n\n```yaml\nruntime:\n  integrations:\n\
    \    algolia:\n      enabled: true\n      upload_on_weekly: true\n      app_id_env:\
    \ \"ALGOLIA_APP_ID\"\n      api_key_env: \"ALGOLIA_API_KEY\"\n      index_name_env:\
    \ \"ALGOLIA_INDEX_NAME\"\n    ask_ai:\n      enabled: true\n      auto_configure_on_provision:\
    \ true\n      install_runtime_pack: false\n      provider: \"openai\"\n      billing_mode:\
    \ \"user-subscription\"\n      model: \"gpt-4.1-mini\"\n```\n\n\u0427\u0442\u043E\
    \ \u044D\u0442\u043E \u0434\u0430\u0435\u0442:\n\n- Algolia \u0440\u0430\u0431\
    \u043E\u0442\u0430\u0435\u0442 \u043E\u0434\u0438\u043D\u0430\u043A\u043E\u0432\
    \u043E \u0434\u043B\u044F \u0432\u0441\u0435\u0445 \u043F\u043E\u0434\u0434\u0435\
    \u0440\u0436\u0438\u0432\u0430\u0435\u043C\u044B\u0445 site generators.\n- Ask\
    \ AI \u043D\u0430\u0441\u0442\u0440\u0430\u0438\u0432\u0430\u0435\u0442\u0441\u044F\
    \ \u0430\u0432\u0442\u043E\u043C\u0430\u0442\u0438\u0447\u0435\u0441\u043A\u0438\
    \ \u0432\u043E \u0432\u0440\u0435\u043C\u044F provisioning (\u0431\u0435\u0437\
    \ \u0440\u0443\u0447\u043D\u044B\u0445 CLI-\u043A\u043E\u043C\u0430\u043D\u0434\
    ).\n\n### 4) \u041D\u0430\u0441\u043A\u043E\u043B\u044C\u043A\u043E \u0441\u0442\
    \u0440\u043E\u0433\u0438\u0435 \u043F\u0440\u0430\u0432\u0438\u043B\u0430 \u043A\
    \u0430\u0447\u0435\u0441\u0442\u0432\u0430\n\n```yaml\nbundle:\n  base_policy_pack:\
    \ \"multi-product\"\n  policy_overrides:\n    kpi_sla:\n      min_doc_coverage:\
    \ 85\n```\n\n- `base_policy_pack` = \u0431\u0430\u0437\u043E\u0432\u044B\u0439\
    \ \u0440\u0435\u0436\u0438\u043C\n- `policy_overrides` = \u0442\u043E\u043D\u043A\
    \u0430\u044F \u0434\u043E\u043A\u0440\u0443\u0442\u043A\u0430 \u043F\u043E\u0434\
    \ \u043A\u043B\u0438\u0435\u043D\u0442\u0430\n\n### 4.1) \u041A\u0430\u043A \u0432\
    \u044B\u0431\u0440\u0430\u0442\u044C style guide (Vale)\n\n```yaml\nbundle:\n\
    \  style_guide: \"google\" # google | microsoft | hybrid\n```\n\n\u0421\u0431\u043E\
    \u0440\u0449\u0438\u043A \u0441\u0430\u043C \u043F\u043E\u043B\u043E\u0436\u0438\
    \u0442 `.vale.ini` \u0432 bundle \u043F\u043E\u0434 \u0432\u044B\u0431\u0440\u0430\
    \u043D\u043D\u044B\u0439 \u043F\u0440\u043E\u0444\u0438\u043B\u044C."
  assistant_context: "Use this module when answering questions related to: \u0426\u0435\
