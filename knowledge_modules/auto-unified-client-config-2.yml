content:
  docs_markdown: "Scheduler uses local machine timezone. Monday schedule follows client\
    \ local time when installed on client machine.\n\nPlan packaging reference:\n\n\
    - `docs/operations/PLAN_TIERS.md` (Basic / Pro / Enterprise presets)\n\nScope\
    \ note:\n\n- `profiles/clients/presets/pilot-evidence.yml` is intentionally limited\
    \ (core proof scope).\n- Use full-scope plan presets for full implementation coverage:\n\
    \  - `profiles/clients/presets/startup.yml` (Pro-equivalent)\n  - `profiles/clients/presets/enterprise.yml`\
    \ (Enterprise-equivalent)\n\n## 1. Client identity\n\n```yaml\nclient:\n  id:\
    \ \"acme\"\n  company_name: \"ACME Inc.\"\n  contact_email: \"docs-owner@acme.example\"\
    \n```\n\n## 2. Bundle packaging\n\n```yaml\nbundle:\n  output_dir: \"generated/client_bundles\"\
    \n  base_policy_pack: \"multi-product\"\n  style_guide: \"google\"\n  policy_overrides:\
    \ {}\n  include_scripts: []\n  include_docs: []\n  include_paths: []\n```\n\n\
    ### `base_policy_pack`\n\nAvailable built-ins:\n\n- `minimal`\n- `api-first`\n\
    - `monorepo`\n- `multi-product`\n- `plg`\n\n### `policy_overrides`\n\nDeep-merged\
    \ into selected policy pack for per-client tuning.\n\nExample:\n\n```yaml\nbundle:\n\
    \  policy_overrides:\n    kpi_sla:\n      min_doc_coverage: 90\n      max_quality_score_drop:\
    \ 2\n```"
