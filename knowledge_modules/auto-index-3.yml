content:
  docs_markdown: '## Pipeline execution summary


    The autopipeline completed three stages with full artifacts for this demo. Enterprise
    deployment cycles add consolidated reporting, audit scorecards, SLA evaluation,
    and finalize gates.


    | Stage | Status | Description |

    | --- | --- | --- |

    | `multi_protocol_contract` | Completed | Contract validation for all five protocols
    |

    | `kpi_wall` | Completed | KPI metrics and quality scoring |

    | `retrieval_evals` | Completed | RAG retrieval precision and recall |


    All five interactive protocol sandboxes (REST, GraphQL, gRPC, AsyncAPI, WebSocket)
    work without additional tooling.


    ## Supported protocols


    The VeriOps API exposes five protocol interfaces. Each protocol passes through
    eight pipeline stages: ingest, lint, regression, docs generation, frontmatter
    gate, snippet lint, test assets, and publish.


    | Protocol | Transport | Contract source | Stages | Status |

    | --- | --- | --- | --- | --- |

    | REST | HTTP/1.1 + JSON | OpenAPI 3.0 (`api/openapi.yaml`) | 8 | **PASS** |

    | GraphQL | HTTP POST | SDL schema (`graphql.schema.graphql`) | 8 | **PASS** |

    | gRPC | HTTP/2 + Protobuf | Proto3 (`veriops.proto`) | 8 | **PASS** |

    | AsyncAPI | AMQP / Kafka | AsyncAPI 2.6.0 (`asyncapi.yaml`) | 8 | **PASS** |

    | WebSocket | WSS | WebSocket contract (`websocket.yaml`) | 8 | **PASS** |'
