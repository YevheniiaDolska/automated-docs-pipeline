content:
  docs_markdown: 'RAG prep behavior:


    - multi-protocol docs are normalized and enriched before indexing,

    - knowledge modules are refreshed from generated docs,

    - retrieval index and knowledge graph are rebuilt in the same pipeline,

    - retrieval evals are executed and reported as evidence for quality controls.


    Licensing note: Multi-protocol support (GraphQL, gRPC, AsyncAPI, WebSocket) requires
    an Enterprise license. The wizard generates the appropriate `licensing.plan` in
    the profile. See `docs/operations/PLAN_TIERS.md` for the full feature matrix.'
