content:
  docs_markdown: "## Review migration reports\n\nThe pipeline generates two report\
    \ files in the reports directory\n(default: `reports/`):\n\n- `confluence_migration_report.json`\
    \ -- machine-readable report with page\n  counts, check results, and status\n\
    - `confluence_migration_report.md` -- human-readable report with migration\n \
    \ summary, automatic fixes applied, and check results\n\nSpecify a custom reports\
    \ directory with `--reports-dir`:\n\n```bash\npython3 scripts/run_confluence_migration.py\
    \ \\\n  --export-zip /path/to/confluence-export.zip \\\n  --reports-dir /path/to/reports\n\
    ```\n\n## Troubleshoot common issues\n\n### Authentication fails with 401 error\n\
    \n**Cause:** Invalid or expired API token.\n\n**Fix:** Generate a new token following\
    \ the steps in\n[Create an API token](#step-1-create-an-api-token). For Cloud,\
    \ verify you use\nyour email address with `--confluence-username`, not your display\
    \ name.\n\n### Rate limiting (429 responses)\n\n**Cause:** Confluence rate limits\
    \ API requests.\n\n**Fix:** The pipeline automatically retries with exponential\
    \ backoff (3\nretries). For large spaces with more than 1,000 pages, the pipeline\n\
    paginates requests automatically. If rate limiting persists, wait 60 seconds\n\
    and retry."
