content:
  docs_markdown: "## Cause 3: Firewall or reverse proxy blocking requests\n\n**Symptom:**\
    \ Requests from external services timeout. Local `curl` requests work fine.\n\n\
    **Why:** The service listens on port 5678 by default. If your server firewall\
    \ or reverse proxy (Nginx, Caddy, Traefik) does not route traffic to this port,\
    \ external requests never reach it.\n\n**Fix:**\n\n=== \"Docker with Nginx\"\n\
    \n Verify your Nginx config routes traffic to the container:\n\n ```nginx\n location\
    \ /webhook/ {\n proxy_pass http://product:5678;\n proxy_set_header Host $host;\n\
    \ proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n }\n```\n\n===\
    \ \"Direct install\"\n\n Check that port 5678 is open:\n\n ```bash\n sudo ufw\
    \ allow 5678\n # or\n sudo firewall-cmd --add-port=5678/tcp --permanent\n```\n\
    \n## Cause 4: Incorrect WEBHOOK_URL environment variable\n\n**Symptom:** The Webhook\
    \ node shows a URL that does not match your domain. External services cannot reach\
    \ it.\n\n**Why:** The service uses the `WEBHOOK_URL` environment variable to generate\
    \ webhook URLs. If this is set to `http://localhost:5678` (the default), external\
    \ services cannot resolve `localhost`.\n\n**Fix:** Set `WEBHOOK_URL` to your public-facing\
    \ URL:\n\n```bash\nexport WEBHOOK_URL=https://product.yourdomain.com\n```"
