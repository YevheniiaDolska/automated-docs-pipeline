content:
  docs_markdown: "## Step 4: Start runtime server\n\n```bash\npython3 -m venv .venv\n\
    source .venv/bin/activate\npip install -r requirements.txt\nuvicorn app.main:app\
    \ --host 0.0.0.0 --port 8090\n```\n\nHealth check:\n\n=== \"cURL\"\n\n    ```bash\
    \ smoke\n    curl http://localhost:8090/healthz\n    ```\n\n=== \"JavaScript\"\
    \n\n    ```javascript smoke\n    const response = await fetch('http://localhost:8090/healthz',\
    \ {\n      method: 'GET',\n      headers: {\n},\n    });\n    const payload =\
    \ await response.json();\n    console.log(payload);\n    ```\n\n=== \"Python\"\
    \n\n    ```python smoke\n    import requests\n\n    response = requests.request(\n\
    \        'GET',\n        'http://localhost:8090/healthz',\n        headers={},\n\
    \        timeout=30,\n    )\n    response.raise_for_status()\n    print(response.json())\n\
    \    ```\n\n## Step 5: Embed the widget\n\nAdd this snippet to the docs site page\
    \ template or custom HTML block:\n\n```html\n<script\n  src=\"/ask-ai/public/ask-ai-widget.js\"\
    \n  data-ask-ai-endpoint=\"https://docs.example.com/ask-ai/api/v1/ask\"\n  data-ask-ai-api-key=\"\
    YOUR_PUBLIC_OR_PROXY_KEY\"\n  data-user-id=\"USER_123\"\n  data-user-role=\"support\"\
    \n  data-plan=\"pro\"\n  data-enabled=\"true\"></script>\n```\n\n## Troubleshooting\n\
    \n### Runtime pack install fails because destination exists\n\nUse force mode:\n\
    \n```bash\nnpm run askai:runtime:install:force\n```\n\n### Ask endpoint returns\
    \ 401\n\nCheck `X-Ask-AI-Key` header and `ASK_AI_API_KEY` value."
  assistant_context: "Use this module when answering questions related to: Install\
