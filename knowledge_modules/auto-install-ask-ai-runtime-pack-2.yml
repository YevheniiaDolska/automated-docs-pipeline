content:
  docs_markdown: "## Step 3: Configure runtime environment\n\n```bash\ncd ask-ai-runtime\n\
    cp .env.example .env\n```\n\nFill these values in `.env`:\n\n- `ASK_AI_API_KEY`\n\
    - `ASK_AI_PROVIDER_API_KEY`\n- `ASK_AI_WEBHOOK_SECRET`\n\nThe following advanced\
    \ retrieval features are enabled by default and require no additional configuration:\n\
    \n| Feature | Env var override | Default |\n| --- | --- | --- |\n| Hybrid search\
    \ (RRF) | `ASK_AI_HYBRID_ENABLED` | `true` |\n| HyDE query expansion | `ASK_AI_HYDE_ENABLED`\
    \ | `true` |\n| Cross-encoder reranking | `ASK_AI_RERANK_ENABLED` | `true` |\n\
    | Embedding cache | `ASK_AI_EMBED_CACHE_ENABLED` | `true` |\n\n## Step 4: Start\
    \ runtime server\n\n```bash\npython3 -m venv .venv\nsource .venv/bin/activate\n\
    pip install -r requirements.txt\nuvicorn app.main:app --host 0.0.0.0 --port 8090\n\
    ```\n\nHealth check:\n\n=== \"cURL\"\n\n    ```bash smoke\n    curl http://localhost:8090/healthz\n\
    \    ```\n\n=== \"JavaScript\"\n\n    ```javascript smoke\n    const response\
    \ = await fetch('http://localhost:8090/healthz', {\n      method: 'GET',\n   \
    \   headers: {\n},\n    });\n    const payload = await response.json();\n    console.log(payload);\n\
    \    ```\n\n=== \"Python\"\n\n    ```python smoke\n    import requests\n\n   \
    \ response = requests.request(\n        'GET',\n        'http://localhost:8090/healthz',\n\
    \        headers={},\n        timeout=30,\n    )\n    response.raise_for_status()\n\
    \    print(response.json())\n    ```"
