content:
  docs_markdown: "### Network security\n\n1. All public endpoints require TLS 1.3\
    \ encryption. Older TLS versions\n   are rejected.\n1. Database and Redis ports\
    \ are bound to `127.0.0.1` only -- no external\n   access.\n1. SSH access uses\
    \ Ed25519 keys exclusively. Password authentication is\n   disabled.\n1. Firewall\
    \ rules allow only ports 80 (redirect to 443), 443 (HTTPS), and\n   22 (SSH from\
    \ allowlisted IPs).\n\n## Authentication and access control\n\n### User authentication\n\
    \n| Mechanism | Implementation |\n|-----------|---------------|\n| Password hashing\
    \ | PBKDF2-SHA256 with 600,000 iterations |\n| Token format | JWT (PyJWT) with\
    \ HS256 signing |\n| Token expiry | 24 hours |\n| Session management | Stateless\
    \ JWT, no server-side sessions |\n| Rate limiting | 60 requests per minute per\
    \ user |\n\n### API authentication\n\nAll API endpoints except `/health` and `/auth/register`\
    \ require a valid\nJWT token in the `Authorization: Bearer <token>` header.\n\n\
    ```text\nPOST /auth/login\nContent-Type: application/json\n\n{\"email\": \"user@example.com\"\
    , \"password\": \"your-password\"}\n\nResponse: {\"token\": \"eyJ...\", \"expires_in\"\
    : 86400}\n```\n\n### Webhook verification\n\nIncoming LemonSqueezy webhooks are\
    \ verified using HMAC-SHA256 signatures.\nRequests without a valid `X-Signature`\
    \ header are rejected with HTTP 403.\n\n## Encryption"
