    # Network transparency reference


    The {{ product_name }} pipeline is a locally installed tool that generates documentation
    using your own LLM. This reference lists every outgoing network request the pipeline
    can make, with exact payload schemas. You can verify each claim with a packet
    capture tool.


    ## Zero client data guarantee


    The pipeline processes all documentation locally. Your source code, API contracts,
    documentation content, and generated outputs never leave your network. The only
    outgoing requests contain license metadata and version information.


    ## Complete outgoing request inventory


    The pipeline makes exactly 5 types of outgoing HTTP requests. Each request is
    listed below with the exact JSON schema of what is sent.'
