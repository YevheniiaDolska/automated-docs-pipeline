content:
  docs_markdown: "# Advanced Search\n\n<div id=\"faceted-search-app\">\n  <p style=\"\
    text-align: center; padding: 2rem; color: var(--md-default-fg-color--light);\"\
    >\n    Loading search interface.\n  </p>\n</div>\n\n<style>\n  /*Custom styles\
    \ for faceted search*/\n  .fs-container {\n    display: flex;\n    gap: 2rem;\n\
    \    flex-wrap: wrap;\n  }\n\n.fs-sidebar {\n    min-width: 250px;\n    flex:\
    \ 0 0 250px;\n  }\n\n.fs-results {\n    flex: 1;\n    min-width: 300px;\n  }\n\
    \n.fs-search-box {\n    width: 100%;\n    padding: 10px 16px;\n    margin-bottom:\
    \ 1.5rem;\n    border: 2px solid var(--md-default-fg-color--lighter);\n    border-radius:\
    \ 8px;\n    font-size: 1rem;\n    background: var(--md-default-bg-color);\n  \
    \  color: var(--md-default-fg-color);\n    transition: border-color 0.2s;\n  }\n\
    \n.fs-search-box:focus {\n    outline: none;\n    border-color: var(--md-primary-fg-color);\n\
    \  }\n\n.fs-facet-group {\n    margin-bottom: 1.5rem;\n  }\n\n.fs-facet-title\
    \ {\n    display: block;\n    margin-bottom: 0.5rem;\n    font-size: 0.9rem;\n\
    \    font-weight: 600;\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n\
    \    color: var(--md-default-fg-color--light);\n  }\n\n.fs-facet-option {\n  \
    \  display: flex;\n    align-items: center;\n    gap: 8px;\n    padding: 4px 0;\n\
    \    font-size: 0.95rem;\n    cursor: pointer;\n  }\n\n.fs-facet-option:hover\
    \ {\n    color: var(--md-primary-fg-color);\n  }\n\n.fs-facet-checkbox {\n   \
    \ cursor: pointer;\n  }"
