content:
  docs_markdown: "// Keep the script running for 60 seconds to receive events\nsetTimeout(()\
    \ => {\n  ws.close(1000, 'Tutorial complete');\n  console.log('Tutorial WebSocket\
    \ client closed');\n}, 60000);\n```\n\n<!-- requires: api-key -->\n\nRun the script:\n\
    \n```bash\nnode tutorial-websocket.js\n```\n\nWhile the script runs, update the\
    \ project status from another terminal to trigger an event:\n\n```bash\ncurl -X\
    \ PUT https://api.veriops.example/v1/projects/prj_abc123 \\\n  -H \"Authorization:\
    \ Bearer YOUR_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"\
    status\": \"archived\"}'\n```\n\n<!-- requires: api-key -->\n\nThe WebSocket client\
    \ prints the update event within 1-2 seconds."
