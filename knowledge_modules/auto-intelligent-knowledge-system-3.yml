content:
  docs_markdown: '## RAG integration contract


    Ask AI reads the same artifacts that the weekly knowledge pipeline refreshes.


    - `docs/assets/knowledge-retrieval-index.json` is the primary retrieval index.

    - `docs/assets/retrieval.faiss` is the FAISS vector index with `text-embedding-3-small`
    embeddings.

    - `docs/assets/retrieval-metadata.json` is the metadata sidecar for the FAISS
    index.

    - `docs/assets/knowledge-graph.jsonld` adds relationship context for retrieval
    and reasoning.

    - `reports/retrieval_evals_report.json` provides retrieval quality gates (Precision,
    Recall, Hallucination-rate).


    This shared contract keeps documentation generation, knowledge base updates, and
    RAG runtime aligned.'
