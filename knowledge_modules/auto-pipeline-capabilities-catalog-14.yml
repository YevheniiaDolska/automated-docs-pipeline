content:
  docs_markdown: '## Quality checks (32 automated)


    The pipeline enforces 32 automated checks on every documentation page across four
    categories:


    | Category | Count | What they verify |

    | --- | --- | --- |

    | GEO checks | 8 | LLM and AI search optimization: meta descriptions, first paragraph
    length, heading hierarchy, fact density |

    | SEO checks | 14 | Traditional search optimization: title length, URL depth,
    internal links, image alt text, structured data |

    | Style checks | 6 | American English, active voice, no weasel words, no contractions,
    second person, present tense |

    | Contract checks | 4 | Schema validation, regression detection, snippet lint,
    self-verification against endpoints |'
