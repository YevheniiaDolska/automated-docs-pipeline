content:
  docs_markdown: "## Playground embed\n\n<div id=\"swagger-ui-taskstream\"></div>\n\
    <link rel=\"stylesheet\" href=\"https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui.css\"\
    >\n<script src=\"https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-bundle.js\"\
    ></script>\n<script>\n(function() {\n  var specUrl = \"{{ config.site_url }}assets/api/openapi.bundled.json\"\
    ;\n  var sandboxUrl = \"{{ config.extra.plg.api_playground.endpoints.sandbox_base_url\
    \ }}\";\n  function boot() {\n    if (typeof SwaggerUIBundle === \"undefined\"\
    ) { setTimeout(boot, 100); return; }\n    SwaggerUIBundle({\n      url: specUrl,\n\
    \      dom_id: \"#swagger-ui-taskstream\",\n      deepLinking: true,\n      docExpansion:\
    \ \"list\",\n      defaultModelsExpandDepth: 1,\n      supportedSubmitMethods:\
    \ [\"get\",\"put\",\"post\",\"delete\",\"options\",\"head\",\"patch\",\"trace\"\
    ],\n      requestInterceptor: function (req) {\n        if (req.url === specUrl\
    \ || req.url.indexOf(\"openapi\") !== -1) return req;\n        try {\n       \
    \   var u = new URL(req.url, location.origin);\n          var t = new URL(sandboxUrl,\
    \ location.origin);\n          u.protocol = t.protocol; u.hostname = t.hostname;\
    \ u.port = t.port;\n          req.url = u.toString();\n        } catch (e) {}\n\
    \        return req;\n      }\n    });\n  }\n  boot();\n})();\n</script>\n\nFor\
    \ multi-version API docs, publish one spec per version and add separate playground\
    \ blocks or tabs:\n\n- `/assets/api/v1/openapi.yaml`\n- `/assets/api/v2/openapi.yaml`"
