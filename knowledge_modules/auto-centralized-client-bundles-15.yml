    \u0442\u044B\u0445 \u043F\u0440\u0438\u043C\u0435\u0440\u0430\n\n### \u041A\u043B\
    \u0438\u0435\u043D\u0442 1: \u0442\u043E\u043B\u044C\u043A\u043E Sphinx, \u0431\
    \u0435\u0437 drift\n\n```yaml\nruntime:\n  output_targets: [\"sphinx\"]\n  modules:\n\
    \    gap_detection: true\n    drift_detection: false\n    docs_contract: true\n\
    \    kpi_sla: true\n    rag_optimization: true\n    ontology_graph: true\n   \
    \ retrieval_evals: true\n    terminology_management: true\nbundle:\n  include_scripts:\n\
    \    - \"scripts/check_docs_contract.py\"\n    - \"scripts/evaluate_kpi_sla.py\"\
    \n    - \"scripts/generate_knowledge_graph_jsonld.py\"\n    - \"scripts/run_retrieval_evals.py\"\
    \n    - \"scripts/sync_project_glossary.py\"\n```\n\n### \u041A\u043B\u0438\u0435\
    \u043D\u0442 2: ReadMe + GitHub, \u043E\u0447\u0435\u043D\u044C \u0441\u0442\u0440\
    \u043E\u0433\u0438\u0439 quality bar\n\n```yaml\nruntime:\n  output_targets: [\"\
    readme\", \"github\"]\nbundle:\n  base_policy_pack: \"plg\"\n  policy_overrides:\n\
    \    kpi_sla:\n      min_doc_coverage: 90\n      max_quality_score_drop: 2\n```\n\
    \n\u0412\u044B \u043C\u0435\u043D\u044F\u0435\u0442\u0435 \u0442\u043E\u043B\u044C\
