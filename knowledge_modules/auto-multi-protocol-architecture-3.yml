content:
  docs_markdown: "## Test assets and smart-merge\n\n- Generator: `scripts/generate_protocol_test_assets.py`\n\
    - Upload: `scripts/upload_api_test_assets.py`\n- Coverage gate: `scripts/validate_protocol_test_coverage.py`\n\
    - Runtime self-verify (mock/real endpoint): `scripts/run_protocol_self_verify.py`\n\
    - Protocol docs quality + lifecycle suite: `scripts/run_protocol_docs_quality_suite.py`\n\
    \  - applies docs normalization, metadata optimization, multilang/smoke checks\n\
    \  - updates glossary markers\n  - refreshes RAG assets (knowledge modules, retrieval\
    \ index, knowledge graph, retrieval evals)\n- Smart-merge preserves manual/customized\
    \ cases and sets `needs_review` on drift/stale entities.\n- Non-REST generator\
    \ emits richer artifacts: cases JSON, TestRail CSV, Zephyr JSON, `test_matrix.json`,\
    \ `fuzz_scenarios.json`.\n\n## Template and snippet parity\n\n- Protocol-specific\
    \ templates are part of the default library:\n  - `templates/protocols/graphql-reference.md`\n\
    \  - `templates/protocols/grpc-reference.md`\n  - `templates/protocols/asyncapi-reference.md`\n\
    \  - `templates/protocols/websocket-reference.md`\n- Reusable blocks are centralized\
    \ in `templates/protocols/api-protocol-snippets.md`.\n- LLM generation uses these\
    \ assets to keep structure, terminology, and formatting consistent with REST-grade\
    \ docs.\n\n## Next steps\n\n- [Documentation index](../index.md)"
