  docs_markdown: "// Test verification\nconst testPayload = '{\"event\": \"order.completed\"\
    , \"order_id\": \"ord_1234\"}';\nconst testSecret = 'whsec_test_secret_key_abc123_min32chars';\n\
    const testTimestamp = Math.floor(Date.now() / 1000).toString();\nconst testSig\
    \ = crypto\n  .createHmac('sha256', testSecret)\n  .update(`${testTimestamp}.${testPayload}`)\n\
    \  .digest('hex');\n\nconst valid = verifyWebhookSignature(\n  testPayload, `t=${testTimestamp},v1=${testSig}`,\
    \ testSecret\n);\nconsole.log('Signature valid:', valid);  // true\n```"
