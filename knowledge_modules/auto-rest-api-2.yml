content:
  docs_markdown: '## Resource catalog


    The API exposes five resources with standard CRUD operations:


    | Resource | Endpoints | Methods | Description |

    | --- | --- | --- | --- |

    | Projects | `/v1/projects`, `/v1/projects/{id}` | GET, POST, PUT, DELETE | Project
    management with status tracking |

    | Tasks | `/v1/tasks`, `/v1/tasks/{id}` | GET, POST, PUT, DELETE | Task CRUD within
    projects |

    | Users | `/v1/users`, `/v1/users/{id}` | GET, POST | User management and profiles
    |

    | Tags | `/v1/tags`, `/v1/tags/{id}` | GET, POST, DELETE | Resource tagging and
    categorization |

    | Comments | `/v1/comments`, `/v1/comments/{id}` | GET, POST, DELETE | Threaded
    comments on tasks |


    ## Endpoints: projects'
