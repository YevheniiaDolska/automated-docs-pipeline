    ,\n  \"title\": \"Order queue rejects when warehouse is at capacity\",\n  \"suite\"\
    : \"Business Logic\",\n  \"operation_id\": \"manual\",\n  \"traceability\": {\"\
    method\": \"POST\", \"path\": \"/orders\", \"operation_id\": \"manual\"},\n  \"\
    preconditions\": [\"Warehouse capacity is set to 500.\", \"Current queue has 500\
    \ items.\"],\n  \"steps\": [\n    \"Send POST /orders with a new order payload.\"\
    ,\n    \"Verify the response returns 409 Conflict.\",\n    \"Verify the error\
    \ body includes a capacity_exceeded code.\"\n  ],\n  \"expected_result\": \"Order\
    \ is rejected with a capacity exceeded error.\",\n  \"priority\": \"high\",\n\
    \  \"type\": \"functional\",\n  \"origin\": \"manual\",\n  \"customized\": false,\n\
    \  \"needs_review\": false,\n  \"review_reason\": null,\n  \"spec_hash\": \"\"\
    \n}\n```\n\nSet `origin` to `manual` and leave `spec_hash` empty. The merge engine\
