content:
  docs_markdown: "## Set up async event processing with BullMQ\n\nAfter signature\
    \ verification, enqueue events for reliable async processing. This pattern returns\
    \ HTTP 200 immediately and processes events in the background with automatic retries.\n\
    \n```javascript\nconst { Queue, Worker } = require('bullmq');\nconst Redis = require('ioredis');\n\
    \n// Connect to Redis for queue storage\nconst connection = new Redis({\n  host:\
    \ '127.0.0.1',\n  port: 6379,\n  maxRetriesPerRequest: null,\n});\n\n// Create\
    \ webhook event queue\nconst webhookQueue = new Queue('webhook-events', { connection\
    \ });\n\n// Enqueue a verified webhook event\nasync function enqueueWebhookEvent(event)\
    \ {\n  await webhookQueue.add(event.type, event, {\n    attempts: 5,\n    backoff:\
    \ {\n      type: 'exponential',\n      delay: 1000,  // 1s, 2s, 4s, 8s, 16s\n\
    \    },\n    removeOnComplete: 1000,\n    removeOnFail: 5000,\n  });\n}\n\n//\
    \ Process events from the queue\nconst worker = new Worker('webhook-events', async\
    \ (job) => {\n  const event = job.data;\n  console.log(`Processing ${event.type}:\
    \ ${JSON.stringify(event)}`);"
