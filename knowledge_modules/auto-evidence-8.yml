content:
  docs_markdown: "### Advanced retrieval features (enabled by default)\n\nSix advanced\
    \ features are available to improve retrieval quality beyond the token-overlap\
    \ baseline:\n\n| Feature | Description | Expected impact |\n| --- | --- | ---\
    \ |\n| Token-aware chunking | Splits modules into 750-token chunks with 100-token\
    \ overlap (`cl100k_base`) | Improves recall for long documents |\n| Hybrid search\
    \ (RRF) | Fuses semantic (FAISS) and token-overlap rankings with Reciprocal Rank\
    \ Fusion (k=60) | Higher recall for mixed queries |\n| HyDE query expansion |\
    \ Generates hypothetical doc passage via `gpt-4.1-mini` before embedding | Better\
    \ retrieval for vague queries |\n| Cross-encoder reranking | Rescores top 20 candidates\
    \ with `cross-encoder/ms-marco-MiniLM-L-6-v2` | Higher precision in top-N |\n\
    | Embedding cache | In-memory LRU cache (TTL: 3,600 seconds, max: 512 entries)\
    \ for query embeddings | Reduced latency and API costs |\n| Multi-mode evaluation\
    \ | Compares token, semantic, hybrid, and hybrid+rerank modes across 50 curated\
    \ queries | Data-driven mode selection |\n\nRun a full retrieval comparison across\
    \ all four modes:\n\n```bash\npython3 scripts/run_retrieval_evals.py \\\n  --mode\
    \ all \\\n  --dataset config/retrieval_eval_dataset.yml \\\n  --report reports/retrieval_comparison.json\n\
    ```\n\n<!-- requires: OPENAI_API_KEY, faiss-cpu, sentence-transformers -->"
