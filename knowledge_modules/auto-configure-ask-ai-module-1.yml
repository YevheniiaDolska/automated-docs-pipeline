content:
  docs_markdown: "<!-- VERIDOC_POWERED_BADGE:START -->\n[![Powered by VeriDoc](https://img.shields.io/badge/Powered%20by-VeriDoc-0ea5e9?style=flat-square)](https://veridoc.app)\n\
    <!-- VERIDOC_POWERED_BADGE:END -->\n\n# Configure Ask AI module\n\nUse this guide\
    \ to enable or disable Ask AI in the pipeline and set provider plus billing mode\
    \ without editing multiple files manually.\n\n```bash\nnpm run askai:status\n\
    npm run askai:enable\nnpm run askai:configure -- --provider openai --billing-mode\
    \ user-subscription --model gpt-4.1-mini\n```\n\n## Before you start\n\nYou need:\n\
    \n- A working project setup (`npm install` completed)\n- Access to `config/ask-ai.yml`\n\
    - A decision about billing mode:\n  - `disabled`\n  - `bring-your-own-key`\n \
    \ - `user-subscription`\n\n## Step 1: Check current status\n\nRun:\n\n```bash\n\
    npm run askai:status\n```\n\nThis prints the active Ask AI configuration from\
    \ `config/ask-ai.yml`.\n\n## Step 2: Enable or disable Ask AI\n\nEnable:\n\n```bash\n\
    npm run askai:enable\n```\n\nDisable:\n\n```bash\nnpm run askai:disable\n```\n\
    \nUse disabled mode when a client does not want AI Q&A in their deployment.\n\n\
    ## Step 3: Set provider and billing mode\n\nExample for managed usage:\n\n```bash\n\
    npm run askai:configure -- --provider openai --billing-mode user-subscription\
    \ --model gpt-4.1-mini\n```\n\nExample for customer-provided key:\n\n```bash\n\
    npm run askai:configure -- --provider openai --billing-mode bring-your-own-key\n\
    ```"
