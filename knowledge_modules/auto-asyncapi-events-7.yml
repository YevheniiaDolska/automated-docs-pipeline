    \  host='events.veriops.example',\n        port=5672,\n        credentials=pika.PlainCredentials('YOUR_USERNAME',\
    \ 'YOUR_PASSWORD')\n    )\n)\nchannel = connection.channel()\nchannel.queue_declare(queue='my-consumer',\
    \ durable=True)\nchannel.queue_bind(queue='my-consumer', exchange='veriops.events',\
    \ routing_key='project.updated')\n\nprocessed_ids = set()\n\ndef on_message(ch,\
    \ method, properties, body):\n    event = json.loads(body)\n    if event['event_id']\
    \ in processed_ids:\n        ch.basic_ack(delivery_tag=method.delivery_tag)\n\
    \        return\n    processed_ids.add(event['event_id'])\n    print(f\"Project\
    \ {event['data']['project_id']} status: {event['data']['status']}\")\n    ch.basic_ack(delivery_tag=method.delivery_tag)\n\
    \nchannel.basic_consume(queue='my-consumer', on_message_callback=on_message)\n\
    channel.start_consuming()\n```\n\n<!-- requires: pika, amqp-credentials -->"
