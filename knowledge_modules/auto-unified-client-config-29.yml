content:
  docs_markdown: "### Full UTP baseline (recommended)\n\n```yaml\nruntime:\n  docs_flow:\n\
    \    mode: \"hybrid\"\n  modules:\n    gap_detection: true\n    drift_detection:\
    \ true\n    docs_contract: true\n    kpi_sla: true\n    rag_optimization: true\n\
    \    multilang_examples: true\n    normalization: true\n    snippet_lint: true\n\
    \    knowledge_validation: true\n    i18n_sync: true\n    release_pack: true\n\
    \  custom_tasks:\n    weekly:\n      - id: \"seo-geo\"\n        enabled: true\n\
    \        command: \"python3 docsops/scripts/seo_geo_optimizer.py docs/\"\n   \
    \     continue_on_error: true\n      - id: \"knowledge-index\"\n        enabled:\
    \ true\n        command: \"python3 docsops/scripts/generate_knowledge_retrieval_index.py\"\
    \n        continue_on_error: true\n```\n\nDefault automation order in weekly runner:\n\
    \n\\11. extract knowledge modules from docs (`extract_knowledge_modules_from_docs.py`)\n\
    \\11. validate modules (`validate_knowledge_modules.py`)\n\\11. regenerate retrieval\
    \ index (`generate_knowledge_retrieval_index.py`)\n\\11. generate JSON-LD knowledge\
    \ graph (`generate_knowledge_graph_jsonld.py`)\n\\11. run retrieval evals (`run_retrieval_evals.py`)\n\
    \\11. sync glossary markers to `glossary.yml` (`sync_project_glossary.py`)\n\\\
    11. generate multi-language tabs (`generate_multilang_tabs.py`)\n\\11. validate\
    \ multi-language tabs (`validate_multilang_examples.py`)\n\\11. run smoke checks\
    \ with optional `expected-output` matching (`check_code_examples_smoke.py`)"
