content:
  docs_markdown: "### 3.3) PR \u0430\u0432\u0442\u043E-\u0444\u0438\u043A\u0441 \u0434\
    \u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u0438 (\u0432 \u0442\
    \u0443 \u0436\u0435 PR-\u0432\u0435\u0442\u043A\u0443)\n\n```yaml\nruntime:\n\
    \  pr_autofix:\n    enabled: true\n    require_label: false\n    label_name: \"\
    auto-doc-fix\"\n    enable_auto_merge: false\n    commit_message: \"docs: auto-sync\
    \ PR docs\"\n    workflow_filename: \"docsops-pr-autofix.yml\"\n```\n\n\u0427\u0442\
    \u043E \u043F\u0440\u043E\u0438\u0441\u0445\u043E\u0434\u0438\u0442:\n\n\\11.\
    \ Workflow \u0437\u0430\u043F\u0443\u0441\u043A\u0430\u0435\u0442\u0441\u044F\
    \ \u043D\u0430 `pull_request` \u0441\u043E\u0431\u044B\u0442\u0438\u044F\u0445\
    .\n\\11. \u0421\u043C\u043E\u0442\u0440\u0438\u0442 \u0442\u043E\u043B\u044C\u043A\
    \u043E diff \u0442\u0435\u043A\u0443\u0449\u0435\u0433\u043E PR (`base...head`).\n\
    \\11. \u0415\u0441\u043B\u0438 PR \u0437\u0430\u0431\u043B\u043E\u043A\u0438\u0440\
    \u043E\u0432\u0430\u043D \u043F\u043E docs-contract/drift, \u0434\u043E\u0431\u0430\
    \u0432\u043B\u044F\u0435\u0442 docs-\u043F\u0440\u0430\u0432\u043A\u0438.\n\\\
    11. \u041A\u043E\u043C\u043C\u0438\u0442\u0438\u0442 \u043F\u0440\u0430\u0432\u043A\
    \u0438 \u0432 \u0442\u0443 \u0436\u0435 PR-\u0432\u0435\u0442\u043A\u0443 (\u043D\
    \u0435 \u0432 `main`).\n\\11. Checks \u043F\u0435\u0440\u0435\u0437\u0430\u043F\
    \u0443\u0441\u043A\u0430\u044E\u0442\u0441\u044F \u0430\u0432\u0442\u043E\u043C\
    \u0430\u0442\u0438\u0447\u0435\u0441\u043A\u0438.\n\n\u041E\u0434\u043D\u043E\u0440\
    \u0430\u0437\u043E\u0432\u0430\u044F \u043D\u0430\u0441\u0442\u0440\u043E\u0439\
    \u043A\u0430 \u0434\u043B\u044F \u043A\u043B\u0438\u0435\u043D\u0442\u0430:\n\n\
    \\11. \u0412\u043A\u043B\u044E\u0447\u0438\u0442\u044C `Read and write permissions`\
    \ \u0434\u043B\u044F GitHub Actions \u0432 \u0440\u0435\u043F\u043E\u0437\u0438\
    \u0442\u043E\u0440\u0438\u0438.\n\\11. \u041E\u043F\u0446\u0438\u043E\u043D\u0430\
    \u043B\u044C\u043D\u043E \u0434\u043E\u0431\u0430\u0432\u0438\u0442\u044C `DOCSOPS_BOT_TOKEN`\
    \ (`contents:write`, `pull_requests:write`) \u0435\u0441\u043B\u0438 \u0432 \u043E\
    \u0440\u0433\u0430\u043D\u0438\u0437\u0430\u0446\u0438\u0438 \u043E\u0433\u0440\
    \u0430\u043D\u0438\u0447\u0435\u043D \u0441\u0442\u0430\u043D\u0434\u0430\u0440\
    \u0442\u043D\u044B\u0439 \u0442\u043E\u043A\u0435\u043D.\n\\11. \u041F\u0440\u043E\
    \u0433\u043D\u0430\u0442\u044C provisioning, \u0447\u0442\u043E\u0431\u044B \u0443\
    \u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C `.github/workflows/docsops-pr-autofix.yml`."
