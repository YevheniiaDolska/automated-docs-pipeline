content:
  docs_markdown: "### EU-US transfers\n\nFor sub-processors located in the United\
    \ States, we rely on:\n\n1. Standard Contractual Clauses (SCCs) approved by the\
    \ European Commission\n   (June 2021 version).\n1. Supplementary measures including\
    \ encryption in transit and at rest.\n1. Data minimization -- only the minimum\
    \ data necessary is transferred.\n\n### Transfer impact assessment\n\nWe have\
    \ conducted transfer impact assessments for each non-EU\nsub-processor. Assessments\
    \ are available upon request at\n<privacy@veri-doc.app>.\n\n## Data breach notification\n\
    \nIn the event of a personal data breach:\n\n| Step | Timeline | Action |\n|------|----------|--------|\n\
    | 1 | Within 24 hours | Internal incident response team activated |\n| 2 | Within\
    \ 72 hours | Written notification to you with breach details |\n| 3 | Within 72\
    \ hours | Notification to supervisory authority (if required) |\n| 4 | Ongoing\
    \ | Regular updates on investigation and remediation |\n\nBreach notification\
    \ includes:\n\n1. Nature of the breach and categories of data affected.\n1. Estimated\
    \ number of data subjects affected.\n1. Likely consequences of the breach.\n1.\
    \ Measures taken to address and mitigate the breach."
