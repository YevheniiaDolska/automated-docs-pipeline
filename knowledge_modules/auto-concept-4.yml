content:
  docs_markdown: '### Stage 5: quality gate


    Run 24 automated checks on every generated page:


    | Category | Check count | What they verify |

    | --- | --- | --- |

    | GEO (8 checks) | 8 | LLM and AI search optimization: meta descriptions, first
    paragraph length, heading hierarchy, fact density |

    | SEO (14 checks) | 14 | Traditional search optimization: title length, URL depth,
    internal links, structured data |

    | Style (automated) | Per-page | American English, active voice, no weasel words,
    no contractions |

    | Contract (per-protocol) | Per-endpoint | Schema validation, regression detection,
    snippet lint |


    ### Stage 6: test assets


    Generate API test cases for integration testing frameworks. The pipeline produces
    test cases in three formats:


    | Format | Output path | Purpose |

    | --- | --- | --- |

    | JSON (generic) | `reports/api_test_cases.json` | Framework-agnostic test definitions
    |

    | CSV (TestRail) | `reports/testrail_test_cases.csv` | Import into TestRail test
    management |

    | JSON (Zephyr) | `reports/zephyr_test_cases.json` | Import into Zephyr Scale
    for Jira |'
