  docs_markdown: "1. Creates or reuses Postman mock server.\n1. Resolves final public\
    \ mock URL.\n1. Uses it for API self-verification.\n1. Syncs docs playground endpoint\
    \ automatically.\n1. Generates API test assets (cases, matrix, property/fuzz scenarios,\
    \ CSV/JSON exports).\n1. Optionally uploads those assets to TestRail/Zephyr.\n\
    \n## 7. Module switches\n\n```yaml\nruntime:\n  modules:\n    gap_detection: true\n\
