content:
  docs_markdown: '- `--manual-overrides`: keep advanced hand-crafted schema parts
    (`x-*`, `oneOf`, vendor extensions) across regeneration.

    - `--regression-snapshot`: block unexpected contract drift.

    - `--update-regression-snapshot`: refresh baseline snapshot only when intentional
    changes are approved.


    ## Test asset smart merge


    When you pass `--generate-test-assets`, the pipeline generates contract test cases

    from the OpenAPI spec into `reports/api-test-assets/api_test_cases.json`.

    The generator uses a smart merge strategy that preserves manual and customized
    cases

    across re-runs.'
