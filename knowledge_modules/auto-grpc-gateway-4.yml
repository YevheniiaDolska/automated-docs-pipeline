content:
  docs_markdown: "## Quick start: get a project via HTTP gateway\n\nThe HTTP gateway\
    \ translates JSON requests into gRPC calls. You do not need a gRPC client library.\n\
    \n```bash\ncurl -X POST https://api.veriops.example/grpc/invoke \\\n  -H \"Authorization:\
    \ Bearer YOUR_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n\
    \    \"service\": \"veriops.v1.ProjectService\",\n    \"method\": \"GetProject\"\
    ,\n    \"payload\": {\"project_id\": \"prj_abc123\"}\n  }'\n```\n\n<!-- requires:\
    \ api-key -->\n\n**Expected response (HTTP 200):**\n\n```json\n{\n  \"id\": \"\
    prj_abc123\",\n  \"name\": \"Website Redesign\",\n  \"status\": \"active\"\n}\n\
    ```\n\n## Quick start: get a project via grpcurl\n\nUse `grpcurl` for direct gRPC\
    \ access without the HTTP gateway:\n\n```bash\ngrpcurl -d '{\"project_id\": \"\
    prj_abc123\"}' \\\n  -H \"Authorization: Bearer YOUR_API_KEY\" \\\n  grpc.veriops.example:443\
    \ veriops.v1.ProjectService/GetProject\n```\n\n<!-- requires: api-key, grpcurl\
    \ -->\n\n## Quick start: create a project\n\n```bash\ncurl -X POST https://api.veriops.example/grpc/invoke\
    \ \\\n  -H \"Authorization: Bearer YOUR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\n    \"service\": \"veriops.v1.ProjectService\",\n    \"method\"\
    : \"CreateProject\",\n    \"payload\": {\"name\": \"Mobile App Launch\", \"status\"\
    : \"active\"}\n  }'\n```\n\n<!-- requires: api-key -->\n\n**Expected response\
    \ (HTTP 200):**\n\n```json\n{\n  \"id\": \"prj_def456\",\n  \"name\": \"Mobile\
    \ App Launch\",\n  \"status\": \"active\"\n}\n```"
