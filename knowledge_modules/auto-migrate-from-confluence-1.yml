content:
  docs_markdown: "# Migrate documentation from Confluence\n\nThe Confluence migration\
    \ tool imports Confluence pages into pipeline-ready\nMarkdown with automatic frontmatter,\
    \ heading hierarchy, SEO/GEO optimization,\nand knowledge module extraction. It\
    \ supports two import methods: REST API\n(direct) and ZIP export (offline).\n\n\
    ## Before you begin\n\nVerify you have the following before starting the migration:\n\
    \n- Python 3.10 or higher installed\n- The documentation pipeline cloned and dependencies\
    \ installed\n- For REST API mode: a Confluence API token (Cloud) or Personal Access\
    \ Token\n  (Server/Data Center)\n- For ZIP export mode: a Confluence HTML+XML\
    \ export ZIP file\n- Sufficient disk space for imported Markdown and attachments\n\
    \n## Choose a migration method\n\nThe pipeline provides two ways to import Confluence\
    \ content:\n\n| Method | Best for | Requirements |\n| --- | --- | --- |\n| REST\
    \ API | Ongoing sync, selective spaces, incremental updates | API token, network\
    \ access to Confluence |\n| ZIP export | One-time migration, air-gapped environments,\
    \ full space backup | Admin access to export from Confluence |\n\n## Method 1:\
    \ Import with REST API\n\nREST API mode connects directly to your Confluence instance,\
    \ fetches pages,\nand converts them to Markdown. It supports both Confluence Cloud\
    \ (API v2) and\nServer/Data Center (API v1)."
