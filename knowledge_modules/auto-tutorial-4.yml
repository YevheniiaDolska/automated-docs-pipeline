content:
  docs_markdown: "## Step 2: create a project via REST (3 minutes)\n\nCreate your\
    \ first project resource using the REST API:\n\n```bash\ncurl -X POST https://api.veriops.example/v1/projects\
    \ \\\n  -H \"Authorization: Bearer YOUR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\n    \"name\": \"Tutorial Integration Project\",\n    \"description\"\
    : \"Created during the VeriOps API tutorial\",\n    \"status\": \"active\"\n \
    \ }'\n```\n\n<!-- requires: api-key -->\n\n**Expected response (HTTP 201):**\n\
    \n```json\n{\n  \"id\": \"prj_abc123\",\n  \"name\": \"Tutorial Integration Project\"\
    ,\n  \"description\": \"Created during the VeriOps API tutorial\",\n  \"status\"\
    : \"active\",\n  \"created_at\": \"2026-03-19T10:00:00Z\",\n  \"updated_at\":\
    \ \"2026-03-19T10:00:00Z\",\n  \"task_count\": 0,\n  \"owner_id\": \"usr_789\"\
    \n}\n```\n\nSave the `id` value (for example, `prj_abc123`). You need it for steps\
    \ 3 and 4."
