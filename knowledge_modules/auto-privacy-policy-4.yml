content:
  docs_markdown: "## How we use your data\n\nWe use personal data exclusively for:\n\
    \n1. **Service delivery** -- processing your documentation, enforcing usage\n\
    \   limits, and managing your subscription.\n1. **Billing** -- processing payments\
    \ through LemonSqueezy, generating\n   invoices, tracking referral commissions.\n\
    1. **Communication** -- sending transactional emails (subscription\n   confirmations,\
    \ trial expiry notices, invoice receipts).\n1. **Security** -- detecting unauthorized\
    \ access, enforcing rate limits,\n   monitoring for abuse.\n1. **Improvement**\
    \ -- analyzing aggregate, anonymized usage patterns to\n   improve the Service.\
    \ We never analyze individual content.\n\n## Data storage and security\n\n###\
    \ Infrastructure\n\n| Component | Location | Encryption |\n|-----------|----------|------------|\n\
    | Application servers | Hetzner Cloud, Germany | TLS 1.3 in transit |\n| PostgreSQL\
    \ database | Hetzner Cloud, Germany | AES-256 at rest |\n| Redis cache | Hetzner\
    \ Cloud, Germany | In-memory, no persistence of content |\n| Backups | Hetzner\
    \ Cloud, Germany | AES-256, 30-day retention |"
