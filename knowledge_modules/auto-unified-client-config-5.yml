content:
  docs_markdown: "## 1. Client identity\n\n```yaml\nclient:\n  id: \"acme\"\n  company_name:\
    \ \"ACME Inc.\"\n  contact_email: \"docs-owner@acme.example\"\n```\n\n## 2. Bundle\
    \ packaging\n\n```yaml\nbundle:\n  output_dir: \"generated/client_bundles\"\n\
    \  base_policy_pack: \"multi-product\"\n  style_guide: \"google\"\n  policy_overrides:\
    \ {}\n  include_scripts: []\n  include_docs: []\n  include_paths: []\n```\n\n\
    ### `base_policy_pack`\n\nAvailable built-ins:\n\n- `minimal`\n- `api-first`\n\
    - `monorepo`\n- `multi-product`\n- `plg`\n\n### `policy_overrides`\n\nDeep-merged\
    \ into selected policy pack for per-client tuning.\n\nExample:\n\n```yaml\nbundle:\n\
    \  policy_overrides:\n    kpi_sla:\n      min_doc_coverage: 90\n      max_quality_score_drop:\
    \ 2\n```\n\n### `style_guide` (Vale style profile)\n\n```yaml\nbundle:\n  style_guide:\
    \ \"google\" # google | microsoft | hybrid\n```\n\nBuilder writes `.vale.ini`\
    \ in client bundle automatically based on this setting.\n\nNotes:\n\n- `google`\
    \ -> Google-based lint profile\n- `microsoft` -> Microsoft-based lint profile\n\
    - `hybrid` -> both style packs enabled\n- all profiles include `write-good` and\
    \ `AmericanEnglish` checks by default\n- run `vale sync` in client repo after\
    \ provisioning to fetch selected style packages"
