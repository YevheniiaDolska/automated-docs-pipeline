content:
  docs_markdown: "## Server auto-renew runbook (hybrid/cloud)\n\nWhen retainer is\
    \ active, run server-side license renewal batch on schedule:\n\n```bash\npython3\
    \ scripts/run_server_license_renewal.py\n```\n\nExpected output is JSON with:\n\
    \n- `scanned`\n- `refreshed`\n- `degraded`\n- `errors`\n\nOptional API trigger\
    \ (ops token required):\n\n=== \"cURL\"\n\n```bash smoke\n    curl -X POST \"\
    https://<your-api>/ops/billing/license/renew/run\" \\\n      -H \"Content-Type:\
    \ application/json\" \\\n      -H \"X-VeriOps-Server-Token: <ops-token>\" \\\n\
    \      -d '{\"dry_run\": false}'\n    ```\n\n=== \"JavaScript\"\n\n```javascript\
    \ smoke\n    const response = await fetch('https://<your-api>/ops/billing/license/renew/run',\
    \ {\n      method: 'POST',\n      headers: {\n        \"Content-Type\": \"application/json\"\
    ,\n        \"X-VeriOps-Server-Token\": \"<ops-token>\",\n      },\n      body:\
    \ JSON.stringify({\"dry_run\": false}),\n    });\n    const payload = await response.json();\n\
    \    console.log(payload);\n    ```\n\n=== \"Python\"\n\n```python smoke\n   \
    \ import requests\n\nresponse = requests.request(\n        'POST',\n        'https://<your-api>/ops/billing/license/renew/run',\n\
    \        headers={'Content-Type': 'application/json', 'X-VeriOps-Server-Token':\
    \ '<ops-token>'},\n        json={'dry_run': False},\n        timeout=30,\n   \
    \ )\n    response.raise_for_status()\n    print(response.json())\n    ```\n\n\
    Policy:"
