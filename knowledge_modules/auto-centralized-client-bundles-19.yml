content:
  docs_markdown: "## Server auto-renew runbook (hybrid/cloud)\n\nWhen retainer is\
    \ active, run server-side license renewal batch on schedule:\n\n```bash\npython3\
    \ scripts/run_server_license_renewal.py\n```\n\nExpected output is JSON with:\n\
    \n- `scanned`\n- `refreshed`\n- `degraded`\n- `errors`\n\nOptional API trigger\
    \ (ops token required):\n\n```bash\ncurl -X POST \"https://<your-api>/ops/billing/license/renew/run\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-VeriOps-Server-Token:\
    \ <ops-token>\" \\\n  -d '{\"dry_run\": false}'\n```\n\nPolicy:\n\n- Active/trialing\
    \ subscriptions get refreshed server license.\n- Inactive subscriptions are downgraded\
    \ on renewal pass.\n- Strict-local clients use offline renewal bundles and do\
    \ not require online renewal.\n\n## Hardening e2e matrix report\n\nGenerate a\
    \ PASS/FAIL report for the hardening controls:\n\n```bash\npython3 scripts/run_hardening_e2e_matrix.py\n\
    ```\n\nReport path:\n\n- `reports/hardening_e2e_matrix_report.json`"
  assistant_context: "Use this module when answering questions related to: \u0426\u0435\
