content:
  docs_markdown: "### `include_paths` (important for templates and knowledge)\n\n\
    Allows copying any extra files and folders into the bundle:\n\n```yaml\nbundle:\n\
    \  include_paths:\n    - \"templates/interactive-diagram.html\"\n    - \"knowledge_modules\"\
    \n```\n\nUse this for:\n\n- interactive diagrams\n- knowledge modules\n- any custom\
    \ assets\n\nDefault behavior:\n\n- You normally do not need to edit `include_paths`\
    \ manually.\n- Preset and profile defaults are already applied during bundle build.\n\
    - Bundle is always created in `generated/client_bundles/<client_id>/`, so operator\
    \ can inspect exact contents before handoff.\n\n## 3. LLM instruction packaging\n\
    \n```yaml\nbundle:\n  llm:\n    codex_instructions_source: \"AGENTS.md\"\n   \
    \ claude_instructions_source: \"CLAUDE.md\"\n    inject_managed_block: true\n\
    \    docsops_root_in_client_repo: \"docsops\"\n```\n\nWhen `inject_managed_block=true`,\
    \ builder auto-inserts managed docsops block into bundled `AGENTS.md` and `CLAUDE.md`.\n\
    \nPlan-level defaults:\n\n- Pilot preset -> `instructions/llm_plans/pilot/AGENTS.md`,\
    \ `instructions/llm_plans/pilot/CLAUDE.md`\n- Basic preset -> `instructions/llm_plans/basic/AGENTS.md`,\
    \ `instructions/llm_plans/basic/CLAUDE.md`\n- Pro preset -> `instructions/llm_plans/pro/AGENTS.md`,\
    \ `instructions/llm_plans/pro/CLAUDE.md`\n- Enterprise preset -> `AGENTS.md`,\
    \ `CLAUDE.md` (current full-scope instructions)"
