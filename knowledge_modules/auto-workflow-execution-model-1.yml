content:
  docs_markdown: "## How the workflow execution model works\n\nThe execution model\
    \ determines how data flows from one node to the next within a workflow. executes\
    \ nodes sequentially, passing data as arrays of JSON objects. Understanding this\
    \ model helps you build reliable workflows and debug unexpected behavior.\n\n\
    ## Data structure between nodes\n\nEvery node in receives and outputs data in\
    \ the same format: an array of items, where each item is a JSON object wrapped\
    \ in a `json` key.\n\n```json\n[\n { \"json\": { \"name\": \"Alice\", \"email\"\
    : \"alice@example.com\" } },\n { \"json\": { \"name\": \"Bob\", \"email\": \"\
    bob@example.com\" } }\n]\n```\n\nWhen a node receives 5 items, it processes each\
    \ item independently. The Slack node, for example, sends 5 separate messages\u2014\
    one per item."
