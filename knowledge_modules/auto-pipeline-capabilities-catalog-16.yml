content:
  docs_markdown: '## Public docs auditor and executive PDF


    The public docs auditor crawls live documentation sites and generates a comprehensive
    quality assessment.


    **Audit modes:**


    | Mode | Command | Description |

    | --- | --- | --- |

    | Basic | `npm run audit:public` | Crawl + evaluate (no LLM) |

    | Interactive wizard | `npm run audit:public:wizard` | Step-by-step guided audit
    |

    | LLM-powered | `npm run audit:public:llm` | Full expert analysis with Claude
    |

    | LLM summary only | `npm run audit:public:llm-summary` | Quick LLM summary without
    full crawl |

    | Executive PDF | `npm run audit:executive-pdf` | Consulting-grade PDF from audit
    results |

    | Scorecard | `npm run audit:scorecard` | Comprehensive scoring across all quality
    dimensions |


    **Executive PDF contents:** cover page with headline findings, executive summary
    with score gauge and grade, per-site metrics table, board-level KPI bars with
    financial impact, risk matrix with priority actions, expert analysis (LLM or data-driven
    fallback), methodology appendix, evidence appendix.


    **Audit scorecard dimensions:** docs quality (SEO/GEO), API coverage, code example
    reliability, glossary health, content freshness, policy compliance.'
