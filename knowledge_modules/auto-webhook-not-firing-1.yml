content:
  docs_markdown: '## Fix: Webhook trigger not firing


    The Webhook node does not respond to incoming HTTP requests. The sender receives
    a timeout, connection refused, or 404 error.


    ## Cause 1: Using Test URL with an inactive editor


    **Symptom:** Requests to the Test URL return a timeout or 404 after you close
    the editor tab.


    **Why:** The Test URL (`/webhook-test/<id>`) is only active while the workflow
    editor is open and the workflow is in Listening mode. Closing the browser tab
    deactivates it.


    **Fix:** Toggle the workflow to **Active** and use the **Production URL** (`/webhook/<id>`)
    instead. The Production URL remains active as long as the workflow is enabled.


    ## Cause 2: Workflow not activated


    **Symptom:** Requests to the Production URL return 404 Not Found.


    **Why:** The Production URL only works when the workflow toggle is set to **Active**
    (green). An inactive workflow does not register its webhook endpoints.


    **Fix:** Open the workflow in the editor. Toggle the **Active** switch in the
    top-right corner. Verify the Production URL returns a response.'
