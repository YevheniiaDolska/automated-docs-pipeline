StylesPath = .vale/styles
MinAlertLevel = error

# Strict mode: errors block commits, warnings are flagged.

Packages = Google, proselint, write-good

# =============================================================
# i18n LINTING STRATEGY
#
# Vale checks American English prose -- it cannot lint Russian,
# German, or other languages. The solution:
#
#   English docs  -> full checks (Google, write-good, proselint, GEO)
#   Other locales -> structural checks only (GEO)
#
# GEO rules (heading hierarchy, fact density, first paragraph
# length) are language-agnostic and work on any locale.
#
# Vale applies the LAST matching glob, so order matters:
#   1. General fallback (all .md files) -- full English checks
#   2. Non-English locale overrides -- GEO only
# =============================================================

# Default: full English checks for all Markdown files.
# This covers docs/en/**, legacy flat layout, and templates/.
[*.md]
BasedOnStyles = Google, GEO, proselint, write-good, AmericanEnglish

# --- Google Developer Style Guide ---
Google.Parens = NO
Google.Spacing = NO

# --- write-good: disable rules that overlap with Google ---
write-good.E-Prime = NO
write-good.So = NO

# ----- Non-English locale overrides (GEO only) -----
# These MUST come after [*.md] so they override the default.
# Add a new section here when adding a language to i18n.yml.

[docs/ru/**/*.md]
BasedOnStyles = GEO

[docs/de/**/*.md]
BasedOnStyles = GEO

[docs/fr/**/*.md]
BasedOnStyles = GEO

[docs/es/**/*.md]
BasedOnStyles = GEO

[docs/zh/**/*.md]
BasedOnStyles = GEO

[docs/ja/**/*.md]
BasedOnStyles = GEO

[docs/ko/**/*.md]
BasedOnStyles = GEO

[docs/pt/**/*.md]
BasedOnStyles = GEO
