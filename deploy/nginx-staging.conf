# VeriDoc staging Nginx configuration
# Single subdomain: staging.veri-doc.app
#   /api/*          -> VeriDoc API (strips /api prefix)
#   /health         -> VeriDoc API health (direct proxy)
#   /*              -> Frontend SPA (Next.js)

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/s;

# Upstreams (host Nginx -> Docker containers via mapped ports)
upstream veridoc_api {
    server 127.0.0.1:8010;
    keepalive 32;
}

upstream veridoc_web {
    server 127.0.0.1:3010;
    keepalive 16;
}

server {
    listen 80;
    server_name staging.veri-doc.app;

    # CORS headers
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Max-Age 86400 always;

    # Preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Health check (no rate limit, no /api prefix needed)
    location /health {
        proxy_pass http://veridoc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints (strict rate limit: 5 req/s)
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://veridoc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook endpoints (moderate rate limit)
    location /api/billing/webhooks/ {
        limit_req zone=webhook_limit burst=20 nodelay;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://veridoc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # All other API endpoints
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://veridoc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        client_max_body_size 16m;
    }

    # Next.js static assets (immutable hashes, aggressive cache)
    location /_next/static/ {
        proxy_pass http://veridoc_web;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend (all non-API routes) -> Next.js server
    location / {
        proxy_pass http://veridoc_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Next.js HMR (dev) and runtime
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
