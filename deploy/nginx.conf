# VeriDoc production Nginx configuration
#
# Domain setup options:
#   Option A (recommended): Subdomains
#     api.veridoc.dev  -> VeriDoc API (this config)
#     app.veridoc.dev  -> Frontend SPA (Next.js)
#     docs.veridoc.dev -> Documentation (MkDocs)
#
#   Option B: Path-based routing (single domain)
#     veridoc.dev/api/*  -> VeriDoc API
#     veridoc.dev/*      -> Frontend SPA
#
# DNS setup (Cloudflare recommended):
#   A record: veridoc.dev -> your-server-ip
#   CNAME:   api.veridoc.dev -> veridoc.dev
#   CNAME:   app.veridoc.dev -> veridoc.dev
#   CNAME:   docs.veridoc.dev -> veridoc.dev
#   Enable "Proxied" (orange cloud) for DDoS protection + CDN
#
# SSL: Use Cloudflare Full (Strict) mode or certbot:
#   certbot certonly --nginx -d veridoc.dev -d api.veridoc.dev -d app.veridoc.dev

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/s;

# Upstream
upstream veridoc_api {
    server api:8000;
    keepalive 32;
}

# ---- Option A: Subdomain routing (recommended) ----

# API server: api.veridoc.dev
server {
    listen 80;
    server_name api.veridoc.dev;

    # Redirect to HTTPS (comment out if using Cloudflare proxy)
    # return 301 https://$host$request_uri;

    # CORS headers
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Max-Age 86400 always;

    # Preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Health check (no rate limit)
    location /health {
        proxy_pass http://veridoc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints (strict rate limit: 5 req/s)
    location /auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://veridoc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook endpoints (moderate rate limit)
    location /billing/webhooks/ {
        limit_req zone=webhook_limit burst=20 nodelay;
        proxy_pass http://veridoc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Do not buffer webhook bodies
        proxy_request_buffering off;
    }

    # All other API endpoints
    location / {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://veridoc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;  # pipeline runs can take time
        proxy_send_timeout 60s;

        # Request size limit (for webhook payloads, report uploads)
        client_max_body_size 16m;
    }
}

# Frontend SPA: app.veridoc.dev
server {
    listen 80;
    server_name app.veridoc.dev;

    root /var/www/app;
    index index.html;

    # SPA: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}

# ---- Option B: Path-based routing (single domain) ----
# Uncomment this block and comment out Option A if using single domain

