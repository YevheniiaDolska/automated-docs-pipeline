client:
  id: "example-maximal"
  company_name: "Example Maximal Co"
  contact_email: "docs@example.com"

bundle:
  output_dir: "generated/client_bundles"
  base_policy_pack: "multi-product"
  style_guide: "hybrid"
  policy_overrides:
    kpi_sla:
      min_doc_coverage: 90
      max_stale_pct: 10
      max_high_priority_gaps: 5
      max_quality_score_drop: 2
  include_scripts:
    - "scripts/run_weekly_gap_batch.py"
    - "scripts/gap_detector.py"
    - "scripts/check_docs_contract.py"
    - "scripts/check_api_sdk_drift.py"
    - "scripts/generate_kpi_wall.py"
    - "scripts/evaluate_kpi_sla.py"
    - "scripts/consolidate_reports.py"
    - "scripts/normalize_docs.py"
    - "scripts/lint_code_snippets.py"
    - "scripts/check_code_examples_smoke.py"
    - "scripts/seo_geo_optimizer.py"
    - "scripts/doc_layers_validator.py"
    - "scripts/extract_knowledge_modules_from_docs.py"
    - "scripts/validate_knowledge_modules.py"
    - "scripts/generate_knowledge_retrieval_index.py"
    - "scripts/build_all_intent_experiences.py"
    - "scripts/i18n_sync.py"
    - "scripts/i18n_translate.py"
    - "scripts/i18n_migrate.py"
    - "scripts/i18n_utils.py"
    - "scripts/generate_release_docs_pack.py"
    - "scripts/run_api_first_flow.py"
    - "scripts/generate_openapi_from_planning_notes.py"
    - "scripts/validate_openapi_contract.py"
    - "scripts/generate_fastapi_stubs_from_openapi.py"
  include_docs:
    - "README_SETUP.md"
    - "SETUP_FOR_PROJECTS.md"
    - "POLICY_PACKS.md"
    - "docs/operations/CANONICAL_FLOW.md"
    - "docs/operations/CENTRALIZED_CLIENT_BUNDLES.md"
    - "docs/operations/UNIFIED_CLIENT_CONFIG.md"
    - "docs/operations/PLAN_TIERS.md"
    - "docs/operations/PIPELINE_CAPABILITIES_CATALOG.md"
  include_paths:
    - "knowledge_modules"
    - "templates/interactive-diagram.html"
    - "templates/legal"
  llm:
    codex_instructions_source: "AGENTS.md"
    claude_instructions_source: "CLAUDE.md"
    inject_managed_block: true
    docsops_root_in_client_repo: "docsops"
  automation:
    weekly_gap_report:
      enabled: true
      since_days: 7
      day_of_week: "monday"
      time_24h: "09:00"

runtime:
  docs_flow:
    mode: "hybrid" # code-first | api-first | hybrid
  docs_root: "docs"
  api_root: "api"
  sdk_root: "sdk"
  preferred_llm: "claude"
  output_targets:
    - "sphinx"
    - "readme"
    - "github"
  api_first:
    enabled: true
    project_slug: "project"
    notes_path: "notes/api-planning.md"
    spec_path: "api/openapi.yaml"
    spec_tree_path: "api/project"
    docs_provider: "mkdocs"
    docs_spec_target: "docs/assets/api"
    stubs_output: "generated/api-stubs/fastapi/app/main.py"
    generate_from_notes: true
    verify_user_path: true
    mock_base_url: "http://localhost:4010/v1"
    run_docs_lint: true
    auto_remediate: true
    max_attempts: 5
  modules:
    gap_detection: true
    drift_detection: true
    docs_contract: true
    kpi_sla: true
    rag_optimization: true
    normalization: true
    snippet_lint: true
    diagram_validation: true
    self_checks: true
    fact_checks: true
    knowledge_validation: true
    i18n_sync: true
    release_pack: true
  custom_tasks:
    weekly:
      - id: "seo-geo"
        enabled: true
        command: "python3 docsops/scripts/seo_geo_optimizer.py docs/"
        continue_on_error: true
      - id: "knowledge-validate"
        enabled: true
        command: "python3 docsops/scripts/validate_knowledge_modules.py"
        continue_on_error: true
      - id: "knowledge-index"
        enabled: true
        command: "python3 docsops/scripts/generate_knowledge_retrieval_index.py"
        continue_on_error: true
      - id: "intent-all"
        enabled: true
        command: "python3 docsops/scripts/build_all_intent_experiences.py"
        continue_on_error: true
      - id: "algolia-upload"
        enabled: false
        command: "python3 docsops/scripts/upload_to_algolia.py"
        continue_on_error: true
      - id: "i18n-translate-stale"
        enabled: false
        command: "python3 docsops/scripts/i18n_translate.py --stale-only"
        continue_on_error: true
      - id: "facets-index"
        enabled: true
        command: "python3 docsops/scripts/generate_facets_index.py --docs-dir docs --output docs/assets/facets-index.json"
        continue_on_error: true
    on_demand:
      - id: "api-first-now"
        enabled: true
        command: "python3 docsops/scripts/run_api_first_flow.py --project-slug project --notes notes/api-planning.md --spec api/openapi.yaml --spec-tree api/project --docs-provider mkdocs --docs-spec-target docs/assets/api --stubs-output generated/api-stubs/fastapi/app/main.py --auto-remediate --max-attempts 3"
        continue_on_error: false

private_tuning:
  gap_priority_weights:
    business_impact: 0.45
    user_frequency: 0.35
    implementation_cost: 0.20
  stale_days: 21
  weekly_stale_days: 180
  rag_chunk_target_tokens: 420
  verify_max_attempts: 3

legal:
  license_type: "commercial"
  redistribution_allowed: false
  reseller_allowed: false
