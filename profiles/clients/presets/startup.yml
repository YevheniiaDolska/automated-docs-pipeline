preset: startup
description: Balanced defaults for growing teams with docs-as-product focus.
overrides:
  bundle:
    base_policy_pack: "multi-product"
    style_guide: "hybrid"
  runtime:
    docs_flow:
      mode: "hybrid"
    output_targets:
      - "mkdocs"
      - "readme"
      - "github"
    modules:
      gap_detection: true
      drift_detection: true
      docs_contract: true
      kpi_sla: true
      rag_optimization: true
      normalization: true
      snippet_lint: true
      self_checks: true
      fact_checks: true
      lifecycle_management: true
      knowledge_validation: true
      i18n_sync: true
      release_pack: true
    integrations:
      algolia:
        enabled: true
        upload_on_weekly: false
      ask_ai:
        enabled: false
        auto_configure_on_provision: true
        install_runtime_pack: false
