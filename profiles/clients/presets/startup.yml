preset: startup
description: Balanced defaults for growing teams with docs-as-product focus.
overrides:
  bundle:
    base_policy_pack: "multi-product"
    style_guide: "hybrid"
    llm:
      codex_instructions_source: "instructions/llm_plans/pro/AGENTS.md"
      claude_instructions_source: "instructions/llm_plans/pro/CLAUDE.md"
      inject_managed_block: true
      docsops_root_in_client_repo: "docsops"
  runtime:
    docs_flow:
      mode: "hybrid"
    output_targets:
      - "mkdocs"
      - "readme"
      - "github"
    modules:
      gap_detection: true
      drift_detection: true
      docs_contract: true
      kpi_sla: true
      rag_optimization: true
      ontology_graph: true
      retrieval_evals: true
      terminology_management: true
      normalization: true
      snippet_lint: true
      self_checks: true
      fact_checks: true
      lifecycle_management: true
      knowledge_validation: true
      i18n_sync: true
      release_pack: true
    git_sync:
      enabled: true
      repo_path: "."
      remote: "origin"
      branch: ""
      fetch_first: true
      rebase: true
      autostash: true
      continue_on_error: true
    integrations:
      algolia:
        enabled: true
        upload_on_weekly: false
      ask_ai:
        enabled: false
        auto_configure_on_provision: true
        install_runtime_pack: false
