preset: small
description: Minimal onboarding for small teams and one-repo docs.
overrides:
  licensing:
    plan: "pilot"
    days: 90
  bundle:
    base_policy_pack: "minimal"
    style_guide: "google"
    llm:
      codex_instructions_source: "instructions/llm_plans/basic/AGENTS.md"
      claude_instructions_source: "instructions/llm_plans/basic/CLAUDE.md"
      inject_managed_block: true
      docsops_root_in_client_repo: "docsops"
  runtime:
    docs_flow:
      mode: "code-first"
    output_targets:
      - "mkdocs"
    modules:
      gap_detection: true
      drift_detection: true
      docs_contract: true
      kpi_sla: true
      rag_optimization: true
      ontology_graph: false
      retrieval_evals: false
      terminology_management: true
      normalization: true
      snippet_lint: true
      self_checks: true
      fact_checks: true
      lifecycle_management: true
      knowledge_validation: true
      i18n_sync: false
      release_pack: false
    git_sync:
      enabled: true
      repo_path: "."
      remote: "origin"
      branch: ""
      fetch_first: true
      rebase: true
      autostash: true
      continue_on_error: true
    integrations:
      algolia:
        enabled: false
        upload_on_weekly: false
      ask_ai:
        enabled: false
        auto_configure_on_provision: true
        install_runtime_pack: false
