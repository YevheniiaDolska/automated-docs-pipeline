client:
  id: "acme"
  company_name: "ACME Inc."
  contact_email: "docs-owner@acme.example"
  # Optional license binding fields for enterprise control.
  tenant_id: "acme"
  company_domain: "acme.example"

bundle:
  # Where bundle is created in this repository.
  output_dir: "generated/client_bundles"

  # Built-in pack from policy_packs/*.yml
  base_policy_pack: "multi-product"

  # Vale style profile for this client: google | microsoft | hybrid
  style_guide: "google"

  # Optional overrides merged into selected policy pack.
  policy_overrides:
    kpi_sla:
      min_doc_coverage: 80

  # Turn features on/off by copying only needed scripts.
  # If you use api-first/hybrid flow, also include:
  # - scripts/run_api_first_flow.py
  # - scripts/generate_openapi_from_planning_notes.py
  # - scripts/validate_openapi_contract.py
  # - scripts/generate_fastapi_stubs_from_openapi.py
  # - scripts/apply_openapi_overrides.py
  # - scripts/check_openapi_regression.py
  # - scripts/ensure_external_mock_server.py
  include_scripts:
    - "scripts/run_weekly_gap_batch.py"
    - "scripts/check_docs_contract.py"
    - "scripts/check_api_sdk_drift.py"
    - "scripts/generate_kpi_wall.py"
    - "scripts/evaluate_kpi_sla.py"
    - "scripts/consolidate_reports.py"
    - "scripts/normalize_docs.py"
    - "scripts/lint_code_snippets.py"
    - "scripts/validate_frontmatter.py"
    - "scripts/check_code_examples_smoke.py"
    - "scripts/generate_multilang_tabs.py"
    - "scripts/validate_multilang_examples.py"
    - "scripts/seo_geo_optimizer.py"
    - "scripts/upload_to_algolia.py"
    - "scripts/generate_facets_index.py"
    - "scripts/doc_layers_validator.py"
    - "scripts/validate_diagram_content.py"
    - "scripts/lifecycle_manager.py"
    - "scripts/extract_knowledge_modules_from_docs.py"
    - "scripts/validate_knowledge_modules.py"
    - "scripts/generate_knowledge_retrieval_index.py"
    - "scripts/generate_knowledge_graph_jsonld.py"
    - "scripts/run_retrieval_evals.py"
    - "scripts/sync_project_glossary.py"
    - "scripts/build_all_intent_experiences.py"
    - "scripts/apply_openapi_overrides.py"
    - "scripts/check_openapi_regression.py"
    - "scripts/ensure_external_mock_server.py"
    - "scripts/generate_api_test_assets.py"
    - "scripts/upload_api_test_assets.py"
    - "scripts/i18n_sync.py"
    - "scripts/i18n_translate.py"
    - "scripts/i18n_migrate.py"
    - "scripts/i18n_utils.py"
    - "scripts/configure_ask_ai.py"
    - "scripts/install_ask_ai_runtime.py"
    - "scripts/auto_fix_pr_docs.py"
    - "scripts/generate_algolia_widget.py"
    - "scripts/generate_tests_from_rag.py"

  include_docs:
    - "README_SETUP.md"
    - "POLICY_PACKS.md"

  # Copy any additional files or directories into bundle.
  # Useful for templates (interactive diagrams), knowledge modules, custom docs assets.
  include_paths:
    - "templates/interactive-diagram.html"
    - "knowledge_modules"

  llm:
    codex_instructions_source: "AGENTS.md"
    claude_instructions_source: "CLAUDE.md"
    local_instructions_source: "LOCAL_MODEL.md"
    inject_managed_block: true
    # Relative path where bundle is placed inside client repo.
    docsops_root_in_client_repo: "docsops"

  automation:
    weekly_gap_report:
      enabled: true
      since_days: 7
      day_of_week: "monday"
      time_24h: "10:00"
      # Auto-retry delay when a scheduled run fails.
      retry_delay_seconds: 60

runtime:
  docs_flow:
    # code-first | api-first | hybrid
    mode: "code-first"

  # Per-repo paths (this is where projects differ most).
  docs_root: "docs"
  api_root: "api"
  sdk_root: "sdk"

  # Local LLM preference for this client.
  preferred_llm: "claude"
  llm_control:
    # local_default: local model first, external only by explicit policy
    # external_preferred: can use external LLM directly if allowed by policy
    llm_mode: "local_default"
    external_llm_allowed: false
    require_explicit_approval: true
    approval_cache_scope: "run"
    redact_before_external: true
    local_model: "veridoc-writer"
    local_base_model: "qwen2.5:7b"
    local_model_command: "ollama run {model} \"{prompt}\""
    auto_install_local_model_on_setup: true
    quality_delta_note: "Fully local mode may reduce output quality by ~10-15% on hardest synthesis tasks."

  security:
    # production (default) enables hardening controls for client delivery.
    # relaxed is for internal testing/dev bundles only.
    hardening_profile: "production"
    allow_dev_bypass: false
    anti_tamper_enforced: true
    require_protected_modules: true
    require_pack_for_premium: true
    protect_mode: "compiled"   # compiled | source
    auto_compile_protected_modules: true
    required_compiled_modules: ["license_gate", "pack_runtime"]
    protected_artifacts_dir: "dist/compiled"
    core_mode: "local"         # local | server
    operation_mode: "hybrid"   # strict-local | hybrid | cloud
    phone_home_enabled_default: true
    update_check_enabled_default: true

  # Different static generators per client.
  output_targets:
    - "sphinx"
    - "readme"

  pr_autofix:
    # Optional. Keep false unless client explicitly wants bot commits in PR branches.
    enabled: false
    require_label: false
    label_name: "auto-doc-fix"
    enable_auto_merge: false
    commit_message: "docs: auto-sync PR docs"
    workflow_filename: "docsops-pr-autofix.yml"

  api_first:
    enabled: false
    project_slug: "acme"
    # Used when generate_from_notes is true.
    notes_path: "notes/api-planning.md"
    spec_path: "api/openapi.yaml"
    spec_tree_path: "api/acme"
    docs_provider: "mkdocs"
    docs_spec_target: "docs/assets/api"
    stubs_output: "generated/api-stubs/fastapi/app/main.py"
    openapi_version: "3.0.3"
    manual_overrides_path: ""
    regression_snapshot_path: ""
    update_regression_snapshot: false
    generate_from_notes: true
    verify_user_path: false
    # docker | prism | external (public HTTPS mock endpoint).
    sandbox_backend: "external"
    # informational only: postman | stoplight | mockoon | prism-hosted | custom
    mock_service: "custom"
    mock_base_url: "https://sandbox-api.example.com/v1"
    sync_playground_endpoint: true
    external_mock:
      enabled: true
      provider: "postman"
      base_path: "/v1"
      postman:
        api_key_env: "POSTMAN_API_KEY"
        workspace_id_env: "POSTMAN_WORKSPACE_ID"
        collection_uid_env: "POSTMAN_COLLECTION_UID"
        mock_server_id_env: "POSTMAN_MOCK_SERVER_ID"
        mock_server_name: ""
        private: false
    run_docs_lint: false
    generate_test_assets: true
    test_assets_output_dir: "reports/api-test-assets"
    testrail_csv: "reports/api-test-assets/testrail_test_cases.csv"
    zephyr_json: "reports/api-test-assets/zephyr_test_cases.json"
    upload_test_assets: false
    upload_test_assets_strict: false
    test_assets_upload_report: "reports/api-test-assets/upload_report.json"
    test_management:
      testrail:
        enabled_env: "TESTRAIL_UPLOAD_ENABLED"
        base_url_env: "TESTRAIL_BASE_URL"
        email_env: "TESTRAIL_EMAIL"
        api_key_env: "TESTRAIL_API_KEY"
        section_id_env: "TESTRAIL_SECTION_ID"
        suite_id_env: "TESTRAIL_SUITE_ID"
      zephyr_scale:
        enabled_env: "ZEPHYR_UPLOAD_ENABLED"
        base_url_env: "ZEPHYR_SCALE_BASE_URL"
        api_token_env: "ZEPHYR_SCALE_API_TOKEN"
        project_key_env: "ZEPHYR_SCALE_PROJECT_KEY"
        folder_id_env: "ZEPHYR_SCALE_FOLDER_ID"
    auto_remediate: true
    max_attempts: 3

  # Logical module switches (LLM reads this config).
  modules:
    gap_detection: true
    drift_detection: true
    docs_contract: true
    kpi_sla: true
    rag_optimization: true
    ontology_graph: true
    retrieval_evals: true
    terminology_management: true
    multilang_examples: true
    normalization: true
    snippet_lint: true
    diagram_validation: true
    self_checks: true
    fact_checks: true
    lifecycle_management: true
    knowledge_validation: true
    i18n_sync: true
    release_pack: true
  terminology:
    enabled: true
    glossary_path: "glossary.yml"
    auto_add_from_markers: true
  retrieval_eval:
    enabled: true
    index_path: "docs/assets/knowledge-retrieval-index.json"
    dataset_path: ""
    top_k: 3
    min_precision: 0.5
    min_recall: 0.5
    max_hallucination_rate: 0.5
    auto_samples: 25
  knowledge_graph:
    enabled: true
    modules_dir: "knowledge_modules"
    output_path: "docs/assets/knowledge-graph.jsonld"
  git_sync:
    enabled: true
    repo_path: "."
    remote: "origin"
    branch: ""
    fetch_first: true
    rebase: true
    autostash: true
    continue_on_error: true
  finalize_gate:
    enabled: true
    docs_root: "docs"
    reports_dir: "reports"
    lint_command: "npm run lint"
    max_iterations: 5
    continue_on_error: true
    auto_fix_commands:
      - "python3 scripts/normalize_docs.py {docs_root}"
      - "python3 scripts/seo_geo_optimizer.py {docs_root} --fix"
    llm_fix_command: ""
    ask_commit_confirmation: false
    run_precommit_before_commit: true
    precommit_max_iterations: 3
    commit_on_approve: false
    push_on_commit: false
  multilang_examples:
    enabled: true
    scope: "all"
    required_languages: ["curl", "javascript", "python"]

  # Powered by VeriDoc policy automation.
  # Free + cheapest_paid_plan -> badge mandatory.
  # Higher plans -> optional opt-out.
  veridoc_branding:
    enabled: false
    landing_url: "https://veri-doc.app/"
    plan: "free"
    cheapest_paid_plan: "starter"
    badge_opt_out: false
    lock_badge_policy: true
    docs_root: "docs"
    report_path: "reports/veridoc_branding_policy_report.json"
    apply_on_weekly: true

  # Cross-generator integrations (single control point).
  integrations:
    algolia:
      enabled: false
      docs_dir: "docs"
      report_output: "reports/seo-report.json"
      upload_on_weekly: false
      app_id_env: "ALGOLIA_APP_ID"
      api_key_env: "ALGOLIA_API_KEY"
      index_name_env: "ALGOLIA_INDEX_NAME"
      index_name_default: "docs"
      # Site generator for search widget: mkdocs | docusaurus | hugo | vitepress | custom
      site_generator: "mkdocs"
      generate_search_widget: true
    ask_ai:
      enabled: false
      auto_configure_on_provision: true
      install_runtime_pack: false
      provider: "openai"
      billing_mode: "disabled"
      model: "gpt-4.1-mini"
      base_url: "https://api.openai.com/v1"

  # Universal extension point: any pipeline capability can be wired here.
  # Commands run from client repo root.
  custom_tasks:
    weekly:
      - id: "geo-lint"
        enabled: true
        command: "python3 docsops/scripts/seo_geo_optimizer.py docs/"
        continue_on_error: true
      - id: "knowledge-index"
        enabled: true
        command: "python3 docsops/scripts/generate_knowledge_retrieval_index.py"
        continue_on_error: true
      - id: "intent-experiences"
        enabled: true
        command: "python3 docsops/scripts/build_all_intent_experiences.py"
        continue_on_error: true
    on_demand: []

# Your internal tuning decisions.
# They are flattened into runtime config for local execution.
private_tuning:
  gap_priority_weights:
    business_impact: 0.45
    user_frequency: 0.35
    implementation_cost: 0.20
  stale_days: 21
  weekly_stale_days: 180
  rag_chunk_target_tokens: 420
  verify_max_attempts: 3

# License tier for this client.
# Signed JWT is required for client delivery.
# Bundle build auto-generates it if Ed25519 private key exists locally.
# Otherwise set manual_jwt_path to pre-generated token.
# Commercial package:
# - pilot -> license plan pilot (no RAG add-on)
# - full -> license plan professional
# - full+rag -> license plan enterprise
licensing:
  commercial_package: "full"
  plan: "professional"
  days: 30
  max_docs: 0
  require_signed_jwt: true
  manual_jwt_path: ""
  # Optional per-client keys (recommended for enterprise deliveries).
  # If empty, defaults to docsops/keys/veriops-licensing.{key,pub}
  private_key_path: ""
  public_key_path: ""
  expose_license_key_env: false
  expose_dev_plan_override_env: false

legal:
  license_type: "commercial"
  redistribution_allowed: false
  reseller_allowed: false
