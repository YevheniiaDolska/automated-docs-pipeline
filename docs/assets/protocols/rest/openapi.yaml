                          format: date-time
                          description: Timestamp when the task was last updated
                          example: "2025-09-14T16:45:00Z"
                  next_cursor:
                    type: string
                    nullable: true
                    description: Cursor for the next page, null if no more results
                    example: eyJpZCI6InRza18wMjAifQ
              example:
                data:
                  - id: tsk_001
                    project_id: prj_001
                    title: "Fix login page layout on mobile"
                    status: in_progress
                    assignee_id: usr_def456
                    created_at: "2025-09-10T08:00:00Z"
                    updated_at: "2025-09-14T16:45:00Z"
                next_cursor: eyJpZCI6InRza18wMjAifQ
        "401":
          description: Authentication credentials are missing or invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine-readable error code
                    example: unauthorized
                  message:
                    type: string
                    description: Human-readable error message
                    example: "Bearer token is missing or expired"
              example:
                error: unauthorized
                message: "Bearer token is missing or expired"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine-readable error code
                    example: not_found
                  message:
                    type: string
                    description: Human-readable error message
                    example: "User usr_def456 does not exist"
              example:
                error: not_found
                message: "User usr_def456 does not exist"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Machine-readable error code
                    example: internal_error
                  message:
                    type: string
                    description: Human-readable error message
                    example: "An unexpected error occurred. Please try again later."
              example:
                error: internal_error
                message: "An unexpected error occurred. Please try again later."

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    BaseResource:
      type: object
      properties:
        id:
          type: string
          description: Unique resource identifier
          example: res_abc123
        created_at:
          type: string
          format: date-time
          description: Timestamp when the resource was created
          example: "2026-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the resource was last updated
          example: "2026-03-19T14:22:00Z"
    Project:
      allOf:
        - $ref: "#/components/schemas/BaseResource"
        - type: object
          properties:
            name:
              type: string
              description: Project name
              example: Website Redesign
            description:
              type: string
              description: Project description
              example: Redesign the marketing website
            status:
              type: string
              enum: [active, archived, draft]
              description: Current project status
              example: active
    Task:
      allOf:
        - $ref: "#/components/schemas/BaseResource"
        - type: object
          properties:
            title:
              type: string
              description: Task title
              example: Update landing page
            project_id:
              type: string
              description: Parent project identifier
              example: prj_abc123
            status:
              type: string
              enum: [open, in_progress, completed]
              description: Current task status
              example: open
            assignee_id:
              type: string
              description: Assigned user identifier
              example: usr_abc123
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: string
          description: Machine-readable error code
          example: validation_error
        message:
          type: string
          description: Human-readable error message
          example: "Invalid request parameters"
    CursorPage:
      $ref: ./common.yaml#/CursorPage
    ResourceRef:
      oneOf:
        - $ref: "#/components/schemas/Project"
        - $ref: "#/components/schemas/Task"
      description: Reference to any top-level resource
  responses:
    Error400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Error404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Error500:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
