              type: array
              items:
                type: object
              example: []
        request_id:
          type: string
          example: req_demo_user_path
    AnyResource:
      oneOf:
      - $ref: '#/components/schemas/Project'
      - $ref: '#/components/schemas/Task'
      - $ref: '#/components/schemas/User'
