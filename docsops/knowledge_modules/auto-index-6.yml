content:
  docs_markdown: "## RAG retrieval pipeline\n\nThe pipeline generates a knowledge\
    \ retrieval index that powers AI-driven search and support agents. Six advanced\
    \ retrieval features are enabled by default.\n\n| Metric | Value |\n| --- | ---\
    \ |\n| Knowledge graph nodes | **1,272** |\n| Knowledge graph edges | **1,089**\
    \ |\n| Knowledge modules | **167** auto-extracted |\n| Retrieval precision | **0.2**\
    \ (token-overlap baseline) |\n| Retrieval recall | **0.6** (token-overlap baseline)\
    \ |\n| Hallucination rate | **0.0** (all retrieved documents exist in corpus)\
    \ |\n\n!!! info \"Baseline retrieval metrics\"\n    Precision (0.2) and recall\
    \ (0.6) reflect the token-overlap baseline scorer, which runs without external\
    \ dependencies. Production deployments enable hybrid search with FAISS embeddings,\
    \ HyDE query expansion, and cross-encoder reranking for significantly higher precision\
    \ and recall. Run `--mode all` to compare all four search strategies.\n\n| Advanced\
    \ feature | Status |\n| --- | --- |\n| Token-aware chunking (750 tokens, 100 overlap)\
    \ | Enabled |\n| Hybrid search (RRF, k=60) | Enabled |\n| HyDE query expansion\
    \ (`gpt-4.1-mini`) | Enabled |\n| Cross-encoder reranking (`ms-marco-MiniLM-L-6-v2`)\
    \ | Enabled |\n| Embedding cache (TTL: 3,600 seconds, max: 512) | Enabled |\n\
    | Multi-mode eval (token/semantic/hybrid/hybrid+rerank) | Available |"
