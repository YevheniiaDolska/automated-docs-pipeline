content:
  docs_markdown: '## Protocol contract gate results


    Each protocol passes through eight pipeline stages: ingest, lint, regression,
    docs generation, frontmatter gate, snippet lint, test assets, and publish. Results
    come from `reports/acme-demo/multi_protocol_contract_report.json`.


    | Protocol | Contract source | Status | Stages passed | Notes |

    | --- | --- | --- | --- | --- |

    | REST | `api/openapi.yaml` (OpenAPI 3.0) | **PASS** | 8/8 | 14 endpoints validated
    |

    | GraphQL | `contracts/graphql.schema.graphql` | **PASS** | 8/8 | 3 operation
    types validated |

    | gRPC | `contracts/grpc/acme.proto` (Proto3) | **PASS** | 8/8 | 3 RPC methods
    validated |

    | AsyncAPI | `contracts/asyncapi.yaml` (v2.6.0) | **PASS** | 8/8 | 3 channels
    validated |

    | WebSocket | `contracts/websocket.yaml` | **PASS** | 8/8 | 3 channels validated
    |


    ## Quality checks enforced


    The pipeline runs 24 automated checks on every documentation page. These are the
    same checks described in `scripts/seo_geo_optimizer.py`.'
