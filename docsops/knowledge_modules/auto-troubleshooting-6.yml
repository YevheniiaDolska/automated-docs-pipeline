content:
  docs_markdown: "## Pipeline reports directory is empty\n\n**You see:** The `reports/acme-demo/`\
    \ directory contains no JSON files after running the autopipeline.\n\n**Root cause:**\
    \ The runtime config path is incorrect, or the `--reports-dir` argument points\
    \ to a different location.\n\n### Fix empty reports in 2 minutes\n\n1. Verify\
    \ the runtime config exists:\n\n    ```bash\n    ls -la reports/acme-demo/client_runtime.yml\n\
    \    ```\n\n1. Run the pipeline with explicit paths:\n\n    ```bash\n    python3\
    \ scripts/run_autopipeline.py \\\n      --docsops-root . \\\n      --reports-dir\
    \ reports/acme-demo \\\n      --runtime-config reports/acme-demo/client_runtime.yml\
    \ \\\n      --mode veridoc\n    ```\n\n1. Verify reports are generated:\n\n  \
    \  ```bash\n    ls reports/acme-demo/*.json | head -10\n    ```\n\n    Expected\
    \ output: at least 5 JSON report files.\n\n## Retrieval precision below threshold\n\
    \n**You see:** The `retrieval_evals_report.json` shows precision below 0.7 or\
    \ recall below 0.8.\n\n**Root cause:** The token-overlap baseline scorer runs\
    \ without external dependencies and produces conservative scores. Enable advanced\
    \ retrieval features (hybrid search, HyDE, cross-encoder reranking) for production-grade\
    \ precision and recall."
