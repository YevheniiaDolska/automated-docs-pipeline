  docs_markdown: "## Interactive event tester\n\nEnter a test event payload and send\
    \ it to the sandbox WebSocket bridge.\n\n!!! info \"Sandbox mode\"\n    Events\
    \ route to a public WebSocket echo sandbox.\n    The endpoint field below auto-fills\
    \ with the sandbox URL.\n    No API key is required for sandbox requests."
