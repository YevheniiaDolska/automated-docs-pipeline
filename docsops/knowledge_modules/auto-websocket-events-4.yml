content:
  docs_markdown: "### Step 3: handle incoming events\n\n```javascript\nws.addEventListener('message',\
    \ (event) => {\n  const msg = JSON.parse(event.data);\n\n  switch (msg.type) {\n\
    \    case 'ack':\n      console.log('Subscription confirmed:', msg.request_id);\n\
    \      break;\n    case 'event':\n      console.log('Event received:', msg.payload.event_type);\n\
    \      console.log('Project:', msg.payload.data.project_id);\n      console.log('Status:',\
    \ msg.payload.data.status);\n      break;\n    case 'ping':\n      ws.send(JSON.stringify({\
    \ type: 'pong', request_id: msg.request_id }));\n      break;\n  }\n});\n```\n\
    \n<!-- requires: api-key -->"
