content:
  docs_markdown: '### GEO checks (8 checks -- LLM and AI search optimization)


    | Check ID | Rule | Severity | Threshold | Purpose |

    | --- | --- | --- | --- | --- |

    | GEO-1 | Meta description present | Error | Must exist | Ensures every page has
    a description for search snippets |

    | GEO-1b | Meta description minimum length | Warning | 50 characters | Prevents
    truncated search snippets |

    | GEO-1c | Meta description maximum length | Warning | 160 characters | Prevents
    overflow in search results |

    | GEO-2 | First paragraph length | Warning | 60 words max | Ensures concise opening
    for LLM extraction |

    | GEO-3 | First paragraph definition | Suggestion | Contains definition verb |
    Helps LLMs identify what the page is about |

    | GEO-4 | Heading specificity | Warning | No generic headings | Prevents vague
    headings like "Overview" or "Setup" |

    | GEO-5 | Heading hierarchy | Error | No skipped levels | Ensures proper H2-H3-H4
    nesting |

    | GEO-6 | Fact density | Warning | 1 fact per 200 words | Keeps content information-rich
    |'
