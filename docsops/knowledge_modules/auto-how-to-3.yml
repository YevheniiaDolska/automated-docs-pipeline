content:
  docs_markdown: "## Step 1: trigger the autopipeline\n\nRun the unified pipeline\
    \ from the repository root. This command executes gap detection, drift analysis,\
    \ contract validation for all five protocols, KPI evaluation, and RAG metadata\
    \ generation.\n\n```bash\npython3 scripts/run_autopipeline.py \\\n  --docsops-root\
    \ . \\\n  --reports-dir reports/acme-demo \\\n  --runtime-config reports/acme-demo/client_runtime.yml\
    \ \\\n  --mode veridoc \\\n  --since 7\n```\n\n<!-- requires: python3, pipeline-scripts\
    \ -->\n\n**What each flag does:**\n\n| Flag | Value | Purpose |\n| --- | --- |\
    \ --- |\n| `--docsops-root` | `.` | Root directory of the docs-ops repository\
    \ |\n| `--reports-dir` | `reports/acme-demo` | Where pipeline writes output artifacts\
    \ |\n| `--runtime-config` | `reports/acme-demo/client_runtime.yml` | Client-specific\
    \ protocol and module settings |\n| `--mode` | `veridoc` | Full pipeline mode\
    \ with all quality gates |\n| `--since` | `7` | Analyze changes from the last\
    \ 7 days |\n\nThe pipeline runs seven stages. Expect 5-10 minutes depending on\
    \ contract complexity.\n\n**Expected output (summary):**"
