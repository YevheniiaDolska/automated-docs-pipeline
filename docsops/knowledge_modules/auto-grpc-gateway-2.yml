content:
  docs_markdown: '## Service catalog


    The `veriops.v1` package exposes one service with three RPC methods:


    | Service | Method | Type | Request | Response | Description |

    | --- | --- | --- | --- | --- | --- |

    | `ProjectService` | `GetProject` | Unary | `GetProjectRequest` | `GetProjectResponse`
    | Retrieve a project by ID |

    | `ProjectService` | `ListProjects` | Server streaming | `ListProjectsRequest`
    | `stream Project` | Stream project list with pagination |

    | `ProjectService` | `CreateProject` | Unary | `CreateProjectRequest` | `Project`
    | Create a new project resource |'
