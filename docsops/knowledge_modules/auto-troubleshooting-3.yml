content:
  docs_markdown: "### Fix gRPC contract in 2 minutes\n\n1. Install the protobuf compiler:\n\
    \n    ```bash\n    apt-get install -y protobuf-compiler\n    protoc --version\n\
    \    ```\n\n    Expected output: `libprotoc 3.21.x` or later.\n\n1. Verify proto\
    \ file paths match `client_runtime.yml`:\n\n    ```yaml\n    grpc:\n      proto_paths:\n\
    \        - reports/acme-demo/contracts/grpc\n    ```\n\n1. Re-run the pipeline:\n\
    \n    ```bash\n    python3 scripts/run_autopipeline.py \\\n      --docsops-root\
    \ . \\\n      --reports-dir reports/acme-demo \\\n      --runtime-config reports/acme-demo/client_runtime.yml\
    \ \\\n      --mode veridoc\n    ```\n\n1. Verify gRPC passes:\n\n    ```bash\n\
    \    python3 -c \"\n    import json\n    r = json.load(open('reports/acme-demo/multi_protocol_contract_report.json'))\n\
    \    print('Failed:', r.get('failed_protocols', []))\"\n    ```\n\n    Expected\
    \ output: `Failed: []`\n\n## Quality score drops below 80\n\n**You see:** The\
    \ `kpi-wall.json` shows `quality_score` below 80.\n\n**Root cause:** Stale documents,\
    \ missing frontmatter, or unresolved documentation gaps lower the quality score\
    \ below the 80 threshold."
