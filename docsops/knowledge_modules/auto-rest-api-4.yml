content:
  docs_markdown: "### Create a project\n\n```\nPOST /v1/projects\n```\n\nCreates a\
    \ new project resource. Returns the created project with a generated `id`.\n\n\
    **Request body:**\n\n| Field | Type | Required | Description |\n| --- | --- |\
    \ --- | --- |\n| `name` | string | Yes | Project name (3-100 characters) |\n|\
    \ `description` | string | No | Project description (max 500 characters) |\n|\
    \ `status` | string | No | Initial status: `draft` (default), `active` |\n\n**Example\
    \ request:**\n\n```bash\ncurl -X POST https://api.veriops.example/v1/projects\
    \ \\\n  -H \"Authorization: Bearer YOUR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\n    \"name\": \"Mobile App Launch\",\n    \"description\": \"iOS\
    \ and Android app for Q3 release\",\n    \"status\": \"active\"\n  }'\n```\n\n\
    <!-- requires: api-key -->\n\n**Example response (HTTP 201):**\n\n```json\n{\n\
    \  \"id\": \"prj_def456\",\n  \"name\": \"Mobile App Launch\",\n  \"description\"\
    : \"iOS and Android app for Q3 release\",\n  \"status\": \"active\",\n  \"created_at\"\
    : \"2026-03-19T10:00:00Z\",\n  \"updated_at\": \"2026-03-19T10:00:00Z\",\n  \"\
    task_count\": 0,\n  \"owner_id\": \"usr_789\"\n}\n```"
