content:
  docs_markdown: "<script>\n(() => {\n  if (window.__ACME_SANDBOX_CONTROLLER__ ===\
    \ true) return;\n  var sandbox = (window.ACME_SANDBOX && window.ACME_SANDBOX.asyncapi_ws_url)\
    \ || '';\n  var fallback = (window.ACME_SANDBOX && window.ACME_SANDBOX.asyncapi_ws_fallback_urls)\
    \ || [];\n  var epInput = document.getElementById('async-ep');\n  if (sandbox\
    \ && epInput) { epInput.value = sandbox; }\n  var btn = document.getElementById('async-send');\n\
    \  if (!btn) return;\n  function safeParse(raw) {\n    try { return JSON.parse(String(raw\
    \ || '{}')); } catch (_) { return { raw: String(raw || '') }; }\n  }\n  function\
    \ semanticAsync(req) {\n    var eventType = String((req && (req.event_type ||\
    \ req.type || req.event)) || '').toLowerCase();\n    var data = (req && req.data\
    \ && typeof req.data === 'object') ? req.data : {};\n    var eventId = String((req\
    \ && req.event_id) || ('evt_' + Math.random().toString(36).slice(2, 10)));\n \
    \   var projectId = String(data.project_id || 'prj_abc123');\n    var occurredAt\
    \ = (req && req.occurred_at) || new Date().toISOString();\n    if (eventType ===\
    \ 'project.created') return { event_id: eventId, event_type: 'project.created',\
    \ occurred_at: occurredAt, data: { project_id: projectId, name: data.name || 'New\
    \ Project', status: data.status || 'draft' } };\n    if (eventType === 'project.updated')\
    \ return { event_id: eventId, event_type: 'project.updated', occurred_at: occurredAt,\
    \ data: { project_id: projectId, status: data.status || 'active', changed_fields:\
    \ data.changed_fields || ['status'] } };\n    if (eventType === 'task.completed')\
    \ return { event_id: eventId, event_type: 'task.completed', occurred_at: occurredAt,\
    \ data: { task_id: data.task_id || 'tsk_123', project_id: projectId, completed_by:\
    \ data.completed_by || 'usr_demo' } };\n    return { event_id: eventId, event_type:\
    \ eventType || 'custom.event', occurred_at: occurredAt, data: Object.assign({\
    \ project_id: projectId, status: 'accepted' }, data), hint: 'Use: project.created,\
    \ project.updated, task.completed' };\n  }"
