    \ Summary: Interactive WebSocket playground for VeriOps real-time API with bidirectional\
    \ messaging, channel subscriptions, and connection lifecycle management.\n\n##\
    \ Channel catalog\n\n| Channel | Direction | Filters | Description |\n| --- |\
    \ --- | --- | --- |\n| `project.updated` | Server to client | `project_id` (optional)\
    \ | Project status change events |\n| `project.created` | Server to client | --\
    \ | New project creation events |\n| `task.completed` | Server to client | `project_id`\
    \ (optional) | Task completion notifications |\n| `presence` | Bidirectional |\
    \ -- | User online/offline status |\n\n## Quick start: connect and subscribe\n\
    \n### Step 1: establish connection\n\n```javascript\n// Connect to the VeriOps\
    \ WebSocket API\n// Pass your API key as a query parameter for authentication\n\
    const ws = new WebSocket('wss://api.veriops.example/realtime?token=YOUR_API_KEY');\n\
    \nws.addEventListener('open', () => {\n  console.log('Connected to VeriOps WebSocket\
    \ API');\n});\n\nws.addEventListener('close', (event) => {\n  console.log('Disconnected:',\
    \ event.code, event.reason);\n});\n```\n\n<!-- requires: api-key -->\n\n### Step\
    \ 2: subscribe to a channel\n\n```javascript\n// Subscribe to project update events\
    \ for a specific project\nws.send(JSON.stringify({\n  type: 'subscribe',\n  request_id:\
    \ 'req_001',\n  sent_at: new Date().toISOString(),\n  payload: {\n    channel:\
    \ 'project.updated',\n    filters: { project_id: 'prj_abc123' }\n  }\n}));\n```\n\
    \n<!-- requires: api-key -->"
