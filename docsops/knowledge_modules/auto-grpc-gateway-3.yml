content:
  docs_markdown: "## Proto definition\n\n```protobuf\nsyntax = \"proto3\";\n\npackage\
    \ veriops.v1;\n\nservice ProjectService {\n  // Retrieve a single project by its\
    \ unique identifier.\n  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);\n\
    \n  // Stream a paginated list of all projects.\n  rpc ListProjects(ListProjectsRequest)\
    \ returns (stream Project);\n\n  // Create a new project resource with the given\
    \ name and status.\n  rpc CreateProject(CreateProjectRequest) returns (Project);\n\
    }\n\nmessage GetProjectRequest {\n  string project_id = 1;  // Required. Format:\
    \ prj_*\n}\n\nmessage GetProjectResponse {\n  string id = 1;\n  string name =\
    \ 2;\n  string status = 3;      // draft, active, archived\n}\n\nmessage ListProjectsRequest\
    \ {\n  int32 page_size = 1;    // Max 100, default 25\n  string page_token = 2;\
    \  // Token from previous response\n}\n\nmessage CreateProjectRequest {\n  string\
    \ name = 1;        // Required. 3-100 characters.\n  string status = 2;      //\
    \ Optional. Default: draft\n}\n\nmessage Project {\n  string id = 1;\n  string\
    \ name = 2;\n  string status = 3;\n}\n```"
