content:
  docs_markdown: "### Create a task\n\n```\nPOST /v1/tasks\n```\n\n**Request body:**\n\
    \n| Field | Type | Required | Description |\n| --- | --- | --- | --- |\n| `title`\
    \ | string | Yes | Task title (3-200 characters) |\n| `project_id` | string |\
    \ Yes | Parent project ID |\n| `assignee_id` | string | No | User to assign |\n\
    | `status` | string | No | Initial status: `todo` (default) |\n| `priority` |\
    \ string | No | Priority: `low`, `medium`, `high` |\n\n**Example request:**\n\n\
    ```bash\ncurl -X POST https://api.veriops.example/v1/tasks \\\n  -H \"Authorization:\
    \ Bearer YOUR_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n\
    \    \"title\": \"Design homepage mockup\",\n    \"project_id\": \"prj_abc123\"\
    ,\n    \"assignee_id\": \"usr_456\",\n    \"priority\": \"high\"\n  }'\n```\n\n\
    <!-- requires: api-key -->\n\n## Endpoints: users, tags, and comments\n\n### Users\n\
    \n| Method | Path | Description |\n| --- | --- | --- |\n| `GET` | `/v1/users`\
    \ | List all users (paginated) |\n| `GET` | `/v1/users/{id}` | Get user by ID\
    \ |\n| `POST` | `/v1/users` | Create a new user |\n\n### Tags\n\n| Method | Path\
    \ | Description |\n| --- | --- | --- |\n| `GET` | `/v1/tags` | List all tags |\n\
    | `POST` | `/v1/tags` | Create a tag |\n| `DELETE` | `/v1/tags/{id}` | Delete\
    \ a tag |"
