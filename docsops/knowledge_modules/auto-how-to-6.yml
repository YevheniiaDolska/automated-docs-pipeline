content:
  docs_markdown: "## Step 4: verify quality gates\n\nCheck that quality metrics meet\
    \ your thresholds:\n\n| Gate | Command | Expected result |\n| --- | --- | ---\
    \ |\n| Quality score | `python3 -c \"import json; print(json.load(open('reports/acme-demo/kpi-wall.json'))['quality_score'])\"\
    ` | 80 or higher |\n| Contract validation | Check `multi_protocol_contract_report.json`\
    \ | Zero failed protocols |\n| Stage summary | Check `pipeline_stage_summary.json`\
    \ | All required stages exist |\n| Frontmatter | All docs have valid frontmatter\
    \ | 100% metadata completeness |\n\nIf the quality score is below 80:\n\n1. Check\
    \ the gap report for high-priority items:\n\n    ```bash\n    python3 -c \"\n\
    \    import json\n    r = json.load(open('reports/acme-demo/doc_gaps_report.json'))\n\
    \    high = [g for g in r.get('gaps', []) if g.get('priority') == 'high']\n  \
    \  print(f'{len(high)} high-priority gaps')\n    for g in high[:5]:\n        print(f'\
    \  - {g[\\\"title\\\"]}')\"\n    ```\n\n1. Address each high-priority gap by creating\
    \ or updating the relevant document.\n\n1. Re-run the pipeline and verify the\
    \ score improves."
