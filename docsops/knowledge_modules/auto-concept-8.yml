content:
  docs_markdown: '## Key benefits


    ### Zero-drift guarantee


    Documentation updates when contracts change, not weeks later. The pipeline detects
    drift by comparing the current contract hash against the last published snapshot.
    When drift is detected, the pipeline regenerates the affected pages automatically.


    ### Protocol parity


    REST, GraphQL, gRPC, AsyncAPI, and WebSocket documentation follow the same quality
    bar. All five protocols pass through identical pipeline stages with protocol-specific
    validation at each stage.


    ### Operator review checkpoint


    The pipeline generates a review manifest before publish. It lists all artifacts,
    their availability status, and provides an approval checklist. Operators approve
    or reject the entire batch instead of reviewing individual pages.


    ### Advanced RAG pipeline


    The knowledge retrieval index with 1,272 nodes and 1,089 edges enables AI support
    agents to answer user questions from the documentation. The pipeline auto-extracts
    167 knowledge modules from docs content, builds a searchable graph, and embeds
    modules into a FAISS vector store. Six advanced features (chunking, hybrid search,
    HyDE, reranking, embedding cache, and multi-mode eval) maximize retrieval precision
    and recall.'
