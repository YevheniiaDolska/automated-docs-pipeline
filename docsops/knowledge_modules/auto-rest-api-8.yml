content:
  docs_markdown: '### Error codes


    | Status | Code | Meaning | Resolution |

    | --- | --- | --- | --- |

    | 400 | `validation_error` | Request body fails validation | Check the `details`
    array for specific field errors |

    | 401 | `unauthorized` | Missing or invalid JWT token | Regenerate your token
    in the [dashboard](https://app.veriops.example/settings/api) |

    | 403 | `forbidden` | Token valid but lacks permission | Request the required
    scope from your admin |

    | 404 | `not_found` | Resource does not exist | Verify the resource ID in the
    URL path |

    | 409 | `conflict` | Duplicate resource | A resource with that unique key already
    exists |

    | 429 | `rate_limited` | Exceeded 60 requests per minute | Wait 60 seconds or
    implement request queuing |

    | 500 | `internal_error` | Server error | Retry with exponential backoff (max
    3 attempts, initial delay 1 second) |


    ## Rate limiting


    The API enforces a limit of 60 requests per minute per API key. Rate limit headers
    appear on every response:


    | Header | Description |

    | --- | --- |

    | `X-RateLimit-Limit` | Maximum requests per window (60) |

    | `X-RateLimit-Remaining` | Requests remaining in current window |

    | `X-RateLimit-Reset` | Unix timestamp when the window resets |


    When you exceed the limit, the API returns HTTP 429 with a `Retry-After` header
    indicating seconds to wait.'
