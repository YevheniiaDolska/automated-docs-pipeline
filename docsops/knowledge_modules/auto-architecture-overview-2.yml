content:
  docs_markdown: '### Clients layer (4 components)


    | Client | Protocol | Description |

    | --- | --- | --- |

    | SDK Clients | REST, gRPC | Auto-generated libraries for Python, JavaScript,
    Go, and Java |

    | Web Dashboard | REST, WebSocket | React SPA with real-time project boards and
    notifications |

    | Mobile Apps | REST, gRPC | iOS (Swift) and Android (Kotlin) with offline-first
    architecture |

    | Webhook Consumers | HTTP POST | External integrations receiving at-least-once
    event delivery |


    ### Edge and security layer (3 components)


    | Component | Function | Key metric |

    | --- | --- | --- |

    | CDN | Content delivery, TLS termination, HTTP/2 | 99.99% uptime SLA, 12 points
    of presence |

    | WAF | SQL injection, XSS, DDoS protection | 2 million malicious request blocks
    per day |

    | Rate Limiter | Per-key request throttling via Redis | 60 requests per minute
    default, configurable per plan |'
