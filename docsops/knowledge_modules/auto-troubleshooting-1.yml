    ![Protocols](https://img.shields.io/badge/Protocols-5-7c3aed?style=flat-square)\n\
    \n</div>\n\nYour VeriOps documentation pipeline is failing with contract validation\
    \ errors, quality gate warnings, or build failures. This guide fixes 95% of pipeline\
    \ issues in under 5 minutes.\n\n## Quick diagnosis (30 seconds)\n\nCheck the pipeline\
