content:
  docs_markdown: "# REST API reference\n\n<div class=\"veriops-badges\" markdown>\n\
    \n![Powered by VeriOps](https://img.shields.io/badge/Powered%20by-VeriOps-7c3aed?style=flat-square)\n\
    ![Quality Score](https://img.shields.io/badge/Quality%20Score-100%25-10b981?style=flat-square)\n\
    ![Protocols](https://img.shields.io/badge/Protocols-5-7c3aed?style=flat-square)\n\
    \n</div>\n\nThe VeriOps REST API provides 14 CRUD endpoints across five resources\
    \ (projects, tasks, users, tags, and comments) over HTTP/1.1 with JSON payloads.\
    \ This reference documents every endpoint, authentication flow, and error code.\n\
    \n## Base URL and authentication\n\n| Setting | Value |\n| --- | --- |\n| Base\
    \ URL | [`https://api.veriops.example/v1`](https://api.veriops.example/v1) |\n\
    | Authentication | Bearer JWT token in `Authorization` header |\n| Content type\
    \ | `application/json` |\n| Rate limit | 60 requests per minute per API key |\n\
    | OpenAPI spec version | 3.0.3 |\n| API version | v1 |\n\nAll requests require\
    \ a valid JWT token:\n\n```bash\ncurl -X GET https://api.veriops.example/v1/projects\
    \ \\\n  -H \"Authorization: Bearer YOUR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \n```\n\n<!-- requires: api-key -->"
