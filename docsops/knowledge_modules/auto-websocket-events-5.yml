content:
  docs_markdown: "## Complete client example with reconnection\n\n```javascript\n\
    // Production-ready WebSocket client with automatic reconnection\n// Handles heartbeats,\
    \ subscription restoration, and exponential backoff\nclass VeriOpsWebSocket {\n\
    \  constructor(apiKey) {\n    this.apiKey = apiKey;\n    this.endpoint = 'wss://api.veriops.example/realtime';\n\
    \    this.subscriptions = new Set();\n    this.reconnectDelay = 1000;\n    this.maxReconnectDelay\
    \ = 30000;\n    this.connect();\n  }\n\nconnect() {\n    this.ws = new WebSocket(`${this.endpoint}?token=${this.apiKey}`);\n\
    \nthis.ws.onopen = () => {\n      console.log('Connected');\n      this.reconnectDelay\
    \ = 1000;\n      // Restore subscriptions after reconnect\n      for (const channel\
    \ of this.subscriptions) {\n        this.subscribe(channel);\n      }\n    };\n\
    \nthis.ws.onmessage = (event) => {\n      const msg = JSON.parse(event.data);\n\
    \      if (msg.type === 'ping') {\n        this.ws.send(JSON.stringify({ type:\
    \ 'pong', request_id: msg.request_id }));\n      } else if (msg.type === 'event')\
    \ {\n        this.handleEvent(msg.payload);\n      }\n    };\n\nthis.ws.onclose\
    \ = () => {\n      console.log(`Reconnecting in ${this.reconnectDelay}ms...`);\n\
    \      setTimeout(() => this.connect(), this.reconnectDelay);\n      this.reconnectDelay\
    \ = Math.min(this.reconnectDelay * 2, this.maxReconnectDelay);\n    };\n  }"
