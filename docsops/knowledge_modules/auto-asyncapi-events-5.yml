content:
  docs_markdown: "## Channel: task.completed\n\nFires when a task status changes to\
    \ `done`.\n\n**Payload schema:**\n\n```json\n{\n  \"event_id\": \"evt_03cde789\"\
    ,\n  \"event_type\": \"task.completed\",\n  \"occurred_at\": \"2026-03-19T16:00:00Z\"\
    ,\n  \"producer\": \"veriops-task-service\",\n  \"trace_id\": \"tr_ghi789jkl012\"\
    ,\n  \"schema_version\": \"1.0.0\",\n  \"data\": {\n    \"task_id\": \"tsk_abc123\"\
    ,\n    \"project_id\": \"prj_abc123\",\n    \"title\": \"Design homepage mockup\"\
    ,\n    \"completed_by\": \"usr_456\",\n    \"duration_seconds\": 7200\n  }\n}\n\
    ```\n\n## Delivery semantics\n\n| Property | Value | Notes |\n| --- | --- | ---\
    \ |\n| Guarantee | At-least-once | Events may be delivered more than once |\n\
    | Ordering key | `data.project_id` | Events for the same project arrive in order\
    \ |\n| Deduplication | Use `event_id` | Store processed event IDs for idempotency\
    \ checks |\n| Retry policy | 3 retries with exponential backoff | Initial delay\
    \ 5 seconds, max delay 60 seconds |\n| Dead-letter queue | `{channel}.dlq` | Failed\
    \ events route here after 3 retries |\n| Consumer acknowledgment | Manual ACK\
    \ required | Unacknowledged messages redeliver after 300 seconds |\n| Message\
    \ TTL | 7 days | Messages expire from the queue after 7 days |\n\n## Consumer\
    \ code examples"
