content:
  docs_markdown: "# How-to: keep docs aligned with every release\n\n<div class=\"\
    veriops-badges\" markdown>\n\n![Powered by VeriOps](https://img.shields.io/badge/Powered%20by-VeriOps-7c3aed?style=flat-square)\n\
    ![Quality Score](https://img.shields.io/badge/Quality%20Score-100%25-10b981?style=flat-square)\n\
    ![Protocols](https://img.shields.io/badge/Protocols-5-7c3aed?style=flat-square)\n\
    \n</div>\n\nThis guide shows you how to run the unified autopipeline on release\
    \ day to ensure API documentation matches the latest contracts, passes quality\
    \ gates, and generates a review manifest for operator approval. You complete the\
    \ full flow in approximately 20 minutes.\n\n## Prerequisites\n\nBefore starting,\
    \ ensure you have:\n\n- Python 3.9 or later installed (run `python3 --version`\
    \ to verify)\n- Node.js 18 or later for MkDocs plugins (run `node --version` to\
    \ verify)\n- `pip install mkdocs-material mkdocs-macros-plugin` for site building\n\
    - Write access to the documentation repository\n- About 20 minutes for the full\
    \ pipeline run\n\n!!! info \"Already have the pipeline running?\"\n    Skip to\
    \ [Step 3: review the manifest](#step-3-review-the-manifest) to check results\
    \ from a previous run."
