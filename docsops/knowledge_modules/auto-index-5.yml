content:
  docs_markdown: "## Automated detection and repair\n\nThe pipeline detects documentation\
    \ drift when source contracts change and regenerates affected pages automatically.\n\
    \n!!! example \"Protocol drift detected and repaired\"\n\n    **Before:** The\
    \ GraphQL schema added a new `priority` field to the `Project` type, but the GraphQL\
    \ playground docs still listed only `id`, `name`, `status`, and `createdAt`.\n\
    \n    **Detection:** The `multi_protocol_contract` stage compared `contracts/graphql.schema.graphql`\
    \ against the generated docs and flagged the missing field as a regression.\n\n\
    \    **Autofix:** The pipeline regenerated the GraphQL reference page, added the\
    \ `priority` field to the schema explorer table and query examples, and re-ran\
    \ all 24 quality checks.\n\n    **Result:** Re-validation passed. No manual editing\
    \ required."
