content:
  docs_markdown: "### JavaScript (WebSocket bridge)\n\n```javascript\n// Subscribe\
    \ to project update events via WebSocket bridge\n// Requires: valid bearer token\
    \ and active WebSocket connection\nconst ws = new WebSocket('wss://events.veriops.example/ws',\
    \ [], {\n  headers: { 'Authorization': 'Bearer YOUR_API_KEY' }\n});\n\nconst processedEvents\
    \ = new Set();\n\nws.addEventListener('open', () => {\n  ws.send(JSON.stringify({\n\
    \    action: 'subscribe',\n    channels: ['project.updated', 'project.created']\n\
    \  }));\n  console.log('Subscribed to project event channels');\n});\n\nws.addEventListener('message',\
    \ (event) => {\n  const payload = JSON.parse(event.data);\n\n  // Idempotency\
    \ check: skip duplicate events\n  if (processedEvents.has(payload.event_id)) {\n\
    \    console.log('Skipping duplicate event:', payload.event_id);\n    return;\n\
    \  }\n  processedEvents.add(payload.event_id);\n\n  console.log('Event received:',\
    \ payload.event_type, payload.data.project_id);\n  // Process the event here\n\
    });\n```\n\n<!-- requires: api-key -->"
