content:
  docs_markdown: "## Step 3: query the project via GraphQL (3 minutes)\n\nUse GraphQL\
    \ to fetch the project you created with custom field selection. GraphQL returns\
    \ only the fields you request, which reduces payload size.\n\n```bash\ncurl -s\
    \ -X POST https://api.veriops.example/graphql \\\n  -H \"Authorization: Bearer\
    \ YOUR_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n   \
    \ \"query\": \"query GetProject($id: ID!) { project(id: $id) { id name status\
    \ createdAt } }\",\n    \"variables\": {\"id\": \"prj_abc123\"}\n  }' \\\n  |\
    \ python3 -m json.tool\n```\n\n<!-- requires: api-key -->\n\n**Expected response:**\n\
    \n```json\n{\n    \"data\": {\n        \"project\": {\n            \"id\": \"\
    prj_abc123\",\n            \"name\": \"Tutorial Integration Project\",\n     \
    \       \"status\": \"active\",\n            \"createdAt\": \"2026-03-19T10:00:00Z\"\
    \n        }\n    }\n}\n```\n\nNotice that the response contains only the four\
    \ fields you requested (`id`, `name`, `status`, `createdAt`), not the full project\
    \ object. This is a key advantage of GraphQL over REST for bandwidth-sensitive\
    \ clients."
