content:
  docs_markdown: "## Quick start: query a project\n\n```graphql\nquery GetProject\
    \ {\n  project(id: \"prj_abc123\") {\n    id\n    name\n    status\n    createdAt\n\
    \    updatedAt\n  }\n}\n```\n\nSend this query with curl:\n\n```bash\ncurl -X\
    \ POST https://api.veriops.example/graphql \\\n  -H \"Authorization: Bearer YOUR_API_KEY\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"query\": \"query\
    \ GetProject { project(id: \\\"prj_abc123\\\") { id name status } }\"\n  }'\n\
    ```\n\n<!-- requires: api-key -->\n\n**Example response:**\n\n```json\n{\n  \"\
    data\": {\n    \"project\": {\n      \"id\": \"prj_abc123\",\n      \"name\":\
    \ \"Website Redesign\",\n      \"status\": \"active\"\n    }\n  }\n}\n```\n\n\
    ## Query examples\n\n### Check API health\n\n```graphql\nquery Health {\n  health\
    \ {\n    status\n    version\n    uptime_seconds\n  }\n}\n```\n\n### List active\
    \ projects\n\n```graphql\nquery ActiveProjects {\n  projects(status: \"active\"\
    , limit: 10) {\n    id\n    name\n    status\n    createdAt\n  }\n}\n```\n\n###\
    \ Create a project (mutation)\n\n```graphql\nmutation CreateProject {\n  createProject(name:\
    \ \"Mobile App Launch\", status: \"active\") {\n    id\n    name\n    status\n\
    \    createdAt\n  }\n}\n```\n\n### Subscribe to project updates\n\n```graphql\n\
    subscription WatchProject {\n  projectUpdated(projectId: \"prj_abc123\") {\n \
    \   id\n    name\n    status\n    updatedAt\n  }\n}\n```\n\nSubscriptions require\
    \ a WebSocket connection to `wss://api.veriops.example/graphql/ws`."
