content:
  docs_markdown: '### Stage 1: ingest


    Read source contracts from the repository:


    | Contract type | Format | Example path |

    | --- | --- | --- |

    | REST | OpenAPI 3.0 YAML | `api/openapi.yaml` |

    | GraphQL | SDL schema | `contracts/graphql.schema.graphql` |

    | gRPC | Proto3 definition | `contracts/grpc/veriops.proto` |

    | AsyncAPI | AsyncAPI 2.6.0 YAML | `contracts/asyncapi.yaml` |

    | WebSocket | WebSocket contract YAML | `contracts/websocket.yaml` |


    ### Stage 2: lint


    Validate each contract against protocol-specific rules. REST uses Spectral with
    18 rules, GraphQL uses schema validation, gRPC uses `protoc` compilation, AsyncAPI
    uses the AsyncAPI parser, and WebSocket uses custom schema validation.


    ### Stage 3: regression


    Compare the current contract against the previous snapshot to detect breaking
    changes. Breaking changes (removed endpoints, renamed fields, changed types) trigger
    warnings in the review manifest.


    ### Stage 4: generate


    Produce reference documentation from validated contracts. Each protocol generates
    endpoint tables, payload schemas, code examples, and interactive testers.'
