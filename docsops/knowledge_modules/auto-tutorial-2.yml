content:
  docs_markdown: "## Before you start\n\nYou need:\n\n- An VeriOps API key from the\
    \ [developer dashboard](https://app.veriops.example/settings/api)\n- `curl` version\
    \ 7.68 or later (run `curl --version` to verify)\n- Node.js version 18 or later\
    \ for the WebSocket client (run `node --version` to verify)\n- A terminal with\
    \ internet access\n- About 15 minutes\n\n!!! tip \"Save time\"\n    Export your\
    \ API key as an environment variable to avoid repeating it in every command:\n\
    \    `export VERIOPS_API_KEY=\"YOUR_API_KEY\"`"
