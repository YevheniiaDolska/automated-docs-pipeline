content:
  docs_markdown: "## Step 1: verify your API key (2 minutes)\n\nRun this command to\
    \ confirm your API key authenticates against the VeriOps REST API:\n\n```bash\n\
    curl -s -o /dev/null -w \"%{http_code}\" \\\n  -H \"Authorization: Bearer YOUR_API_KEY\"\
    \ \\\n  https://api.veriops.example/v1/projects\n```\n\n<!-- requires: api-key\
    \ -->\n\nA `200` response confirms your key works. A `401` response means the\
    \ key is invalid or expired. Generate a new key in the [dashboard](https://app.veriops.example/settings/api)\
    \ if you receive `401`.\n\nNext, verify the GraphQL endpoint:\n\n```bash\ncurl\
    \ -s -X POST https://api.veriops.example/graphql \\\n  -H \"Authorization: Bearer\
    \ YOUR_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"query\"\
    : \"{ health { status version } }\"}' \\\n  | python3 -m json.tool\n```\n\n<!--\
    \ requires: api-key -->\n\n**Expected response:**\n\n```json\n{\n    \"data\"\
    : {\n        \"health\": {\n            \"status\": \"ok\",\n            \"version\"\
    : \"1.0.0\"\n        }\n    }\n}\n```"
