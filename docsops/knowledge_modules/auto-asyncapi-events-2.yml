content:
  docs_markdown: "## Channel catalog\n\nThe VeriOps event system publishes events\
    \ on three channels. All channels use JSON-encoded payloads with a standard envelope\
    \ format.\n\n| Channel | Direction | Payload type | Trigger | Description |\n\
    | --- | --- | --- | --- | --- |\n| `project.updated` | Publish (server to client)\
    \ | `ProjectUpdatedEvent` | Project status or name changes | Fires on every `PUT\
    \ /v1/projects/{id}` that modifies the resource |\n| `project.created` | Publish\
    \ (server to client) | `ProjectCreatedEvent` | New project created | Fires on\
    \ every `POST /v1/projects` |\n| `task.completed` | Publish (server to client)\
    \ | `TaskCompletedEvent` | Task status changes to `done` | Fires when a task reaches\
    \ terminal status |\n\n## Event envelope format\n\nEvery event uses a standard\
    \ envelope that wraps the domain-specific payload:\n\n```json\n{\n  \"event_id\"\
    : \"evt_01abc789\",\n  \"event_type\": \"project.updated\",\n  \"occurred_at\"\
    : \"2026-03-19T14:30:00Z\",\n  \"producer\": \"veriops-core-service\",\n  \"trace_id\"\
    : \"tr_abc123def456\",\n  \"schema_version\": \"1.0.0\",\n  \"data\": {}\n}\n\
    ```"
