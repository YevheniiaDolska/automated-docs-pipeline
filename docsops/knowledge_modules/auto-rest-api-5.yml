content:
  docs_markdown: "### Get a project\n\n```\nGET /v1/projects/{id}\n```\n\nReturns\
    \ a single project by ID.\n\n**Path parameters:**\n\n| Parameter | Type | Description\
    \ |\n| --- | --- | --- |\n| `id` | string | Project ID (format: `prj_*`) |\n\n\
    **Example request:**\n\n```bash\ncurl https://api.veriops.example/v1/projects/prj_abc123\
    \ \\\n  -H \"Authorization: Bearer YOUR_API_KEY\"\n```\n\n<!-- requires: api-key\
    \ -->\n\n### Update a project\n\n```\nPUT /v1/projects/{id}\n```\n\nUpdates an\
    \ existing project. Send only the fields you want to change.\n\n### Delete a project\n\
    \n```\nDELETE /v1/projects/{id}\n```\n\nDeletes a project and all associated tasks.\
    \ This action is irreversible. Returns HTTP 204 on success.\n\n## Endpoints: tasks\n\
    \n### List tasks\n\n```\nGET /v1/tasks\n```\n\nReturns tasks with optional filtering\
    \ by `project_id`, `status`, and `assignee_id`.\n\n**Query parameters:**\n\n|\
    \ Parameter | Type | Default | Description |\n| --- | --- | --- | --- |\n| `project_id`\
    \ | string | -- | Filter by project |\n| `status` | string | -- | Filter: `todo`,\
    \ `in_progress`, `done` |\n| `assignee_id` | string | -- | Filter by assigned\
    \ user |\n| `page` | integer | `1` | Page number |\n| `per_page` | integer | `25`\
    \ | Results per page (max 100) |"
