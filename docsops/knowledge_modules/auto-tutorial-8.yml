content:
  docs_markdown: '## Step 5: verify the integration (2 minutes)


    Run this checklist to confirm all three protocols work:


    | Protocol | Test command | Expected result |

    | --- | --- | --- |

    | REST | `GET /v1/projects` | HTTP 200 with project list |

    | GraphQL | `query { health { status } }` | `{"data": {"health": {"status": "ok"}}}`
    |

    | WebSocket | Connect to `wss://api.veriops.example/realtime` | Connection opens,
    subscription confirmed |


    If any step fails:


    - **HTTP 401 on REST or GraphQL**: Your API key is invalid. Generate a new one
    in the [dashboard](https://app.veriops.example/settings/api).

    - **WebSocket connection error**: Verify you use `wss://` (not `ws://`) and the
    key is passed as `?token=` query parameter.

    - **Timeout on any request**: Check your network allows outbound connections on
    port 443.


    ## What you accomplished


    | Step | Protocol | Outcome |

    | --- | --- | --- |

    | Verify API key | REST + GraphQL | Confirmed authentication across two protocols
    |

    | Create project | REST | Created a project resource via `POST /v1/projects` |

    | Query project | GraphQL | Fetched project with custom field selection |

    | Subscribe to events | WebSocket | Received real-time project update events |

    | Verify integration | All three | Confirmed multi-protocol integration works
    end-to-end |'
