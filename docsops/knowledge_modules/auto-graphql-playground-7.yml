content:
  docs_markdown: "### Multi-mode retrieval evaluation\n\nThe `run_retrieval_evals.py`\
    \ script supports four search modes for comparison:\n\n| Mode | Strategy | Use\
    \ case |\n| --- | --- | --- |\n| `token` | Token-overlap scoring | Baseline, no\
    \ API key required |\n| `semantic` | FAISS cosine similarity | Embedding-based\
    \ retrieval |\n| `hybrid` | RRF fusion of token + semantic | Best recall for mixed\
    \ queries |\n| `hybrid+rerank` | Hybrid + cross-encoder reranking | Highest precision\
    \ for production |\n\nRun a full comparison:\n\n```bash\npython3 scripts/run_retrieval_evals.py\
    \ \\\n  --mode all \\\n  --use-embeddings \\\n  --dataset config/retrieval_eval_dataset.yml\
    \ \\\n  --report reports/retrieval_comparison.json\n```\n\n<!-- requires: OPENAI_API_KEY,\
    \ faiss-cpu, sentence-transformers -->\n\n## Error handling\n\nGraphQL errors\
    \ appear in the `errors` array alongside partial `data`:\n\n```json\n{\n  \"data\"\
    : null,\n  \"errors\": [\n    {\n      \"message\": \"Project not found\",\n \
    \     \"locations\": [{\"line\": 2, \"column\": 3}],\n      \"path\": [\"project\"\
    ],\n      \"extensions\": {\n        \"code\": \"NOT_FOUND\",\n        \"timestamp\"\
    : \"2026-03-20T14:30:00Z\"\n      }\n    }\n  ]\n}\n```"
  assistant_context: "Use this module when answering questions related to: GraphQL\
