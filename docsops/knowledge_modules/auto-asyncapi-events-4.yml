content:
  docs_markdown: "## Channel: project.updated\n\nFires when a project status or name\
    \ changes.\n\n**Payload schema:**\n\n```json\n{\n  \"event_id\": \"evt_01abc789\"\
    ,\n  \"event_type\": \"project.updated\",\n  \"occurred_at\": \"2026-03-19T14:30:00Z\"\
    ,\n  \"producer\": \"veriops-core-service\",\n  \"trace_id\": \"tr_abc123def456\"\
    ,\n  \"schema_version\": \"1.0.0\",\n  \"data\": {\n    \"project_id\": \"prj_abc123\"\
    ,\n    \"status\": \"active\",\n    \"previous_status\": \"draft\",\n    \"updated_by\"\
    : \"usr_456\",\n    \"updated_fields\": [\"status\"]\n  }\n}\n```\n\n**Payload\
    \ fields (`data`):**\n\n| Field | Type | Description |\n| --- | --- | --- |\n\
    | `project_id` | string | Project ID (format: `prj_*`) |\n| `status` | string\
    \ | New status: `draft`, `active`, `archived` |\n| `previous_status` | string\
    \ | Status before the change |\n| `updated_by` | string | User ID who made the\
    \ change |\n| `updated_fields` | array of strings | List of fields that changed\
    \ |\n\n## Channel: project.created\n\nFires when a new project is created.\n\n\
    **Payload schema:**\n\n```json\n{\n  \"event_id\": \"evt_02ABCD456\",\n  \"event_type\"\
    : \"project.created\",\n  \"occurred_at\": \"2026-03-19T15:00:00Z\",\n  \"producer\"\
    : \"veriops-core-service\",\n  \"trace_id\": \"tr_def456ghi789\",\n  \"schema_version\"\
    : \"1.0.0\",\n  \"data\": {\n    \"project_id\": \"prj_def456\",\n    \"name\"\
    : \"Mobile App Launch\",\n    \"status\": \"active\",\n    \"created_by\": \"\
    usr_789\"\n  }\n}\n```"
