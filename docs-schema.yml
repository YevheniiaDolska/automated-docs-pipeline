$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://example.com/schemas/docs-frontmatter.schema.json"
title: "Documentation Frontmatter Schema"
description: "Validation schema for Markdown frontmatter used by the docs pipeline."
type: object
additionalProperties: true

required:
  - title
  - description
  - content_type

properties:
  schema_version:
    type: string
    description: "Schema contract version used by this frontmatter block."
    pattern: "^1\\.[0-9]+$"
    default: "1.0"

  title:
    type: string
    minLength: 8
    maxLength: 120

  description:
    type: string
    minLength: 20
    maxLength: 220

  content_type:
    type: string
    enum:
      - tutorial
      - how-to
      - concept
      - reference
      - troubleshooting
      - release-note

  product:
    type: string
    enum:
      - both
      - cloud
      - self-hosted

  status:
    type: string
    description: "Lifecycle status of this page."
    enum:
      - draft
      - active
      - deprecated
      - removed
      - archived
    default: active

  deprecated_since:
    type: string
    description: "Date when page was marked deprecated."
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"

  removal_date:
    type: string
    description: "Planned or actual date when page is removed."
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"

  replacement_url:
    type: string
    description: "Canonical replacement page URL or path."
    minLength: 1

  noindex:
    type: boolean
    description: "When true, page should not be indexed by search engines."

  since_version:
    type: string
    description: "Version where this feature/topic became available."
    pattern: "^[0-9]+\\.[0-9]+(\\.[0-9]+)?$"

  owner_team:
    type: string
    description: "Owning team slug."
    pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    minLength: 2
    maxLength: 64

  compatibility:
    type: string
    description: "Compatibility scope for the page."
    enum:
      - universal
      - api-v1
      - api-v2
      - cloud-only
      - self-hosted-only

  last_reviewed:
    type:
      - string
      - "null"
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"

  app_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+(\\.[0-9]+)?$"

  language:
    type: string
    description: "ISO 639-1 language code (e.g. en, ru, de)."
    pattern: "^[a-z]{2,3}$"

  translation_of:
    type: string
    description: "Relative path to the source document this file translates."

  source_hash:
    type: string
    description: "SHA-256 hash of the source document body at translation time."
    pattern: "^[0-9a-f]{64}$"

  tags:
    type: array
    minItems: 1
    maxItems: 20
    uniqueItems: true
    items:
      type: string
      minLength: 1
      maxLength: 40
